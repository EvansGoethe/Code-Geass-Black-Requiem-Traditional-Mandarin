 news.9.t:0 "蘇聯撤退"
 news.9.d:0 "隨著日本在滿洲的部隊不斷增加，蘇聯出人意料地讓緊緊壓在邊境線的部隊向後撤退。\n\n這很可能是莫斯科希望避免在未來與日本發生衝突，也有可能是因為想起了當年在日俄戰爭中被日本打敗的悲慘記憶。"
 news.9.a:0 "也許這能達成一次持久的和平。"
 news.9.b:0 "懦夫們逃走了！"
 news.12.t:0 "[FIN.GetNameDefCap]拒絕了蘇聯政府的要求"
 news.12.d:0 "佔位符"
 news.12.a:0 "此事沒法善了。"
 news.12.b:0 "他們不應該拒絕我們的要求。"
 news.13.t:0 "[FIN.GetNameDefCap]接受了蘇聯的要求"
 news.13.d:0 "佔位符"
 news.13.a:0 "但是和平的代價是什麼？"
 news.13.b:0 "現在我們能將注意力轉到其他地方了。"
