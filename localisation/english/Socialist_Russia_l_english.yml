 SRU_russian_jacobin_council_desc:0 "俄羅斯雅各賓委員會由一群認同雅各賓事業、在俄羅斯權勢顯赫的人物所組成。委員會匯聚了黨內極端革命派系中最有權勢的一些人。"
 SRU_trade_unions_reined_in:0 "工會已被管控"
 SRU_trade_unions_reined_in_desc:0 "工會在我國的政治決策中握有過大的權力，不能任其自行其是。控制它們是必要之惡。"
 SRU_opposition_purged:0 "反對派已遭清洗"
 SRU_opposition_purged_desc:0 "俄羅斯社會主義人民共和國境內的一切反對勢力都已不復存在——雅各賓政權的所有政敵，都不幸在一場由政治動盪引發的突發暴亂中喪生。"
 SRU_dystopian_propaganda:0 "反烏托邦式宣傳"
 SRU_dystopian_propaganda_desc:0 "國家的敵人無處不在，除了政府之外誰都不可信任。所有國家的敵人都必須被剷除、被消滅。"
 SRU_red_terror:0 "紅色恐怖"
 SRU_red_terror_desc:0 "我們的敵人一聽到紅色恐怖便嚇得雙腿發抖。當人民把他們倒吊起來、施以正義的裁決時，他們理當害怕。"
