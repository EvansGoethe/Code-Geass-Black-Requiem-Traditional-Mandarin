 SRU_central_asian_support:0 "中亞的支持"
 SRU_central_asian_support_desc:0 "我們與哈薩克的正式合作協議，本應在我們離開他們的土地、奔赴革命之時終止。然而多年下來，我們與阿拉木圖的東道主之間有了更深的相互理解，他們也已表示願意繼續與我們合作。\n\n他們願意向我們運送武器與補給，以換取人情。哈薩克雖是中國勢力圈中一潭無政府的窮鄉僻壤，但它對我們有限的承認，讓我們得以與該勢力圈中更為富庶的成員進行間接貿易。\n"
