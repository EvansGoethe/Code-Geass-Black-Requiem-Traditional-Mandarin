 SRU_Sonya_Phase_One.1.t:0 "革命的進軍"
 SRU_Sonya_Phase_One.1.d:0 "她心中僅存一絲緊張的悸動。走向講台時，一個念頭閃過——就是這一刻了。這一切都是為了此刻。她走到台前，緊緊握住手中的麥克風，開口道：「西伯利亞的人民啊！革命的人民啊！」索尼婭的呼喚，不只是對台下數百名屏息注視她的聽眾而發，更是對整個國家、對所有從那些正對準她的攝影機前收看的人而發。「你們都知道，俄羅斯曾經有過一個夢想！一個人人平等、不分男女的社會的夢想。一個為人民而建、由人民所建的社會。」她感覺自己早已知道該說什麼——這些並不僅僅是她的話語，這些是她父親的話語，而她不只在腦中聽見，更在心中聽見。\n\n「人們曾為這個夢想而戰……曾為這個夢想而殺戮，也為它而死去。但第一次革命的火焰熄滅了，我們被迫帶著它的餘燼流亡。可是……」關於父親的每一個細節她都記得，他對她講述過的每一個故事——關於一個共產主義國度的和平與美好——她今天試著把這一切灌注進自己的話語裡，就當這是她此生說出的最後一番話。放眼望去，她看見全場聽眾都在屏息聆聽她的每一個字。「這是我父親的夢想，這是我的夢想，這是西伯利亞之夢！這是人民之夢！」她的聲音聽來平靜，即便音量已然揚起；聽來優美，即便她是在吶喊。她高舉起右拳，這個動作引來了全場的歡呼。\n\n「我們東方的兄弟姊妹與我們血脈相連，卻不與我們共享同一個夢想。他們踏進革命的土地，是為了他們自己的夢。」她將右手遠遠甩向一側，聲音裡已染上一絲厭惡。那語氣的力量在全場迴盪，人們只憑聽覺，便彷彿能感受到她此刻的心情。「我不願再見到俄羅斯人的鮮血流淌。然而他們選擇了與人民的意志為敵！所以我們必須站起來，再一次為我們的夢想而戰。」在她說出「站起來」的那一刻，她聽見身後許多與她同台、原先坐在側邊席位上的人紛紛跺腳起身。她再度將拳頭高舉入空，狠狠一擊——這個致敬的動作被全場所有人一同重複。她回頭望了一眼，看見庫拉科夫向她點了點頭，隨後也做出同樣的動作。她轉回身，說完了她的演說。"
 SRU_Sonya_Phase_One.1.a:0 "\"前進，為革命而進軍！\""
 SRU_Sonya_Phase_One.2.t:0 "政治局戰時權力"
 SRU_Sonya_Phase_One.2.d:0 "扎夫拉任把馬克杯重重摜在那張坑窪不平的橡木桌上，透明的液體從杯中濺了出來。他望向圓桌對面那位正啜飲著酒的酒友。「呸，這些戰時權力可不是什麼好東西。這無異於獨裁。」扎夫拉任滿臉厭惡地說道，酒精讓他的聲音含混不清，加上一口歪斜殘缺的牙齒，語調更是走了樣。「你不懂，國家要成功，靠的是強有力的領導。看看E.U.吧——我們難道想讓自己的國家跟他們一樣孱弱嗎？」克魯季科夫小心地把酒杯放回杯墊上，一邊答道，試圖在扎夫拉任那套粗野的辯論方式面前佔上風。酒吧裡人聲鼎沸，震耳欲聾，兩人剛下工，得扯著嗓子才聽得見彼此。扎夫拉任猛地搖頭，頭上的羊毛帽因為毫無頭髮的摩擦而滑來滑去。「由人民治理的國家。這難道不正是社會主義的精髓嗎？！」他相當激動地吼道，再次抓起酒杯，狠狠灌了一大口。那液體彷彿灼燒著他，但這正是他抵禦嚴寒所需要的。「我又不是在鼓吹搞什麼君主制，像那些該死的不列顛尼亞人那樣——不過話說回來，要真是那樣，索尼婭倒是能當個完美的女王。人民的女王，赤色女王。」扎夫拉任幾乎驚呆了，張著嘴，酒順著下巴淌了下來。他望著克魯季科夫，而後者正直勾勾地盯著他。扎夫拉任相當坦率地承認道。"
 SRU_Sonya_Phase_One.2.a:0 "\"你瘋了。\""
 SRU_Sonya_Phase_One.14.t:0 "將理論付諸實踐"
 SRU_Sonya_Phase_One.14.d:0 "在索尼婭眼前鋪展開一片混凝土與光線交織的廣袤景象。它彷彿是有機生長而成，卻又完美契合著某種井然有序的輪廓。那是無產階級進步事業的集體結晶，在構成主義都市規劃的畫布上恣意揮灑。這不過是一幅畫——塔特林的《社會主義之城》，一座社會主義城市的建築構想。它是一張藍圖，卻以如此鮮活的動勢呈現，令索尼婭恍如置身其中。她父親曾收藏過塔特林的幾件作品，但多數在戰爭中散失了。令她頗為驚訝的是，新西伯利亞的地區製圖處（如今是國家計委的所在地）竟不顧反共的印刷禁令，將這幅原作保存並展示了下來。一陣摔門聲、打火機點燃的聲響，以及那熟悉的雲南菸草味，將索尼婭從塔特林的世界中拉了回來。庫拉科夫總理狠狠吸了一口菸，那副煩躁的模樣是她從未見過的。等到足夠的尼古丁流遍全身、恢復他招牌式的沉著，索尼婭才轉過身問道：「我猜薩布羅夫和阿列克謝耶娃在推薦哪套經濟方案上還是沒能達成共識？」庫拉科夫叼著菸回答：「沒有。薩布羅夫根本不考慮與亞洲通商，而阿列克謝耶娃則斷然反對他的工業化指標。」索尼婭與庫拉科夫藉故離席的那場會議，是一場淪為戰場的經濟委員會會議。一方是薩布羅夫與建設部，主張快速工業化並專注於自給自足；另一方是阿列克謝耶娃與貿易部，希望與亞洲建立夥伴關係，以我們過剩的礦產換取武器與技術。「你看起來對他們很失望。」索尼婭說，察覺到庫拉科夫那份相對苦澀的情緒。「我當然失望，」他答道，「他們把事情做反了。他們過度執著於自己的方案與理論，一心想扭曲事實與數據來讓自己的計畫說得通，而不是根據事實來做規劃。」兩人靜默佇立，思索了兩分鐘，索尼婭終於開口：「我們無法強行促成妥協。若辦得到我當然願意，可是只有這兩套方案能夠及時為我們取得所需的戰爭物資。因此，我們必須就經濟政策作出一致的決定。」庫拉科夫點了點頭：「同意。要不要宣布休會，再把兩份方案重新審視一遍？各有利弊。」「不，」索尼婭答道，「再拖下去，薩布羅夫的血壓恐怕撐不住了……」十五分鐘後，布寧娜主席與庫拉科夫總理重新走進委員會會議室，宣布了他們對今後經濟政策的決定……"
 SRU_Sonya_Phase_One.14.a:0 "將採納薩布羅夫的工業化計畫。"
 SRU_Sonya_Phase_One.14.b:0 "將採納阿列克謝耶娃的貿易建議。"
 SRU_Sonya_Phase_One.15.t:0 "兩年計畫"
 SRU_Sonya_Phase_One.15.d:0 "薩布羅夫忽然從椅子上站起身來。他坐在一張長桌的首席，桌旁每一個座位都坐滿了他的班底，他不禁露出得意的笑。他總得抽點時間欣賞自己的成就——而今晚，這場晚宴正是在慶祝他們的又一次成功。是他的成功。「各位，讓我們舉杯！」他洪亮而自豪地宣布，一把抓起面前的酒杯，晃動著那深紅色的液體，環視著所有仰望他的面孔。「我們已贏得國家最高領導層的青睞。」他在這段簡短的演說中特意留了一拍，好讓大家為這句話喝采，而他對收到的掌聲量頗為滿意。接著他繼續說著，一邊用手撩過頭髮，再往下撫平西裝上的褶皺。「當然，這只是革命的一步，而非最後一步。」\n\n他帶著自鳴得意的笑容說著，看見其他人終於開始舉起酒杯、嚥下口中的食物，準備聆聽演說的後半段。「我們前路漫漫，必須進一步集中我們的投資，並全面接管整個工業。」他知道革命的道路是漫長的，但他自己通往成功的道路看來卻很短。他頓了頓，深吸一口氣，然後將酒杯完全舉起——他的班底個個識趣，都等著他把話說完。「唯有在座的我們才做得到這件事，唯有我們。」眾人一如既往地跟隨他的帶領，與他一同舉起了酒杯。"
 SRU_Sonya_Phase_One.15.a:0 "\"革命萬歲！\""
 SRU_Sonya_Socialist_Flavour.1.t:0 "擴建托木斯克大學"
 SRU_Sonya_Socialist_Flavour.1.d:0 "索尼婭身子前傾，雙掌深深壓進膝頭。她環顧四周，看著托木斯克大學擴建典禮的流程一步步推進。然而真正吸引她目光的，卻是那些注視著台上發言者的形形色色的人們——尤其是庫拉科夫打量這個地方的神情。典禮的舞台就搭在大學正門外不遠處，而索尼婭注意到庫拉科夫眼中閃著一種她從未見過的光。「你看這個地方的眼神，帶著追憶，庫拉科夫。這在你身上可不常見。」她說道，起初幾乎像是自言自語，但終究還是說出口讓庫拉科夫聽見。他幾乎沒什麼反應，只是輕聲地、幾乎立刻地回應了她。\n\n「我的未來，還有我的性命，都欠這個地方。」那些話語裡鎖著一段記憶，索尼婭很想聽它被開啟。「我們還得在這裡再待一個小時，願意說下去嗎？」索尼婭所言不假——雖然他們在擴建案中的角色已經結束，典禮卻仍以蝸牛般的速度進行著。庫拉科夫在他倆蜷坐的側邊長凳上挪了挪身子。他神情變得黯然，但還是決定滿足索尼婭的好奇。「沒剩多少好說的了。那是很久以前的事……這個地方讓我踏上了一條為他人所不齒的路。而當我們被判定注定毀滅時，主席出手干預了。」索尼婭一邊點頭，一邊順著庫拉科夫透露出的線索把思路接了下去。\n\n「而那就是我們最後全都流落到哈薩克的原因。」共產主義的殘部流落到鄰國哈薩克的方式各有不同，這還是她頭一次聽說庫拉科夫的版本。他輕輕笑了一聲——那是種古怪的笑聲，與其說像笑，不如說更像某種生理反應。「一如既往，反應真快。」索尼婭很感激這句讚美，儘管她覺得自己並不配得。她有時的確反應敏捷，但在別的事情上卻總是吃力。這時庫拉科夫伸手從胸前口袋掏出一根香菸，而索尼婭也就此坐實了那句讚美。"
 SRU_Sonya_Socialist_Flavour.1.a:0 "\"在大學裡不該抽菸，庫拉科夫。\""
 SRU_Sonya_Socialist_Flavour.2.t:0 "開設公立醫院"
 SRU_Sonya_Socialist_Flavour.2.d:0 "索尼婭剛從那輛線條流暢、車身略長的黑色轎車裡一躍而下，關上車門，幾乎立刻就有人迎了上來。那是個矮小的禿頭男人，甚至比索尼婭還矮。她當然認得他——他即將出任她剛抵達的這幾家新醫院之一的院長。她甚至不清楚這究竟是哪一家醫院；通常這種事都是庫拉科夫告訴她的。然而這一次，他不在她身邊。在他們造訪的數十家醫院之中，這一家她得獨自應付。「布寧娜女士，很高興見到您——不過，我沒看見庫拉科夫，他人呢？」\n\n那人向索尼婭問道，他的嗓音幾乎像是從骷髏裡發出來的。起初滿是興奮，隨後便沉了下去，在他看清只有她一人時，轉為好奇。不過他仍伸出手來要與她相握。「請叫我索尼婭就好。」她握住他伸來的手——那是雙骨瘦如柴的手，指節彷彿要嵌進她的掌心。兩手分開後，她答道。\n\n「是的，庫拉科夫沒和我一起來。他急著趕回新西伯利亞，有些事必須親自處理。」索尼婭這番話只是為這個男人再添一份失望，這讓她有些不安。他黯然垂下頭去。從他方才的舉止，她大概能推斷出他是庫拉科夫的鐵桿支持者。她多希望——哪怕就這麼一次——能遇上一個更擁戴她的人。「啊，這個嘛……真是可惜。」那位骷髏似的院長說著，把雙手插進白袍口袋裡；隨即又意識到自己的語氣聽起來會是什麼意思。「不、不是說只有您來就不好！——女士——抱歉，索尼婭。」他此刻已然語無倫次，上下嘴唇抖個不停，拼命想找出別的話來道歉。他看上去簡直要炸開了。索尼婭藏起心中的莞爾，示意他說下去。"
 SRU_Sonya_Socialist_Flavour.2.a:0 "\"我們著手去做吧。\""
 SRU_Sonya_Phase_One.16.t:0 "國家貿易計畫"
 SRU_Sonya_Phase_One.16.d:0 "「大家聽好，這件事我只想講一遍。拜託，別逼我重複。」阿列克謝耶娃猛地抬起頭來。她站在自己的工作台前，正審視著一些文件——那些整潔有序的報告，正是她說起話來如此有底氣的憑藉。她轉過身，環視著自己所處的這間工坊。這裡既是辦公室、倉庫，也是工坊，她的整個團隊在其中來回穿梭。這樣的環境讓她的策略得以最有效率地推行。「既然我們已受到政府的關注，就必須做出成績來留住它。」\n\n她的嗓音散發著分析的氣息，屬於一顆好奇探究的頭腦。她話音方落，團隊成員便齊齊抬起頭來。那十來張她再熟悉不過的面孔，都知道她一開口就該側耳傾聽——縱使其中有些人正為終於贏得政府青睞而興奮雀躍。「正如我先前所述，我們的目標是與哈薩克攜手合作，以開闢通往中華聯邦的貿易路線。這不僅能改善我們與外部強權的關係，也能讓我們追趕上其他國家。」這是個扎實的計畫。此刻在場的多數人，不是藏身哈薩克的俄羅斯流亡者，就是哈薩克本地人。她停頓了一下，讓他們難得地展露笑容、盡情雀躍一番，然後才說完這番簡短而重要的話。"
 SRU_Sonya_Phase_One.16.a:0 "\"邁出第一步。\""
 SRU_Sonya_Phase_One.17.t:0 "漫漫長路"
 SRU_Sonya_Phase_One.17.d:0 "索尼婭凝望著窗外，看著托木斯克的建築一棟棟掠過。她知道這絕不會是她最後一次來到此地，卻仍暗自希望是。她在新西伯利亞那間幾乎住了進去的辦公室算不上多好，但也自有其舒適之處。當托木斯克大學映入眼簾——擴建工程已全面動工——索尼婭露出了微笑；隨後掠過的，是她與庫拉科夫曾一同出席的公立醫院之一。她終於轉向庫拉科夫，他正把車窗搖下，探著身抽菸。「你看，庫拉科夫，我們至今取得了巨大的成功。若想讓經濟徹底重回正軌，我們就必須加大力度，以求更大的成果。」\n\n庫拉科夫又抽了幾口，把煙霧吐出窗外，這才轉回身來，將最後那一小截菸蒂摁熄在車內的菸灰缸裡。「我以為到現在，你多少該再學到一兩件事了……索尼婭，通往革命終點的道路，急不得。若我們加快進度，恐怕會把整個經濟都拖垮。要——」他的聲音裡充滿了縝密的憂慮，滿是各種「萬一」與「可能發生什麼」。索尼婭確實又學到了一件事：她更加確定庫拉科夫不願操之過急。在她眼中，他大概是世上最有耐性的人。她只是搖了搖頭，替他把話說完。\n\n「要抵達革命的終點。我學到了，庫拉科夫。拜託，別再把我當孩子看待。」庫拉科夫沉默了。一陣尷尬的停頓，車子終於駛出了托木斯克的邊界。「我看得出來，此刻，我們誰也搬不動這塊路障。」庫拉科夫以相當隱晦的方式對她說道。她嘆了口氣，搖下車窗，但願能把那股菸灰味徹底散去。"
 SRU_Sonya_Phase_One.17.a:0 "\"這一點，我們有共識。\""
 SRU_Sonya_Phase_One.3.t:0 "建立人民代表大會"
 SRU_Sonya_Phase_One.3.d:0 "「庫拉科夫，抱歉，你得從頭說起。這份……方案……你聽著，人民代表大會本來就是你的主意。可是，你卻想限制它？我明白你對其他政黨的擔憂，但是——」庫拉科夫站在索尼婭面前，一手撐在她的辦公桌上，指著一份正是討論此議題的文件。人民代表大會——索尼婭，若要找個詞來形容，就是困惑。她只是想徹底弄明白他的理由，卻被早已料到她會如此反應的庫拉科夫打斷。「我們能在公平的較量中擊敗他們？一時或許可以，可是能撐多久呢，索尼婭？若我們想守護這個國家，就必須確保其他政黨只能取得極其有限的成功。只讓他們拿到少數席位，讓我們保住大部分的權力。」\n\n庫拉科夫的憂慮從來都是關於時間，索尼婭此刻才看清這一點。方才為了更直接地與他交談，她曾站起身來，如今又坐回椅中。他總是口口聲聲要慢慢來，要一場緩慢漸進的革命；如今卻又抱怨起這段時間裡可能發生的事。「看來這一回，庫拉科夫，我們的角色對調了——這件事該由人民來決定。」她若有所思地說。如今換成她主張那條唯有假以時日才能帶來巨大變革的路線，而他卻在為相反的立場而爭。他微微咳嗽，用手掩著嘴，別過頭去，免得咳向索尼婭。咳完後，他黯然地點了點頭。「有些人永遠不會用同一種方式達成共識。」他道出了政治的本質。索尼婭俯身看向面前的文件。它只需要他們兩人的簽名，便能決定走哪一條路。她終於再度開口。"
 SRU_Sonya_Phase_One.3.a:0 "\"這次不行……只開放少數席位。\""
 SRU_Sonya_Phase_One.3.b:0 "\"這該由人民決定，由多數人決定。\""
 SRU_Sonya_Phase_One.6.t:0 "黨，還是國家？"
 SRU_Sonya_Phase_One.6.d:0 "「不，不行，這樣沒有好處。我們不能讓黨與國家進一步融合，那只會把人嚇跑——那些在此時此刻我們最需要的能幹之人。」庫拉科夫語速飛快，因為方才與索尼婭的這番討論而在屋裡踱來踱去。兩人此刻都站著，都俯身撐在索尼婭的辦公桌上：庫拉科夫背對著門，索尼婭背對著窗——窗外透進來幾縷清冷的光。庫拉科夫雙手忙個不停，在索尼婭的桌面上攤開文件、把旁邊的紙張推到一邊，一心聚焦在自己的提案上。\n\n「黨內早已有許多職位與國家機構相對應，兩者合併能讓流程更加精簡。」索尼婭反唇相譏，明確地反對庫拉科夫。這是他們為數不多真正激烈起來的爭論之一，它融化了庫拉科夫那顆冰冷如石的心，也點燃了索尼婭胸中那團沉寂已久的火。「並非所有事情都該變得更精簡、更有效率。」他若有所思地嘆道。索尼婭注意到他的雙手在桌上不安地擺弄著，手指微微抽動，彷彿渴求著一根香菸。\n\n「那你是主張黨完全不該介入國家事務嗎？」索尼婭問道，一邊讓自己放鬆下來、稍稍平復。她挺直了身子，不再那麼前傾，並把庫拉科夫推開的那份文件滑了回來。這個動作似乎讓氣氛稍稍降溫，庫拉科夫自己也向後退了退。他搖了搖頭，用他那低沉冷靜的嗓音說道：「那是個愚蠢的主張。黨仍然可以有所參與，但徹頭徹尾的合併更是荒謬透頂。」話語尖銳，兩人的目光就此鎖在一起，片刻僵持——爭奪著誰能接上下一句話。因為下一句話，就是這場交鋒中的下一擊，而它將決定勝負。"
 SRU_Sonya_Phase_One.6.a:0 "\"兩者必須涇渭分明。\""
 SRU_Sonya_Phase_One.6.b:0 "\"我們必須將兩者合而為一。\""
 SRU_Sonya_Phase_One.9.t:0 "教育方針"
 SRU_Sonya_Phase_One.9.d:0 "索尼婭走向教育部入口時，瞥見了庫拉科夫的身影。又是一樁需要他們兩人共同拍板的事。她上下打量著庫拉科夫，他穿著那身一如往常的西裝——白得像雪，沒有半點可以藏污納垢的餘地。他板著一張近乎慍怒的臉。他用手撩過那頭夾雜銀絲的栗褐色頭髮，終於在兩人一同抵達部門門階時看見了索尼婭。「又一樁我們必須解決的事。永遠沒完沒了。」庫拉科夫這麼說著，趁著站定的這片刻伸手探進胸前口袋，緩緩抽出菸盒，取出一根菸，接著開始找他的打火機。\n\n「那是因為共青團提出了一個值得重視的論點。」索尼婭無視他又要往嘴裡塞一根菸的舉動——她確信他一天要抽掉不知幾百萬根。她只想搶先把這件事解決掉。「大吵大鬧、威脅教育部長，這叫提出論點？共青團是你主持的，你就是這樣指示他們行事的嗎？」庫拉科夫說道，聲音被牙間咬著的香菸與舉起打火的雙手弄得含糊不清。索尼婭別開視線，假裝被這舉動惹惱了。但她不得不承認，她從來未能完全掌控共青團；而他們的新任領袖——一個她再熟悉不過的人——所作所為，也正如她所料。「我——不——我沒有，而且……不，這不算。」她此刻承認道，心裡略感不安；不過她看得出來，庫拉科夫此刻並不在意她的感受，也不在意她的憂慮。\n\n「但他們想提出的是，學校應當開設講授共產主義的課程。就像我父親教養我的方式那樣。」他知道她總能找回自己的聲音，只是需要一點時間。他盯著她，手已放下，菸霧裊裊飄散，一邊斟酌著接下來的措辭，一邊把煙吹向遠離教育部的方向。「並非每個孩子、每位家長都希望從學校裡學這些。我同意部長的看法：政治不該進入校園。」她心底有一部分知道這話是對的——畢竟她也不是在學校裡認識革命的。除非把跟在父親身邊也算作學校。索尼婭希望自己接下來的話，能在踏進門之前就終結這場爭論。"
 SRU_Sonya_Phase_One.9.a:0 "\"你和部長說得對。\""
 SRU_Sonya_Phase_One.9.b:0 "\"這仍應納入課綱。\""
 SRU_Sonya_Phase_One.7.t:0 "清除雅各賓派契卡人員"
 SRU_Sonya_Phase_One.7.d:0 "庫利科娃走在新西伯利亞契卡總部的長廊上，腳步聲幾不可聞。她彷彿根本不是在行走，而只是微微懸浮於地面之上，唯一的聲響來自穿堂的風。當然，這種戲法並不存在——但倘若存在，庫利科娃必定會使。轉過一條走廊，她抬眼望去，前方站著一個沒穿契卡制服的人。這只意味著此人是來傳話的，否則根本不會被放進來。庫利科娃瞥了一眼之後，便再沒多看他一眼：身高約一米八，栗褐色的頭髮往一側梳攏，一雙森林草綠色的眼睛，一張只有母親才愛得下去的臉。\n\n這一切庫利科娃只憑一瞥便盡收眼底，為的僅是判定他不構成威脅。然而讓她意外的是，當她繼續前行時，此人非但沒有讓路，反而直直擋在她面前，並伸手往身側摸去。「你為什麼攔我？」庫利科娃質問道，語氣淡漠，只帶著些許慍意。他從口袋裡取出一封摺疊的信函遞給她。「抱歉，庫利科娃女士。不過，您必須讀一讀這個。」他對她說，身子微微發顫。她抬起手，把那頭近乎漂白的雪白髮絲撥離眼前。「好吧……拿來。」她一把奪過信，展開來讀。飛快地讀完一遍後，她不得不重讀，然後又讀了一遍。\n\n「調任？調去——調去……邊境安全處處長？」這是她在契卡的任職上頭一回遇上出乎意料的事。她望向那名信使，彷彿他能給出答案。而他只能說出一句話：「我可以向您保證這不是弄錯了。這道命令直接來自總理。」庫利科娃點了點頭，深吸一口氣，便繼續往前走去。她心裡只想著一件事：庫拉科夫挑信使的眼光該再好一點。「我明白了。那麼，也請把這份文件送到盧卡手上。」她把信遞回給他，他接過信，會意地點了點頭。她轉過身，沿著來時的路走回去，留下最後一句話讓那名信使聽見。"
 SRU_Sonya_Phase_One.7.a:0 "\"守著一條冰封的邊境毫無意義。\""
 SRU_Sonya_Phase_One.10.t:0 "列昂諾娃主席"
 SRU_Sonya_Phase_One.10.d:0 "索尼婭一格格拉開辦公桌的抽屜，發出吱嘎的滑動聲。她正翻找著一份文件——那是交由她審閱、並要在某次談話中與庫拉科夫討論的。她本希望這回總算能讓自己硬拉著他去散的那些步派上用場，可要是找不到那份文件，也就無從談起。她的搜尋被一聲巨響粗暴地打斷了！那聲音簡直像有人朝她辦公室裡開了一槍。她猛地抬頭望向門口——那摔門聲對她而言再熟悉不過，而湧進房間的那股氣場，也與她從前領教過無數次的一模一樣。「索尼婭，見到你真好！」抬眼望去，那份熟悉感得到了完全的印證。就算聲音還不足以佐證，來人本身也足夠了。索尼婭看著列昂諾娃——她從頭到腳穿著一身嶄新的制服，索尼婭從未見她穿過。不過這也說得通，今天是列昂諾娃出任契卡首腦的第一天。「啊，下次請敲門，列昂諾娃。不過我得承認，見到你我也很高興。」索尼婭鬆了口氣，身子往前傾去，桌屜還半開著，她卻毫不在意。她只是慶幸能再見到自己的朋友——熬過這幾個月的種種之後，她太需要一張熟悉的面孔了。「哈，那是自然。是我的錯，這裡可不比你從前那間辦公室。這兒可正式多了。」\n\n列昂諾娃一邊說，一邊打量著房間，那模樣彷彿正把舊辦公室的影像疊在眼前，好作一番比較。索尼婭給了她一點時間。列昂諾娃臉上掛著大大的笑容，隨即語速飛快地接了下去：「總之，很高興告訴你，改組進行得很順利。契卡裡許多人都樂於——嗯，擺脫他們那些雅各賓派的同僚。」來了。索尼婭別開視線，而列昂諾娃的目光牢牢鎖在她身上。儘管早已習慣了列昂諾娃，她投來的某些眼神有時仍讓索尼婭不寒而慄——那感覺就像被暗處的某頭怪物端詳著。正是這樣的念頭侵蝕著索尼婭的腦海，於是她問出了一個自己早已知道答案的問題：「聽起來不錯。那麼留下來的那些人，他們是……你是不是……」當她望向列昂諾娃的臉時，那絲憂慮驟然放大。在她腦海中，列昂諾娃那柔美的容貌被替換成了索尼婭所能想像最駭人、最揮之不去的形象：她的頭髮彷彿化作邪惡神話中的群蛇，笑容裡的牙齒則彷彿變成了死亡的利顎。「索尼婭，你傷我的心了……我若真想背叛你，早在保鏢那件事上就下手了。」那陣驟然放大的憂慮來得快、去得也快，尤其當列昂諾娃收起笑容說完這句話時。儘管這樣的情形已發生過好幾回，索尼婭卻只有一種回應。"
 SRU_Sonya_Phase_One.10.a:0 "\"這倒是令人安心……\""
 SRU_Sonya_Phase_One.11.t:0 "伊萬諾夫主席"
 SRU_Sonya_Phase_One.11.d:0 "辦公室裡只聽得見索尼婭的鋼筆刮擦紙面的沙沙聲。夜已深，室內唯一的光源是桌上那盞檯燈，只夠照亮她面前的紙張。她打了個呵欠，用空著的那隻手掩住。下次她要記得在夜深得不成體統之前把文件簽完——不過她其實並不介意。這個時辰的新西伯利亞很安寧，她的辦公室亦然，是一種美好的靜謐。「布寧娜女士，前來匯報契卡的改組情況。」忽然，一個深邃如海洋、柔滑如絲綢的嗓音響起。索尼婭嚇得從椅子上彈了起來，鋼筆脫手落下。她望向前方，幾乎是反射性地一把抓起檯燈，將光打在眼前的人身上。\n\n燈光照出的並非什麼夜間的怪物，而是一個銀髮男子，一身純黑西裝。他有著稜角分明的下巴，還有一雙彷彿無時無刻不在計算數字的眼睛，顏色宛如蒼穹之上的雲。「啊！我——咳，很抱歉。我沒看見您進來。」索尼婭覺得自己臉都要臊紅了，居然沒察覺有人走進來；不過她確實認得這個人，哪怕只是略知一二。他新近被任命為契卡的首腦，以取代前任那位——忠誠對象頗為不幸的領導。「您是……伊萬諾夫先生，是嗎？」她輕聲問道。他對她的反應似乎全然不以為意——畢竟他悄無聲息地潛入，多半早就料到了。「契卡仍在向國家安全部轉型的過程中。無論是原先的雅各賓派成員，還是新任的邊境安全處處長，都未曾製造任何麻煩。」\n\n他帶來的消息極佳，但帶來消息的這個人卻讓她困惑。他甚至沒有選擇回答「伊萬諾夫」究竟是不是他的名字。她歪了歪頭，把檯燈的光從他眼前移開，低頭瞥了一眼紙張，發現方才那支筆弄出了一小片墨漬。「謝謝你，你辦事很有效率。就是你——」索尼婭抬眼一看，那人已經不見了。她連忙將燈光照回去，卻不見有人站在那裡。連門都沒有半開，而是嚴絲合縫地閉著。她眨了好幾下眼睛，寧願相信那只是光線的錯覺——可這也解釋不了為什麼她沒聽見他離開的聲音。至少此刻，她開始回想起那個男人的種種細節。把線索拼湊起來，她終於把那句被自己打斷的話說完了。"
 SRU_Sonya_Phase_One.11.a:0 "\"——在民主社會聯盟危機之後重建了間諜網……\""
 SRU_Sonya_Phase_One.8.t:0 "媒體的力量"
 SRU_Sonya_Phase_One.8.d:0 "當索尼婭與庫拉科夫步入新西伯利亞的街頭時，她聽見身後的談話聲漸漸消散。這裡沒有記者，沒有任何媒體機構的人守著要從國家領導人口中挖出獨家。庫拉科夫率先利用了這一點——他從台階上一步跨到街面，徑直走向停在路邊那輛線條流暢的黑色長轎車，司機已準備好迎接他們。「我們正在打仗，索尼婭，這些媒體卻發表這種尖刻的批評……」庫拉科夫拉開車門鑽了進去，話說到一半便沉默下來，等著索尼婭跟上。她完全走下台階，左右張望了一番，才上車關門、繫上安全帶，這才聽見他繼續說下去。「他們只是在削弱我們的國家、我們的國家安全。還有黨。這近乎叛國。」他抱怨道；只是不同於他平時的抱怨，這回的語氣裡毫無惱怒或不滿的意味，只有一絲留意，以及想再解決一樁議題的意願。「在我看來，你不過是應付不了鎂光燈，回答不了幾個簡單的問題罷了。」索尼婭把這句話丟給庫拉科夫。她雖從不喜歡整天與媒體周旋，但也已練就了與他們打交道的本事。「你知道問題不在這裡。」他明白她有時比表現出來的更精明，便任由這句話從自己身上滑過。「無論如何，其中確有一些是有害的。但他們的批評與對這場運動的反思，只會使它更加壯大。唯一需要剷除的，是那些越過叛國那條線的機構。」她的論點剛好在車子發動時擺明。引擎轟然啟動，靜候了幾秒，便沿著道路駛去。那段時間足夠庫拉科夫思索該如何回應——他沒花多久。「我們仍然可以保留那些批評，只需要把媒體收歸我們之下。」索尼婭搖了搖頭，望向窗外飛馳而過的街景，一邊斟酌著措辭，一邊拿不定主意是該開口，還是任由庫拉科夫說下去。"
 SRU_Sonya_Phase_One.8.a:0 "\"讓他們保持獨立吧，庫拉科夫。\""
 SRU_Sonya_Phase_One.8.b:0 "\"必須讓他們就範，索尼婭。\""
 SRU_Sonya_Phase_One.12.t:0 "外國人的忠誠"
 SRU_Sonya_Phase_One.12.d:0 "「看見那個人了嗎，他是個技師。那種天才的頭腦，用來設計我們的車輛必定大有可為。」庫拉科夫忽然對索尼婭開口，事出突然。她轉向右側，越過庫拉科夫望向他所指的方向。在她強制安排的散步途中，他鮮少主動挑起話頭，所以這顯然是件要緊事。映入她眼簾的，是一輛歪倒在路邊的ZID牌摩托車，前輪已被卸下，零件散了一地。一個男人蹲在旁邊，身邊擺著一整套工具。他看起來不太像俄羅斯人——身形清瘦，膚色黝黑，一頭黑色短髮，蓄著濃密的棕色八字鬍。從他被寒風凍得直打哆嗦的模樣，索尼婭就知道他不是俄羅斯人。他手指上戴著戒指；當他們繼續往前走時，索尼婭看見一個女人走出來，為他多裹上幾條毯子。\n\n「看看他的臉，庫拉科夫，他不是俄羅斯人。你該認得出一個迷戀資本主義的人長什麼樣子。」索尼婭說出口的論點不多，腦中盤旋的卻不少。他們腳步輕快地走過，她一路看著那個男人。她明白他為何要提起這樣一個人、這樣一樁事。「一個人的長相不該決定他是否被驅逐。他有一技之長——把他置於監視之下，讓他為我們所用。免得讓歐洲人又多得一名技師。」庫拉科夫談的是他們先前討論過、卻未有結論的一樁事。庫拉科夫語調柔和而在理，索尼婭則沉吟片刻，設法找出恰當的措辭。\n\n「那如果他按照自己的理念教養他的女兒或兒子呢？她長大後加入了自由派政黨，並為之奮鬥。這難道不會危及我們的烏托邦嗎？」庫拉科夫停下腳步望向她，她也隨之停步回望。他似乎從她的話語中察覺到了什麼，直直地盯著她，隨後嘆了口氣，伸手從口袋裡掏出一根香菸，夾在指間。「我改變主意了。這趟散步看來還挺有成效。」他這回的語氣粗聲粗氣，近乎揶揄，香菸已叼在嘴上；但他還有話要說，只是得先找到打火機。點著菸之後，他把話說完了。"
 SRU_Sonya_Phase_One.12.a:0 "\"把那個技師還給歐洲人吧。\""
 SRU_Sonya_Phase_One.12.b:0 "\"他會把女兒教養成你這樣的人。\""
 SRU_Sonya_Phase_One.13.t:0 "革命的奠基"
 SRU_Sonya_Phase_One.13.d:0 "索尼婭陷入了沉思，目光凝在辦公桌正後方的那扇窗上。她背對著辦公室的門，微微前傾，下巴輕輕擱在支在大腿上的手掌中。她其實並沒有望向窗外，只是專注地盯著那面玻璃，看它在冬日的寒氣中結起薄霜。這些念頭折磨得她夠嗆，以至於她把它們說出了聲：「庫拉科夫，他似乎……正在凍住那些讓這場革命沿軌前行的輪子。」在同一棟樓的另一處、一間格局相仿的房間裡，庫拉科夫正伏在辦公桌上，俯視著一疊文件——那些是可能推行的改革或變革方案。他同樣陷入了沉思，而且是關於同一樁事的沉思：「索尼婭，她似乎正在找到自己的聲音與力量。她再也不是哈薩克那個受驚的小女孩了。」兩人各自身處一方，想的卻是同一件事：該拿那個把國家命運握在手中的人怎麼辦。\n\n「他日後恐怕會成為問題……可是，我又能拿他怎麼辦呢？論政治權力，我贏不了他。」索尼婭的聲音裡纏繞著憂慮與不安；而說著類似話語的庫拉科夫，卻是精於算計的，甚至帶著幾分斯多噶式的冷靜。「她那點微不足道的作為正在黨內製造裂痕。她光是試圖參與革命，就已經在削弱我們了。」他嘆了口氣，右手伸過去想掏根菸，卻摸不著菸盒。「革命的基礎已經奠定。」索尼婭吐出這句話，終於從椅子上站起身，把它推向一旁的滾輪滑開。「我們的國家正在變強，正在前進，可是……」庫拉科夫退開幾步，走向身後那扇窗，伸手去拉百葉窗。最後有一句話，是他們各自說出、卻異口同聲的。"
 SRU_Sonya_Phase_One.13.a:0 "\"誰來完成它？\""
 SRU_Sonya_Phase_One.18.t:0 "偉大人民戰爭的失敗"
 SRU_Sonya_Phase_One.18.d:0 "索尼婭真想拿頭去撞牆。這一回不是撞她自己的牆，而是庫拉科夫辦公室裡的牆。許多事她都應付得來：一天發表六場演說、決定該採用哪一套稅制改革，甚至決定全國公民的早、午、晚餐該吃些什麼。可她應付不了眼前這種場面——當兩個人不停地爭辯、互相搶白，談的還是她連完全理解都做不到的概念時。就像站在她面前的這兩位：羅斯托維耶夫元帥與杜羅夫將軍。羅斯托維耶夫因在偉大革命戰爭中的功績而在紅軍中備受敬重，而杜羅夫則恰恰是那種對此毫不放在眼裡的將軍。「夠了。你們兩位，拜託直接說重點。」\n\n索尼婭吐出這句話，一邊揉著太陽穴，一邊輕輕把右手撐在庫拉科夫的辦公桌上借力。兩人立刻噤聲，望向索尼婭；庫拉科夫也望著她，看著她及肩的金髮遮住了臉龐。他早已習慣這類討論，跟上並無困難；但此刻他還是出面替索尼婭解圍。「羅斯托維耶夫，由你先開始最好。」讓這位備受敬重的元帥率先發言似乎是個不錯的開場，索尼婭對此十分感激。羅斯托維耶夫清了清喉嚨才開口：「當然，庫拉科夫總理。我的方案很簡單：紅軍過於分散，也過於缺乏紀律。」杜羅夫對此嗤之以鼻，眾人的目光頓時落在他身上，直到羅斯托維耶夫繼續說下去。\n\n「我們必須強化它、集中它。後勤與指揮一團糟，唯有將兩者合一才可能取得任何成功。把這群烏合之眾打造成一支現代化的作戰力量。」索尼婭覺得羅斯托維耶夫言之有理：分散化的軍隊在哈薩克運作良好，但面對組織更嚴密的敵人恐怕會吃虧。杜羅夫甚至沒給索尼婭一分鐘去思索這個構想，便搶著陳述自己的主張：「我們的弱點正是我們的強項。東方那邊試圖以現代化軍隊的方式作戰，而我們憑藉的正是難以捉摸，並且成效斐然。軍隊應當維持既有的作戰方式。我們必須保持為一支能在任何時間、任何地點打擊敵人的力量——完全無從預測。」索尼婭嘆了口氣，這下她明白了：整場爭論可以歸結為兩個單一的論點——究竟該不該把軍隊集中化，還是維持其分散化。可儘管她很不願承認，她對軍事戰略所知甚少，於是她轉頭望向庫拉科夫，問道：「庫拉科夫，你怎麼看？」"
 SRU_Sonya_Phase_One.18.a:0 "\"杜羅夫了解我們的軍隊。\""
 SRU_Sonya_Phase_One.18.b:0 "\"羅斯托維耶夫說得對。\""
 SRU_Sonya_Phase_One.19.t:0 "游擊隊員的構想"
 SRU_Sonya_Phase_One.19.d:0 "瓦西里·杜羅夫手裡翻閱著戰場報告，其內容全都關乎敵方目前的作戰力量。遠東的那些俄羅斯人——他看到的時候險些放聲大笑。他們的兵力，他們的裝備。他覺得要擊潰其主力簡直如同兒戲，只有寥寥幾個例外會構成麻煩。「看看這些報告，親愛的，這個敵人……嗯，我就這麼問吧。換作是你，你會怎麼做？」瓦西里轉過身望向他的妻子宋，她那頭烏黑的長髮在家中的燈光下閃著美麗的光澤。她此刻正坐在廚房的流理台上。他走過去，把右手裡的報告遞給她。她花了片刻瀏覽，瓦西里注意到她的目光落在某一行上。\n\n「他們的軍隊不是為東方而生的。我會帶一個小隊，把他們引誘到一條凍結的河裡去。」她說得沒錯。儘管那是遠東的軍隊，他們整支部隊卻似乎沒準備好應付離莫斯科這麼遙遠的酷寒。對於她這乾脆俐落的回答，瓦西里報以一笑。「一點沒錯。這正是我想把更多指揮權下放給班排長的原因——他們最了解自己的弟兄。只要給了他們那份權力，他們就能迅速執行這類戰術、即時反應。」瓦西里一口氣說完，把報告拿了回來，擱在宋身旁的檯面上又細看了一遍。他能感覺到她的目光落在自己身上。他常常納悶，自己何德何能娶到這麼美的妻子；也慶幸當年在哈薩克追捕她這名盜匪時，她沒殺了他。「親愛的，這個想法印證了我家鄉的一句古老諺語。」\n\n她的話引起了他的注意。他索性把目光完全從報告上移開，望著她，示意她說下去。這時她傾身向前，臉上帶著十足的壞笑，把話說完了：「若有一位偉大的勇士向你挑戰，就踢他的下體，再偷走他的鞋子。」瓦西里再也忍不住，放聲大笑。他妻子說這話的方式、那把蜜糖般的嗓音把它演繹得恰到好處，簡直堪稱世上最好笑的笑話。他傾身向她，輕輕吻了下去。"
 SRU_Sonya_Phase_One.19.a:0 "\"他們的鞋子一文不值，親愛的。\""
 SRU_Sonya_Phase_One.21.t:0 "不再身處哈薩克"
 SRU_Sonya_Phase_One.21.d:0 "「喂……你還有多的靴子嗎？我需要一雙，或者好幾雙。」傑米多夫朝萬津傾身說道，呼出的氣息立刻化作白霧。兩人圍坐在營火旁，火光映照著這個酷寒的夜。萬津搓著雙手笑了起來，望向傑米多夫。「就算把哈薩克所有的衣服都穿上，也擋不住這種冷。」他對著攏起的雙掌輕聲說。傑米多夫笑了笑，仰身往後倒進身下的雪裡。營火旁其餘六名弟兄也低聲附和。他們的冬季軍服固然是為這種天候而製，但人的身體本身可不是。「我完全同意。」\n\n所有人聽見那熟悉的粗嗓門，立刻齊刷刷轉頭望去——是他們的中士。他很快在弟兄們身旁找了個空位，一手端著杯子，一邊清理地面。「長官！」眾人手忙腳亂地想從原地迅速起身。萬津站得又快又挺，傑米多夫卻絆了一跤，趴在地上還想敬個禮。「稍息，稍息。這裡不必來這套。」中士連忙揮了揮空著的那隻手，自己也在冰冷的地上坐了下來，就著火取暖。萬津趕緊坐回原處，重新放鬆下來，其餘弟兄也都鬆了口氣，白霧清晰可見。有那麼一陣子四下無聲，中士只是啜著他的飲料。然後他向所有人拋出一個問題：「說說看，小子們，你們是想要幾條毯子呢，還是想去殺革命的敵人。」\n\n他問得誠懇，只是把最後那句拖得長長的，模仿著某種官方文件的腔調。弟兄們哄笑了幾聲。萬津認真地想了好一會兒——毯子固然能幫他熬過嚴寒，但打起仗來身子也能很快暖起來。可他的思緒被打斷了，因為傑米多夫終於想出了個答案，脫口而出：「長官，我更想要個女人！」萬津放聲大笑，傑米多夫也是，圍著火堆的所有人都笑了。連中士都險些把飲料灑了出來。然後，彷彿約好了似的，他們一齊朝著這漫漫長夜喊了出來。"
 SRU_Sonya_Phase_One.21.a:0 "\"我們不都是嗎！\""
 SRU_Sonya_Phase_One.20.t:0 "軍事委員會的計畫"
 SRU_Sonya_Phase_One.20.d:0 "羅斯托維耶夫元帥直起身子時皺了皺眉，手裡吃力地捧著一只大檔案箱。他的背早已不比年輕時，光是抬起一個箱子這麼點小動作，就幾乎要了他的命。他用力踢上檔案抽屜，鋼頭靴替他擋下了進一步的損傷。他把箱子重重擱在旁邊的桌上，揚起的塵灰四散飛舞，撲向其他檔案櫃。他隨手抽出一份卷宗，看了看標題，上頭寫著《伏爾加防禦戰》。他對那場戰役記憶猶新，於是把心裡的話說出了聲，只有塵埃與蜘蛛聽得見：「啊……我記得那一仗，一場失敗的防禦。我們的防線徹底崩潰，就因為部隊守不住。」往昔的傷口——那些失敗與錯誤——依舊刺痛著他。但他來這裡，正是為了從中汲取教訓。\n\n「長官，我有消息要向您報告。」一個羅斯托維耶夫再熟悉不過的聲音在室內響起，他立刻聽出是誰。他從那堆破碎的記憶前轉過身來，看見了他那位英俊的金髮年輕門生，茹托夫·彼得。他扶著門，讓一片嶄新的金色光線灑進屋內。「但願是比這些十年前的舊報告更好的消息。」他語氣中的隨意與溫和，並非他平日待人的方式——面對他人，他總是以更高的標準要求自己。唯獨對彼得不然。年輕人望著他，微微一笑，將頭髮撥到一側，順勢輕輕扶正軍官帽。「是的長官，您的體制改革推行得很順利，我的團正迅速取得成效。新的協同機制與明確的命令，對坦克部隊而言助益極大。」\n\n這確實是比那些舊報告好太多的消息。羅斯托維耶夫朝他露出一個不見牙齒的微笑。這一回，他的戰術與構想收到了成功的捷報——這對他而言，比整個遠東就此投降還要令他振奮。不過在他心裡，後者倒也不算什麼壞事。他從彼得身邊轉開身去——年輕人已走近了幾步——他翻開那份伏爾加卷宗，一邊讀著，一邊把話說完。"
 SRU_Sonya_Phase_One.20.a:0 "\"這一次，我們不會失敗。\""
 SRU_Sonya_Phase_One.24.t:0 "驅逐侵略者"
 SRU_Sonya_Phase_One.24.d:0 "「準備好！他們隨時會把人往我們身上推！」加雷金指揮官朝弟兄們吼道。他在草草挖就的戰壕間來回巡視，鄰近建築的陰影籠罩其上。這些戰壕並不是用來作戰的，而是用來阻擋紅軍坦克推進的——它們攸關眾人的生死。他一邊走一邊往右一瞥，看見一名士兵拿著鏟子有氣無力地動著，便一巴掌拍在他後腦勺上。「動起來，士兵！你會害死我們所有人。」那人頓時精神一振，嘴裡嘟囔著「是，長官」。加雷金這才多了幾分底氣地往前走去。他毫不懷疑那些愚蠢的赤色分子只會用人海往上衝，然後把坦克一頭開進他正要爬出來的這個坑裡。\n\n轟！地面驟然震動，遭到一輪突如其來的猛烈砲擊。加雷金剛爬出坑口，側身便被狠狠撞了一下。他以為是一整發砲彈不知怎地砸在了自己身上，直到聽見有人吼道：「趴下，長官！」那名士兵剛把加雷金撲回坑裡。他越過士兵那頂皺巴巴的灰帽子往上望去，只見一發砲彈從他頭頂掠過，正正砸在他方才站立之處。他幾乎要鬆一口氣，卻感到陰影壓了下來。再抬頭望，他看見空中那些鋼鐵之鳥，機身上塗著紅色的五角星。加雷金咒罵了一聲，一把推開身上的士兵，慢慢撐起身來。挨轟炸是他們最不需要的。他小心翼翼地不把身子站得太直、太高，免得冷不防讓狙擊手取了性命。\n\n然而，四周煙塵瀰漫，他心想對方應該不可能看得見他。他轉身望向前線紅軍那一側——就在那裡，他看見了、也聽見了：移動的鋼鐵方塊，與履帶轟隆如雷的咆哮。坦克多得數不清，正朝他徑直碾來。它們如此強悍有力，輕而易舉地爬進又爬出那些坑洞，像機器一般勢不可擋。「後撤！撤退！」他當機立斷，向弟兄們發出絕望的呼喊。他一把抓住那名剛要爬起來的士兵的右臂，奮力向後撤去。"
 SRU_Sonya_Phase_One.24.a:0 "加雷金回來了，還多帶了一條手臂。"
 SRU_Luka_Phase_One.1.t:0 "將軍們的審判"
 SRU_Luka_Phase_One.1.d:0 "在總參謀部密閉的大門之後，高階軍官們圍聚在一張被地圖淹沒的桌前。索尼婭主席的政府正迅速失去對革命的掌控。當索尼婭大談建立在她自己虛構理想之上的烏托邦時，整片整片的行政區正從國家手中滑落。將軍們早已厭倦了她的無所作為。野戰指揮官米哈伊爾·科瓦廖夫抱臂立於眾人之間，聽著年長的軍官們字斟句酌地談論著：「緊急軍事權力」、「秩序的暫時恢復」、「保護性拘留」。沒有人說出「政變」二字，但房裡的每個人都聽懂了弦外之音。這時，大門忽然被推開了。新當選的總理盧卡·朱可夫從容地走了進來，外套被外頭的雨水浸得發暗。塔莎·庫利科娃隨行在側，兩名身著灰色制服的契卡軍官分列左右。幾位將軍下意識地伸手去摸配槍。「當心，」盧卡說，「你們一旦拔槍，就得決定自己是否有膽開火。」他們的手僵在了半空。科瓦廖夫率先開口：「恕我直言，總理，您和您的打手在這裡並不受歡迎。」盧卡瞥了一眼那些地圖：「哦，是嗎？因為如果我沒弄錯的話，這看起來像是一場政變。」室內霎時鴉雀無聲。\n\n一名將軍向前一步，面色因憤怒而漲紅：「我們是想把革命從索尼婭的軟弱中拯救出來。」盧卡咧嘴一笑。「你是在建議我們用恐慌來取代猶豫嗎？」盧卡問道，「你們今夜便要奪取各部會，天亮前逮捕半數政府成員；到了早晨，全西伯利亞都會知道軍隊反了。恭喜。你們將把敵人夢寐以求的東西雙手奉上。」科瓦廖夫瞇起了眼：「那您有何高見，總理？再多玩些政治把戲？」盧卡的咧嘴笑容變成了一抹自得的微笑。「不，」盧卡答道，「我建議的是紀律。」一名反雅各賓派的軍官一拳砸在桌上：「紀律？從你嘴裡說出來？我絕不會把軍隊交給雅各賓狂熱分子和契卡打手。」另一名軍官點頭附和：「我也不會。寧要索尼婭，也不要你們這種人統治的獨裁政權。」盧卡看都沒看他們一眼，只是極輕微地抬了抬手。庫利科娃拔出手槍，兩聲槍響在廳內迴盪。契卡軍官在心跳的間隙後也開了火。那幾名持異議的將軍癱倒在地圖桌旁，鮮血在橡木桌面上蔓延開來。再沒有人敢去碰武器。庫利科娃放下手槍，臉上寫著一種扭曲的滿足。\n\n盧卡跨過那幾具屍體，彷彿它們只是擺錯位置的家具。「你們今夜聚集於此，是因為你們明白一個事實：索尼婭再也無法領導革命。但你們並不明白，自己即將對革命造成何等嚴重的後果。政變不是一瞬之事，而是一場行動。它需要準備好服從的各部會，準備好定調的報紙，準備好袖手旁觀的士兵，以及在自知是敵人之前便已消失的敵人。」科瓦廖夫盯著那幾具屍體，又回頭望向盧卡。「所以，這根本就不是為了阻止我們。」盧卡的目光牢牢鎖住科瓦廖夫。「不是，」盧卡說，「這是為了弄清楚你們之中，誰真正懂得權力。」一陣長長的沉默。盧卡雙手撐在桌上。「索尼婭會倒台。但不是今夜，也不是在某場天亮前就崩潰的、誤入歧途的軍事奪權中。數月之後，一旦每一個要害部門都接受了必然的結局，局勢便會改變。到那時軍隊推進，看起來將不像一場叛亂，而像一場復辟。」一名倖存的將軍嚥了口口水：「那索尼婭之後呢？」盧卡的目光掃過全場。「革命執政團將會成立，由我出任主席。軍隊將保有它的榮譽與使命。作為交換，時機來臨時，它將與我站在一起。」科瓦廖夫的聲音變得強硬：「若我們拒絕呢？」盧卡看了看地上的屍體：「那就準備好承受無法預見的後果。」無人開口。緩緩地，一名將軍垂下了頭。接著又是一名。科瓦廖夫依舊站著，下顎緊繃，不願低頭，卻也無法否認眼前正在成形的未來輪廓。最後，他說：「軍隊不會成為你可以隨心所欲使用的武器。」盧卡迎上他的目光：「不會的，指揮官。它將是革命的盾。」窗外，雨點敲打著總參謀部的窗欞。屋內，這場政變在盧卡·朱可夫的主導之下被推遲、被重塑。等到盧卡·朱可夫離去之時，將軍們已然明白：他們並沒有把他拉進自己的陰謀。是他，把他們拉了進去。"
 SRU_Luka_Phase_One.1.a:0 "一切都按計畫進行。"
 SRU_Luka_Phase_One.2.t:0 "俄羅斯雅各賓委員會的成立"
 SRU_Luka_Phase_One.2.d:0 "某個深夜，俄羅斯凜冽的寒冬侵襲著新西伯利亞這座城市。街道幾乎空無一人，只有寥寥幾個人還待在戶外，硬撐著西伯利亞的嚴酷天候。多數人都待在自家屋內，安全而溫暖，愚蠢地覺得自己彷彿能免於這場撕扯著俄羅斯的紛爭。在遠離窺探目光之處，在空蕩荒僻的巷弄與街道盡頭，一群人聚集在一間餐廳大堂裡，人數不超過四十。他們隱身於此，圍坐在幾張桌旁，享受著佳餚、美酒與彼此的陪伴。\n\n他們齊聚於此，是為了一年一度的雅各賓聚會。成員多半是俄羅斯的中產階級，理想統一在同一面旗幟之下。中央那張桌子坐著黨內的高層人物；坐在首位、兩側無人敢與之並列的，是盧卡·朱可夫。他高踞席上，俯視著那一群群為自身聲望而攀附鑽營、爭相博取朱可夫青睞的人。對這一大群令人生厭的安全官僚與平庸的行政官吏，他似乎興致索然。\n\n圍坐在他身旁的是雅各賓派系的其他要員。他右手邊坐著經濟部長扎伊采夫，一位偏好以較溫和手段推行雅各賓主義的改革派；與朱可夫不同，他的注意力全在眼前那杯美酒上。\n\n盧卡的左手邊是契卡首腦庫利科娃，她像鷹隼一般注視著盧卡，審視著他的一舉一動。此外還有索羅金娜，黨內四巨頭中最年輕的一位；她一如既往地自得其樂，渾然不覺周遭的暗流。一切照舊進行著。這場宴席洋溢著雅各賓派近日在人民代表大會中獲勝的歡欣氣氛，然而有些人的收穫遠比他人豐厚，空氣中瀰漫著一股嫉妒的氣息。忽然，午夜的鐘聲敲響，盧卡·朱可夫站起身來。扎伊采夫隨後起身，輕敲酒杯，喚起全場的注意。\n\n喧鬧迅速沉寂下來，一股不安的氛圍籠罩了大廳。盧卡開口道：「我最親愛的朋友與同僚們，今夜我們慶祝我們在人民代表大會中的最新勝利。我們的黨如今已與全聯盟共產黨的其餘部分結成聯盟；隨著我近日出任總理，我們的影響力與日俱增。很快地，革命的命運將由我們來決定，而我們必須引領它開花結果。為此，我已下令成立俄羅斯雅各賓委員會，由它來主持這個國家真正的治理，而全聯盟共產黨儘管去死抱著他們自以為握有的權力幻覺吧。」\n\n大廳霎時爆出對盧卡的歡呼與讚頌，但他示意眾人安靜。他繼續說道：「我的雅各賓同志們，若要確保我們的革命存續下去，我們就必須團結在唯一的一位領袖之下。因此，自今日起，我將成為雅各賓領導層唯一的權威，而我的三位同志將隨侍在側，協助我擎起革命的火炬。革命萬歲，俄羅斯萬歲！」\n\n大廳齊聲高呼著盧卡的話語：「革命萬歲，俄羅斯萬歲！」那些話語在夜空中迴盪，連地平線上正在逼近的風暴也不能將其壓下。"
 SRU_Luka_Phase_One.2.a:0 "'革命萬歲！'"
 SRU_Luka_Phase_One.3.t:0 "一位有著鋼鐵之心的革命者"
 SRU_Luka_Phase_One.3.d:0 "新西伯利亞舊總督府的宴會廳曾經屬於寡頭。不過，舊政權的一切痕跡都迅速被雅各賓的旗幟所抹去。在那些旗幟之下，站著軍方的軍官與全聯盟共產黨的黨代表。盧卡·朱可夫立於大廳首端，身後是革命的旗幟；再往後坐著全聯盟共產黨的中央領導層。一側站著中原將軍、維羅妮卡·阿列克謝耶娃元帥與軍方幕僚；另一側則是雅各賓派系的領導層。所有人都明白，西伯利亞人民共和國的存續毫無保障——西有葉卡捷琳堡公國這個俄羅斯的僭偽政權與歐盟干涉區，東有如今的歐洲不列顛尼亞。盧卡任沉默延續了片刻，才開口。「革命的同志們，一個民族總有必須決定自己是生是死的時刻。」他的聲音傳遍整座宴會廳。「多年來，俄羅斯在歐洲的枷鎖下支離破碎。當我們遠遠地袖手旁觀時，我們的敵人蹂躪著我們摯愛的祖國。如今，異邦的異教徒盤踞在我們最外圍的疆土上。一個沉寂了近一個世紀的舊日禍患正在重現。絕不能容許這些僭偽者阻擋我們的革命。他們以為我們孱弱、毫無準備、支離破碎。」他頓了頓。「我們將證明他們錯了。」大廳中掠過一陣低語。「我們已忍受了一個世紀的紛爭、衝突、背叛與占領。然而今夜，我們依然屹立於此。」盧卡的聲音變得尖銳。「俄羅斯並沒有忘記我們。這麼多年來，俄羅斯只是在等待我們歸來。」軍官們立正肅立，黨代表們則傾身向前。「歐洲不列顛尼亞以為，他們能從太平洋彼岸決定我們國家的命運。歐洲聯合體堅信，俄羅斯將繼續是一個破碎而任人剝削的民族，一個注定受辱的民族。而沙皇則以為，我們的革命不過是又一簇終將自行熄滅的火焰。」他朝著旗幟舉起手。「但這場革命絕不動搖。在我手中，絕不。它將憑藉意志、勞動、犧牲與戰爭，在歷史上取得屬於它的位置。」掌聲響起，並且逐秒高漲。\n\n盧卡的神情依舊凌厲。「讓韋萊訥公爵聽見我們。讓他們的神聖騎士團聽見我們。讓他們的皇帝聽見我們。俄羅斯人民絕不向任何人屈膝。革命絕不動搖。這場革命必將戰勝那些扼住其誕生之地的異邦之手。」他的聲音愈發高亢。「今夜，我們拋開對和平的最後一絲幻想。與那些從我們的孱弱中牟利的人之間，不容有任何寬貸。與那些把占領稱作正義的人之間，不容有任何妥協。只要歐洲不列顛尼亞與我們其餘的敵人還踏在我們的土地上，俄羅斯就沒有未來。」宴會廳再度陷入寂靜。盧卡雙手按在講台上。「因此，我謹依政治局之權柄、全聯盟共產黨之授權，以及人民之意志，宣布西伯利亞人民共和國與歐洲不列顛尼亞之間，自此進入戰爭狀態。」有那麼一秒鐘，全場只有沉默。隨即，大廳沸騰了。軍官們以拳擊胸，與會者起立鼓掌，吊燈在這股純粹的聲浪中震顫不已。盧卡在這場風暴之中巋然不動。「莫要有人誤以為這是一場復仇之戰，」他繼續說道。「復仇對如今的我們而言太過渺小。這不是一場為了正義的戰爭，而是一場為了我們天命的戰爭。我們進軍，是為了讓俄羅斯永不再屈服於世上的強權。我們進軍，是為了讓每一位工人、每一名士兵、每一個生在我們旗幟之下的孩子，都能繼承一個國家……不，是一個值得為之奮鬥的世界。」他最後的話語如利刃般劃破掌聲。「同志們，漫長的屈辱於今夜終結。俄羅斯崛起。革命前進。而歷史將銘記：當我們的敵人前來毀滅我們時，他們遇上的，是一群有著鋼鐵之心的人民。」宴會廳在歡呼中震動。屋外，電報局開始拍發宣戰的電文。橫貫整條戰線，密封的命令被一一啟封。在各處營房裡，士兵們在黎明之前被喚醒。戰爭，開始了。"
 SRU_Luka_Phase_One.3.a:0 "朱可夫同志萬歲！"
 SRU_Luka_Phase_One.4.t:0 "決定國家命運的利劍"
 SRU_Luka_Phase_One.4.d:0 "作戰室顯得比實際更為狹小。地圖佔滿了牆面，層層疊疊布滿墨跡與戰術修正，每一道線條都訴說著一段進攻或撤退的故事。窗玻璃上結著霜。新近獲任代理最高統帥的維羅妮卡·阿列克謝耶娃元帥站在長桌首端，雙手輕輕搭在冰冷的金屬桌面上。她周圍坐著西伯利亞革命共和國十三位最高階的軍事將領。所有人都清楚他們今日為何而來。「諸位皆知，革命正為其存亡而戰；我們的敵人歐洲不列顛尼亞，將不擇手段摧毀我們所堅信的一切。」她終於開口，「總理囑我召開此次會議，以決定新的最高統帥人選，由其承擔起引領我們的革命跨越絕望之橋的重任。」她面前擺著兩份卷宗。「我們已將人選縮減至兩人。」\n\n她翻開第一份。「米哈伊爾·科瓦廖夫。」一位由士兵晉升為指揮官的功勳軍人，革命英雄阿爾喬姆·科瓦廖夫之子。他以老派的方式贏得敬重——從麾下弟兄那裡一點一滴掙來。然而，他認為軍隊不應與政府糾纏在一起。她合上卷宗。第二份卷宗要薄得多，其中許多頁已被撕去。中原翔平。一名外來者。一個失去了故土的男人，如今卻站在一片對他而言全然陌生的土地的中心。他精通現代戰爭；比起科瓦廖夫，他少了幾分猶豫。為了追逐那根牽引著他的線，他願意付出極大的犧牲。他無法激起任何忠誠，卻能以無人能及的方式強加秩序。他有契卡的支持，以及朱可夫總理的青睞為後盾。\n\n阿列克謝耶娃緩緩吐了口氣。「其中一位帶給我們力量與悲憫，」她說，聲音劃破了寂靜，「另一位帶給我們的，是一場沒有盡頭的必勝之局。」一陣低語泛起，旋即又迅速沉寂。她抬起頭。「科瓦廖夫能打贏戰役，」她繼續說，「他能把軍隊帶上新的高度。但他不會完全屬於我們。不屬於黨，也不屬於主席。」她停頓了一下。「中原則會照總理的命令行事。」這句話比任何論證都更有分量。「他會把軍隊塑造成某種……絕對之物。沒有猶豫。沒有異議。沒有投降。」她讓這番話懸在空中片刻。「也沒有獨立性。」室內起了騷動。有人坐得更直，有人則避開她的目光。\n\n空軍主帥吉洪·別洛夫率先謹慎地開口：「我們需要勝利，元帥同志。」阿列克謝耶娃點了點頭。「是的。」接著，艦隊司令斯特凡·米哈伊洛夫也發了言：「但我們必須決定，我們要締造的是何種勝利。」她的視線再度落回那兩個名字上。科瓦廖夫，那個能保全軍隊根基的軍人。中原，那個能把軍隊改造成一部不可阻擋的戰爭與暴力機器的將軍。未來只繫於一個決定。阿列克謝耶娃合上了兩份卷宗。當她再度開口時，語調沉穩：「付諸表決。」室內開始運轉起來。無論最終選中哪個名字，有一件事已成定局：軍隊將再也不復從前。"
 SRU_Luka_Phase_One.4.a:0 "'任命米哈伊爾·科瓦廖夫——軍隊必須保持獨立'"
 SRU_Luka_Phase_One.4.b:0 "'任命中原翔平——軍隊必須忠誠'"
 SRU_Luka_Phase_One.5.t:0 "與魔鬼本人的會面"
 SRU_Luka_Phase_One.5.d:0 "傳召令是在午夜之後送達的。米哈伊爾·科瓦廖夫發現革命執政團幾乎空無一人，走廊裡只有昏暗的燈光，以及不敢與他對視的衛兵。中央大廳的盡頭，盧卡·朱可夫在他的辦公室裡等著，正站在一份詳載科瓦廖夫全部履歷的契卡檔案前。「你在軍官團中愈來愈得人望了。」盧卡沒有回頭。科瓦廖夫立正站著。「弟兄們敬重的是戰果。」盧卡轉過身來面對他。「是啊，」盧卡答道，「正因如此，軍中的人望從來都不是無害的。」沉默橫亙在兩人之間。盧卡翻開卷宗，裡頭是來自前線的報告：勝績、傷亡數字、被截獲的談話，以及那些已開始稱科瓦廖夫為「革命的鬥士」的士兵們私下的稱頌。「你認為軍隊應當不涉政治。」盧卡說。「我認為軍隊應當能自由地贏得戰爭。」盧卡淡淡一笑：「多麼漂亮的區分。危險，但漂亮。」他向前逼近一步。「軍隊並不外在於革命，米哈伊爾。總有一天，我們幾乎不再需要軍隊。」科瓦廖夫神色一凜：「主席召我來此，是為了威脅我嗎？」盧卡輕聲笑了笑。「不，」盧卡柔聲說道，「我若想威脅你，來的會是庫利科娃。」\n\n盧卡在桌上又擺了一份文件：一道關於重組軍事指揮體系的命令。底部留著科瓦廖夫的簽名欄。「你將支持把『政治上可靠的』軍官編入你的野戰指揮部，」盧卡說，「你也將宣誓：一旦索尼婭被逐出權力核心，你便效忠於我。」科瓦廖夫低頭看了看那份文件，又抬眼看他。「若我拒絕呢？」盧卡的聲音依舊平靜。「那麼在最糟糕的時刻，軍隊將失去它最受敬重的指揮官。當俄羅斯與整個世界撇下你繼續向前時，你將被歷史的篇章所遺忘。」他微微傾身。「但你若答應，便可留在原位。你可以活下去。你將引領軍隊走過接下來的一切。」科瓦廖夫這才明白過來。盧卡要的並不是忠誠，他遞來的是一只牢籠——正如他對索尼婭所做的那樣。在漫長的沉默之後，科瓦廖夫拿起了筆。「為了革命。」盧卡說著，把手搭上科瓦廖夫的肩膀。科瓦廖夫簽了字。「為了人民。」他答道。\n\n盧卡望著他離去，臉上浮現一絲極淡的滿足。到了黎明，軍隊將聽聞科瓦廖夫已為那些披著「軍隊獨立」外衣的改革背書。到了正午，軍官團便會開始按主席的意志自我調整。擊敗軍隊、將其踩在朱可夫主席腳下的，不是刀劍，而是那支筆。"
 SRU_Luka_Phase_One.5.a:0 "'最卓越的最高統帥。'"
 SRU_Luka_Phase_One.6.t:0 "赤色將軍"
 SRU_Luka_Phase_One.6.d:0 "記憶零零碎碎地回到中原翔平心中：雨水順著瓦頂滑落，菸味黏附在濕透的軍服上，澤崎的部長們沒完沒了地談論著日本的解放，而不列顛尼亞卻正一步步收緊對Area 11的鉗制。流亡政府早已把拖延的語言運用得爐火純青。每一場會議都許諾行動，每一週卻都證明並非如此。盟友一個個消失。計畫一改再改，直到失去所有意義。中國喧囂鼎沸，卻空無實權。就在那時，中原第一次聽見盧卡·朱可夫這個名字。消息來自一位前往洛陽向朝廷進貢的哈薩克男爵。他說，「朱可夫」是流亡中亞的紅軍的執行者，一個能把混亂化為機遇的男人。他的革命正準備向北出擊，奪回俄羅斯，並將自那場大戰以來一直剝削它的歐洲占領者驅逐出去。中原聽完了，然後他走了。他毫無預警地與澤崎的政府斷絕了關係，奪走了它最能幹的軍事顧問。倘若日本終有解放之日，那也絕不會由一群把苟活誤認作戰略的人來完成。它需要力量，真正的力量——而中原懷疑，盧卡·朱可夫正擁有這樣的力量。契卡在阿特勞城外攔下了他。他們早已聽聞有一名日本軍官正在尋訪一位行蹤成謎的革命者。他們悄無聲息地來到，替他戴上鐐銬，往他頭上罩了個頭套。若是換作另一種人生，中原會奮起反抗。這一次，他任由自己被帶走。畢竟，這是見到盧卡·朱可夫最快的方式。\n\n頭套被摘下時，中原發現自己身處阿特勞地下的一間審訊室。頭頂只有一盞閃爍的燈。對面牆上，一面單向鏡冷冷注視著。空氣中殘留著血腥味。門開了。盧卡·朱可夫獨自走了進來，大衣扣得整齊，腋下夾著一份卷宗。他先端詳了中原一番，才將卷宗翻開。「這麼說，」盧卡開口，「那個拋棄了一個垂死政府的日本流亡者，找上了我的門。你為何而來？」「因為我想知道那些傳聞是否屬實。」「哪些傳聞？」「說你能做到別人只會空口承諾的事。」盧卡把卷宗合上一半。「當心。相信傳聞的人，通常會死在追逐它的路上。」「那就好，因為我不信童話。」這話讓盧卡覺得有趣。「那你信什麼？」「結果。」盧卡的興趣頭一次被真正勾起。「那日本呢？」中原的下顎繃緊了。「日本被我們共同的敵人占領。倘若讓不列顛尼亞為所欲為，它很快就會面目全非。我打算不惜任何代價奪回它。」「所以你是來向我求取解放的？」「我來找你，是因為我需要一樣值得為之而戰的東西。」盧卡的笑容微微斂去。「如今這年頭，坦誠實在太罕見了。」他瞥向那面單向鏡。「都退下。」玻璃後方傳來腳步遠去的聲音。此刻只剩他們兩人。盧卡把卷宗擱在桌上。「像你這樣的人通常追求的是財富、權力，或復仇。」「我只想要一樣東西，」中原說，「日本的自由。」「你願意為了解放自己的祖國，而效力於一場外國的革命？」「只要是能通向日本的路，我都會走。」\n\n盧卡端詳了他片刻。「你並不忠誠。你不是社會主義者。你也不是俄羅斯人。告訴我，我為何要留你一命？」「因為你們許多革命者已經享受和平太久了。有些人懂得犧牲。但我懂得戰爭。我這一生都活在戰爭裡。」頭頂的燈嗡嗡作響。「最後一個問題，將軍。倘若我承諾把日本給你，你會相信我嗎？」中原短促地笑了一聲。「不會。」盧卡緊緊盯著他。「但只要你給我奪回它的手段，」中原接著說，「我就會追隨你，直到我迎來自己的命運，或你迎來你的。」盧卡上前一步，解開了他的鐐銬。「很好。從此刻起，你為我效力。」中原起身，立正站好。「我謹向您宣誓效忠，朱可夫主席。」盧卡的神情依舊沉著，近乎安詳；然而在那份靜謐之下，中原察覺到一絲極其微弱的同理。"
 SRU_Luka_Phase_One.6.a:0 "'我的榮譽已死於流放。我的使命卻未曾殞落。'"
 SRU_Luka_Phase_One.7.t:0 "士兵們士氣高昂"
 SRU_Luka_Phase_One.7.d:0 "「如您所見，索羅金娜女士。您加派的學員已經對我們產生了影響，這裡您可以看到他們正在接受教練……」那聲音漸漸低了下去，因為索羅金娜的目光正專注地落在別處。那雙略帶粉色的紅寶石般的眼眸，襯著漆黑的虹膜，正四下打量。她銳利的目光首先捕捉到的是新落的雪。寒冬不斷侵襲著新西伯利亞與整個西伯利亞，此處也不例外。她無視了它，就像無視地上的石子一樣。她無視了那股附著在鄰近建築上的霜氣，也毫不在意那些正在清理通道的人們。\n\n她的目光鎖定了談話的主題。一排排看來稚嫩、身上撲著雪粉的西伯利亞受訓者，正被一位穿著全套制服的年長男子操練著。他們站得筆直，紋絲不動，把他說的每一個字都聽了進去。他們看上去更像是聽命行事的機器人，而非學員——是她把他們塑造成這樣的。「我看見了，博洛托夫。我想知道的是，這對其他士兵有什麼影響？」索羅金娜的嗓音輕柔，有人會形容它猶如羽毛飄落的聲響。即便邊走著，她的注意力仍停留在那些人身上。她舉起戴著潔白手套的手。為她引路的男人瞥見了這個動作，卻繼續往前走。她能感覺到他的目光正盯著自己，於是柔柔地笑了。\n\n她不能怪他，畢竟她穿著這身制服的模樣確實美麗。這身制服象徵著地位，是薄荷森林綠的顏色；頸間綴著白色的皮草領，將制服的外部與內裡隔開——內裡是一件較為素樸的挺括白襯衫，繫著一條緊實的黑色正式領帶，外罩深栗紅色背心。「女士，我不太明白您指的是什麼。雅各賓革命軍的這座基地並未因他們的加入而出現任何不良影響，每一位士兵都在為國盡忠。」索羅金娜逮到他了，她確信如此。他說話時，聲音有那麼一瞬的顫抖。\n\n她捕捉到的那種語氣，是被迫、被脅迫著談論某事，或是遭受了壓力。而她逮到他的那一刻，正是他提到雅各賓革命軍之時。他們已經走了好一段路；索羅金娜突然停下腳步，不再看那些受訓的學員。此刻兩人站在一棟營房外挑出的屋簷下，她盯著他打量。「你看來像是有話不能說，博洛托夫。事實上，你看起來像是有把刀正架在你的喉嚨上。」他此刻臉上的神情，活像個偷竊被當場逮住的人，滿是被震懾的意味。他連忙讓自己鎮定下來。\n\n「女士，倘若您是在暗示我玩忽職守，那麼您大可——」索羅金娜迅速地厲聲打斷了他，她的聲音讓他戛然而止，彷彿被步槍射出的子彈擊中一般。「我完全不是這個意思，博洛托夫。我來這裡是為了視察，看看我的舉措帶來了什麼結果。所以，若你對學員的編入有任何怨言、任何問題，請務必提出來讓我知曉。」此刻出現了一陣突兀的停頓，一段等待的時光。博洛托夫望著索羅金娜，斟酌著接下來的措辭。然後他再度開口，語調聽來就像脖子上的絞索終於鬆了一些。\n\n「這個嘛……女士，我的第一項怨言是：請先以我的軍銜稱呼我。」索羅金娜的第一個反應，是綻開一個燦爛的笑容，露出珍珠般潔白的牙齒，隨後發出一串輕快而爽朗的笑聲。"
 SRU_Luka_Phase_One.7.a:0 "'呵呵，那是當然，博洛托夫軍官。'"
 SRU_Luka_Phase_One.8.t:0 "漫漫長夜"
 SRU_Luka_Phase_One.8.d:0 "會議定在日落之後。到那時，執政團裡已幾乎渺無人跡。在朱可夫主席的辦公室裡，爐火低低燃著，將影子投上牆面。瑪麗安娜·索羅金娜手捧一份卷宗，站在盧卡面前。裡頭是數百個名字——那些與契卡作對後便人間蒸發的格魯烏線人。數週以來，瑪麗安娜蒐集著塔莎·庫利科娃越權的證據，深信只要盧卡看清真相，他便會有所行動。她把卷宗擱在他的辦公桌上。「主席，契卡已不再保護人民。它是在奴役人民。」盧卡沒有立刻翻開卷宗，他只是看了看它，又看了看她。「你似乎誤解了契卡最初的目的。」瑪麗安娜面露困惑。「你在說什麼？」盧卡還來不及回答，門開了。塔莎·庫利科娃昂首闊步走了進來，彷彿這地方是她的一般。瑪麗安娜僵住了。庫利科娃以一個譏誚的笑容向她致意。「哦，別這麼吃驚嘛，安娜。又不是只有你懂得如何取得情報。」瑪麗安娜垂在身側的雙手攥緊了。「這不關你的事。」塔莎輕笑一聲，穿過房間，把自己的卷宗擱在瑪麗安娜的旁邊。盧卡先翻開了她的那份。瑪麗安娜一見之下面色慘白。裡頭是被截獲的訊息、她與科瓦廖夫及扎伊采夫會面的紀錄，還有數名受格魯烏特工暗中庇護的軍官名單。塔莎柔聲說道：「你以為自己在構築一張無跡可尋的網。可是任何一張網，都會投下影子。」瑪麗安娜轉向盧卡。「我是想拯救人命。想更快地結束戰爭。想阻止她把革命變成一座集中營。」塔莎伸手取了根菸。「也是為了在主席的掌控之外培植影響力。」塔莎補了一句。瑪麗安娜厲聲反擊：「因為你的掌控就是毒藥！」塔莎的笑容更深了。「來了。這位小女英雄總算露出獠牙了。」盧卡始終沉默地讀著。他的沉默，比塔莎任何一句指控都更傷人。\n\n瑪麗安娜上前一步。「盧卡，你知道她是什麼樣的人。你知道她做過什麼。」盧卡望向塔莎。「我知道，」盧卡終於開口。室內霎時凝滯。瑪麗安娜端詳著他的臉，等待著裁決、等待著憤怒，等待著任何東西。然而，盧卡只是把兩份卷宗都合上了。「塔莎的手段過激。但如今比以往任何時候都更加必要。」瑪麗安娜倒吸了一口氣。塔莎湊得更近，聲音低沉而柔滑。「你以為這是你和我之間的鬥爭。真是可愛。」她緩緩繞著圈，目光始終不離瑪麗安娜。「你把自己想像成我的制衡，一股正義的力量，主席肩上最後一隻溫柔的手。」她的聲音變得冷硬。「但你從來就不是在與我對抗。」她在盧卡的桌邊停下。「你從來就不是我的對手。」瑪麗安娜以目光如刀般瞪著她。塔莎歪了歪頭。「別太抬舉自己了。你從來就不是這盤棋裡的棋手。你不過是更高權力手中的一枚卒子。」那些話如利刃般刺穿了她。\n\n瑪麗安娜最後一次望向盧卡。「這是真的嗎？」有那麼一瞬，他眼中似有幾分近乎懊悔的神色。但它很快便消散了。「你將暫停格魯烏一切涉及內政的獨立行動，」盧卡說，「你的軍方網絡將接受審查。經判定忠誠者，可在監督下繼續運作。」瑪麗安娜的聲音低成了耳語：「那被判定不忠的呢？」無人作答。因為所有人都知道答案。塔莎收起兩份卷宗，夾在腋下。「長夜難熬，」她說，「但黎明屬於那些堅強到足以熬過它的人。」塔莎離開房間時，瑪麗安娜一動不動地站著。盧卡轉身望向爐火。「你該休息了，瑪麗安娜；你今天累了一整天。」她露出一個苦澀而破碎的微笑。「不，主席。我想我終於清醒了。」在她身後，門輕輕闔上，而漫漫長夜仍在繼續。"
 SRU_Luka_Phase_One.8.a:0 "這不過是時間問題。"
 SRU_Luka_Phase_One.9.t:0 "坦能鮑姆特工來電"
 SRU_Luka_Phase_One.9.d:0 "以新西伯利亞的酷寒氣候而言，這個午後異常地溫和。盧卡·朱可夫與列昂尼德·扎伊采夫坐在革命執政團有頂棚的露台下，俯瞰著花園——革命的機器隆隆向前，園中草木也隨之繁盛。兩人之間擺著一套銀質茶具、幾份未曾翻動的報告，以及兩個暫時擺脫了執政團那套變幻莫測官僚體系的男人之間那份自在的沉默。瑪麗安娜·索羅金娜打破了這份寧靜。她走上前來，手裡拿著一份薄薄的黑色檔案，上頭蓋著格魯烏的金色印璽。盧卡看著她在自己對面的空椅上坐下，卻沒有為她斟茶。「這件事想必很重要，」他說，「你很少在列昂尼德假裝不工作的時候打擾他。」扎伊采夫舉起茶杯：「我覺得這種佯裝很能養神。」瑪麗安娜把檔案放在桌上，推到盧卡面前。「坦能鮑姆特工聯繫我們了。」瑪麗安娜說。\n\n盧卡的神情依舊沉著，注意力卻銳利了起來。坦能鮑姆數月前便被安插進歐洲不列顛尼亞的社會，隱身在一個虛假的身分與一份平淡無奇的官僚職涯之下。近來的報告顯示，他已打入帝國政府的核心行政圈。「他請求啟動。他聲稱能取得軍事部署計畫，以及數名高階貴族的私人通訊。」瑪麗安娜說。「或者他已經暴露，而歐洲不列顛尼亞的情報機構正在下餌，引誘我們曝露自己的網絡。」盧卡回道。「這種可能性確實存在，」瑪麗安娜承認，「但他提供的情報，與我們在該地區的地方細胞獨立蒐集到的資訊相符。」盧卡低頭看著那份尚未開啟的卷宗。「他要什麼？」瑪麗安娜替他翻開卷宗。「行動的授權。額外的經費，以及在帝國各部會中吸收線人的許可。」盧卡神色一緊。「所以他要我們把整張網絡押在他能持續效忠的賭注上？」盧卡問。\n\n瑪麗安娜傾身向前。「他能給我們軍隊給不了的東西：直達敵國政府心臟的影響力。倘若他成功了，歐洲不列顛尼亞便可能開始依據我們挑選給他們看的情報來作決策。」扎伊采夫小心地把茶杯放回托碟上。「一場昂貴的豪賭，」他評論道，「不過比起再向東發動一場代價高昂的攻勢，可是便宜多了。」盧卡瞥了他一眼：「這算是背書嗎？」扎伊采夫一副事不關己的樣子。「只是單純的經濟觀察罷了。戰爭所費不貲；而間諜，如今看來是更有回報的投資。」瑪麗安娜藏起一絲淺笑。「我們可以把行動分艙隔離。坦能鮑姆只會拿到他所需的東西。倘若他已遭滲透，對我方網絡的損害也將止於他一人。」\n\n有那麼片刻，只有瓷器輕碰的聲響打擾著這方露台。盧卡終於低頭看向那份卷宗，端詳裡頭的照片：一個穿著平凡西裝的平凡男人，置身於一群足以決定戰爭走向的人物之間。「啟動他，」盧卡說，「不要讓他直接知悉我們更大的網絡。倘若他忠誠，他將成為我們插進他們政府心臟的刀刃。」扎伊采夫點頭表示同意。盧卡合上檔案。瑪麗安娜起身，取回卷宗。「坦能鮑姆特工今晚就會收到指令。」她離去後，扎伊采夫為盧卡又斟了一杯茶。「她來之前，你就已經打定主意了。」他評道。「那是自然。」盧卡微笑。「那你為何還要讓她費一番唇舌來說服你？」扎伊采夫問。盧卡望著瑪麗安娜的身影消失在執政團的深處。「因為當一名特工的上線相信這場行動是屬於他自己的，他才最有用處。」扎伊采夫端詳了他一會兒，隨後靜靜地回頭品他的茶。"
 SRU_Luka_Phase_One.9.a:0 "啟動坦能鮑姆。"
 SRU_Luka_Phase_One.10.t:0 "安東諾夫陰謀"
 SRU_Luka_Phase_One.10.d:0 "西伯利亞人民共和國 \n\n情報總局（格魯烏） \n\n僅限本人閱覽——盧卡·朱可夫主席 \n\n密級：絕密 \n\n日期：【已刪除】 \n\n主旨：刺殺歐洲不列顛尼亞韋萊訥大公未遂案 \n\n行動摘要： \n\n一支由三人組成、活動於歐洲不列顛尼亞鄂霍次克首府區的社會主義細胞發動了一次武裝行動。預定目標為韋萊訥大公，其時正前往與皇帝查爾斯·滋·不列顛尼亞會面。該次攻擊原定循兩條路徑實施：主要路徑為自制高點發動的狙擊火力，次要路徑則為預先藏設於車隊行經路線上的臨時爆炸裝置。此次行動因米歇爾·曼弗雷迪意料之外的介入而告失敗；經查，此人為歐洲不列顛尼亞神聖騎士團之一的關鍵軍事人物——該騎士團係於歐洲不列顛尼亞境內運作的特殊軍事組織。 \n\n執行此次行動的社會主義細胞折損二人，第三名行動人員則在試圖逃離現場時遭到逮捕。由於此次行動，歐洲不列顛尼亞的情報機構已在其首府展開清查行動，並可能擴及其餘的占領區。 \n\n局長評註（呈主席核閱） \n\n此次行動的失敗固然令人遺憾，但若處置得更為細膩，或仍可為我方更宏大的目標所用。歐洲不列顛尼亞如今正在自己的領土上追捕幻影。我們可以操縱他們的調查方向，使其遠離我方安插在其政府內部的人員。此外，職建議授權坦能鮑姆特工除掉該細胞的殘餘成員，以確保所有線索悉數斬斷。 \n\n呈報人： \n\n中校 帕維爾·葉爾莫洛夫 \n\n格魯烏副局長 \n\n§R本文件於送達相關人員後應即銷毀§!"
 SRU_Luka_Phase_One.10.a:0 "真是可惜。"
 SRU_Luka_Phase_One.13.t:0 "距午夜還有七分鐘"
 SRU_Luka_Phase_One.13.d:0 "中央局大樓那結滿霜的窗外，寒風呼嘯。室內冷冽而昏暗，唯有紙張的沙沙聲與頭頂燈具低微的嗡鳴打破這份氛圍。生產圖表、運輸清單與傷亡報告堆滿了長桌。列昂尼德·扎伊采夫坐在遠端，臉上寫滿了又一個漫長工作日的疲憊。在他對面，總理盧卡·朱可夫一動不動地站著，端詳著一幅倉促改動過的俄羅斯地圖——上頭插滿了圖釘，紅線串連起前線、補給站與死城。\n\n扎伊采夫從鼻腔裡吐出一口氣，聲音因疲憊而低沉。「我們正在燒光僅剩的一切。每一座工廠都已動員，每一列火車都被調去運送士兵上前線。照這個速度，我們消耗這個國家的速度，比我們保衛它的速度還快。六個月之後，就算打贏了這場仗，也沒剩什麼可供治理了。這種做法對我們而言難以為繼。」\n\n盧卡沒有回頭。他的目光沿著地圖的邊界游移，宛如一位將軍在勘察戰場。「那如果我們打輸了呢，列昂尼德？屆時將不會有人民需要餵養，不會有工廠，也不會有革命。如今戰爭就是國家。生存已經取代了意識形態。」盧卡說。「你說得好像沒有中間地帶似的，」扎伊采夫的語氣強硬起來，「我要的不是奇蹟，只是秩序。給工人麵包，給工廠鋼鐵。現在就開始建設，如此當砲聲終於沉寂之時，我們統治的才不會是一堆瓦礫與白骨。」\n\n盧卡終於轉過身來。燈光在他臉上投下一道詭異的陰影。「你想在革命還在燃燒的時候搞建設，」他直截了當地說，「我要的是確保無論革命必須承受什麼，它都還屹立著。」扎伊采夫的手顫抖著，把一份生產報告揉成一團。「我們正在把革命本身拿去抵押啊，主席同志。當人民餓到再也無法相信它的時候，會發生什麼事？當社會主義淪為只剩一座營房和一身制服的時候，又會如何？」\n\n盧卡走近一步，他的影子橫過整張桌子。「那如果我們停下來、如果我們猶豫，而敵人把我們整個吞噬了，又會如何？革命已經不再是一個理念。它是一部活生生的機器。它吞噬，是因為它不得不吞噬。至少目前如此。」扎伊采夫迎上盧卡的目光。「那就讓它成為一部懂得何時該停下的機器。否則總有一天，它也會把你吞噬。」\n\n盧卡久久不語。然後，他近乎溫柔地把一隻手搭上扎伊采夫的肩膀。「等我們重新擁有一個國家的時候，列昂尼德。你會如願以償的。你的命運。你的天命。」他頓了頓，聲音低成了耳語。「但在那之前，讓我先贏得這場戰爭。」燈光閃爍，把兩人的影子投在牆上的地圖上：一立，一坐；兩個為同一場革命所繫縛的人，凝望著同一片黑暗，卻看見了截然不同的終局。"
 SRU_Luka_Phase_One.13.a:0 "誘人的圖表把我的書桌埋了。"
 SRU_Luka_Phase_One.14.t:0 "一場永恆的戰爭"
 SRU_Luka_Phase_One.14.d:0 "雪花穿過一座半成的軍工廠的骨架般的鋼構飄落，積在鋼樑與凍土之上。探照燈在慘白的午後嗡嗡作響，將長長的影子投在辛勞的工人身上。遠處的砲火聲，聽來竟比寒冷本身更為沉重。列昂尼德·扎伊采夫站在建築工人之間，肩上披著一件毛皮鑲邊的大衣，靴子踩在新結的霜上嘎吱作響。他周圍，工人們搬運著鋼材，工程師們在西伯利亞的刺骨寒風中扯著嗓子喊話，軍官們則以監工之姿注視著工人的一舉一動。這片冰封的凍土，正在成為一部偉大戰爭機器的第一個齒輪。\n\n扎伊采夫細看著一張藍圖，向身旁的工地工程師說道：「你們進度落後了。車床間的強化冷卻系統，必須在霜凍變硬之前裝好。否則第二條生產線撐不到春天就會癱瘓。」工程師不安地挪動身子。「我們的銅管不夠。銅管被調撥到東南前線的軍火廠去了。是巴拉諾夫上校的命令。」扎伊采夫的目光沒有離開手中的圖紙。「調回來。他們若想在春天有子彈可用，就得先有製造彈殼的機器。」他終於抬眼迎上對方的目光。「另外轉告巴拉諾夫，若他有異議，大可直接向朱可夫總理陳情，並解釋一下他打算怎麼用沒有砲管的火砲開砲。」\n\n他穿過工地，走過一排排正卸下鋼材、為第二階段工程作準備的徵召工人。他們臉色蒼白，眼窩深陷，雙手因寒冷與疲憊而顫抖。扎伊采夫默默注視著他們，心裡想著：「總有一天，這些人不必再在工廠裡做牛做馬。等戰爭打贏了，西伯利亞將被改造成遠比今日更偉大的模樣。」\n\n一名工頭小跑著來到他身旁。「長官，有些弟兄說這塊地被詛咒了。從前沙皇的監獄就建在這裡。他們到現在還會在土裡挖出老鐐銬。這對士氣不好。」扎伊采夫毫不在意。「那就讓它提醒他們：為暴政而非進步效力，會落得什麼下場。」他登上一段尚未完工的天橋，俯瞰著整個組裝廠區：起重機來回擺盪，火花四濺，一根根柱子拔地而起，直指天際。有那麼難得的一瞬，底下的喧囂消隱於無。「總有一天，」他喃喃自語，「他們會稱這裡為勝利的豐碑。他們不會記得凍瘡與飢餓，只會記得那些戰爭的器械。」\n\n探照燈的嗡鳴更響了，第一聲蒸汽的汽笛刺穿了西伯利亞的酷寒荒原——那是盧卡·朱可夫的新俄羅斯中，又一件武器誕生的啼哭。"
 SRU_Luka_Phase_One.14.a:0 "一切為了進步。"
 SRU_Luka_Phase_One.15.t:0 "計算未來"
 SRU_Luka_Phase_One.15.d:0 "濃霧沉沉地壓在冰封的戰壕之上。遠處傳來砲擊沉悶的轟響，以及在雷霆般的彈雨下蜷縮於壕溝中、飽受砲彈驚恐折磨的士兵們的哭喊。半掩的屍體僵硬地陷在泥濘裡，另一些則躺在淺墓中，寒霜緊附在他們染血的軍服上。在一座由沙包與鏽蝕鋼材壘起的高台上，兩個身影俯瞰著這片破碎的大地——它如今已是戰場，是死亡的前兆。中原翔平一動不動地站著，望遠鏡緊貼著臉。他身旁，列昂尼德·扎伊采夫點起一根菸，手指微微顫抖——那不是出於恐懼，而是西伯利亞的嚴寒。\n\n沉默良久，扎伊采夫吐出一口氣，煙霧升向灰濛濛的天空。「原來我們的革命就長這副模樣：死去的士兵，毀壞的機器，以及把兩者一併吞沒的泥濘。」中原沒有轉身，語調平板。「不。這不過是達成目的的手段。只要軍隊補給無虞，革命就能撐到明天。」扎伊采夫神色一凜。「經濟正在我們一手炮製的這部戰爭機器的重壓下崩潰。上頭要我變出奇蹟，卻不給我變奇蹟的東西。西伯利亞已經無物可獻了。」他又吸了一口菸。「告訴我，你打算以戰略之名把我們榨乾到什麼時候？安樂死女士可以隨心所欲地槍斃任何人，而我卻被要求在一片墳場之上建造烏托邦——這片冰封荒原所能孕育出的最傑出的頭腦，有些就死在不遠處。」\n\n中原放下望遠鏡，終於迎上扎伊采夫的目光。「你誤會我了，列昂尼德。我太清楚戰爭的代價。不列顛尼亞入侵日本讓我明白了一件事：當經濟垮台時，軍隊也就垮了。單憑狂熱，我們贏不了。」扎伊采夫把菸彈進雪裡。「那我們有共識了。單憑意識形態贏不了這場仗，更別提讓這個國家再撐上幾年的戰爭。不過，也許我能滿足你的配額——只有一個簡單的條件。」中原揚起眉毛。「條件？」\n\n扎伊采夫望向地平線。「結盟。共同遏制庫利科娃和她的契卡。她是一團裹著制服的混沌；她會燒掉主席與我們的人民所建立的一切。」中原輕笑一聲，那笑聲罕見而尖銳。「原來如此。你怕的是失去自己的影響力。你懼怕的是熵本身；你怕革命會吞噬它自己的建築師。」扎伊采夫的回答坦誠卻緊繃。「沒錯。我怕她，是因為她殺人毫無目的可言；她殺人只為取樂。我只求當這場戰爭結束時，你能選擇站在歷史正確的一邊。」\n\n中原嘆了口氣，理了理手套。「政治讓我厭煩，列昂尼德。但為了穩定，也為了主席，我會幫忙約束她。作為交換，我的師團在一切軍需物資上享有優先權。沒有例外。」扎伊采夫點了點頭，冷峻的外表下綻出一絲笑意。「一言為定。等這場戰爭結束，我們會建起比眼前這片廢墟更好的東西。」中原轉身離去，靴子踩碎了地上的霜。當他步入濃霧之中，他的聲音飄了回來，平靜而遙遠：「如果它真有結束的一天。」"
 SRU_Luka_Phase_One.15.a:0 "戰爭，戰爭從未改變。"
 SRU_Luka_Phase_One.18.t:0 "一個靠帳本治理的國家"
 SRU_Luka_Phase_One.18.d:0 "燈火昏黃，廊道靜謐。扎伊采夫坐在辦公室的爐火旁，因又一天的會議而疲憊不堪，面前桌上的茶已漸漸涼透。門吱呀一聲；他伸手去摸手槍，但當格魯烏首腦瑪麗安娜·索羅金娜抱著一份卷宗走進來時，他鬆懈了下來。\n\n「啊，瑪麗安娜，我忘了我們約好要見面。」扎伊采夫抱起雙臂說道。「扎伊采夫同志，」瑪麗安娜坐下，將卷宗擱在兩人之間，「感謝您在如此倉促的通知下還願意見我。」她的聲音平靜，但那份鎮定之下透著一絲窘迫。「如您所知，我們曾承諾推行一項更全面的民生發展計畫。不知您是否願意撥出一些經費，用於檔案中所列的那些文化項目？」\n\n扎伊采夫瀏覽了片刻卷宗，才開口回答：「倘若你的目的純粹出於利他，你大可去找一位品級更低的部長，而不必拿這事來煩我。這你心裡有數。」她迎上他的目光。「那就別繞彎子了。您知道我為何而來。庫利科娃在我們的政府裡安插了眼線。我需要一個信得過的人，把經費透過民生基礎建設轉撥出去；若由您出面，庫利科娃在對青年團動手之前或許會三思。那些大隊是未來的幹部；沒有他們，我們就掏空了革命的靈魂。」他合上卷宗，啜了口茶。「瑪麗安娜，選邊站不是我會做的事——至少現在還不是。」\n\n瑪麗安娜臉上並無訝色。「可您早就選了；我聽說了她在您的局務規劃會議上鬧出的那樁事。」她輕聲說道。他嘴角浮起一絲苦澀的皺紋。「盧卡知道你這點小算盤嗎？」她哀傷地瞥向窗外，那裡橫陳著城市黑暗的剪影。「主席正忙於國事。他信任他所信任的那些幹部；我似乎不在其列。他的核心圈一天比一天小。」扎伊采夫嘆了口氣。「聽著，瑪麗安娜……這場戰爭讓我們所有人都付出了代價。等戰爭一結束，我可以向你保證，庫利科娃會得到她應得的下場。但眼下，她對主席仍有其用處。我可以提供一點援助，或者——更可能的是——餵她一些假情報，讓她分心。」\n\n瑪麗安娜站起身來，眼底殘留著失望。「那不夠。她已經把扳倒我當成了私人的興趣。」她抓起卷宗，轉身走向門口。當她拉開門時，扎伊采夫的聲音追了上來。「瑪麗安娜……盧卡若對你保持距離，並不是因為他不信任你。而是為了保你周全。」她頓住了，一隻手扶在門框上。有那麼一瞬，憤怒與哀傷交織著掠過她的臉。隨後她邁入走廊，留下扎伊采夫獨自面對他的深夜公務。"
 SRU_Luka_Phase_One.18.a:0 "確實是個有趣的夜晚。"
 SRU_Luka_Phase_One.19.t:0 "淌血的數字"
 SRU_Luka_Phase_One.19.d:0 "宴會廳裡瀰漫著香水味、樂聲，以及一群強顏歡笑的官員們枯燥的交談。扎伊采夫穿梭於人群之間，這裡那裡地與幾位黨務官員閒談幾句，設法掩飾自己的無聊。這是朱可夫主席那沒完沒了的「團結」酒會之一——實質上是一場向主席與黨表忠的儀式。\n\n他正在陽台附近與翔平低聲交談，一名契卡軍官走近，在他耳邊低語了幾句。扎伊采夫僵了片刻，隨即告退。他跟著那名軍官穿過一條側廊，廊上垂掛著紅色帷幔，以及革命前輩們的畫像——那些人如今早已作古。宴會廳的樂聲漸行漸遠、漸趨低沉，最終完全消失。\n\n走廊盡頭的門不待敲擊便自行開啟，彷彿他們早知他會來。門內光線昏暗，與宅邸其餘處那輝煌的燈火形成強烈對比；照亮整個房間的，只有一盞桌燈。塔莎·庫利科娃手夾香菸，站在窗邊；淡淡的煙味縈繞不散。她的制服一絲不苟；至於她的語調，那可就另當別論了。「扎伊采夫同志，」她說，卻沒有從窗邊轉過身來，「你最近很忙啊。」那名契卡軍官在他們身後把門關上。扎伊采夫問道：「你把我叫來這裡做什麼，塔莎？我沒空陪你玩這一套。」\n\n庫利科娃笑了笑，轉身面對他。「我很欣賞你這份鎮定。即便我手上握有你與其他黨員串通侵吞公款的證據。」她把菸灰彈進一只熊顱形狀的菸灰缸裡。「你可一點都不高明；老實說，我很失望。」扎伊采夫理了理領帶，自信地開口：「我所做的一切都有案可稽。這一點，你比誰都清楚。」「正是這一點讓我不安，」她說著逼近一步，「我知道你正在與索羅金娜合謀對付我。你比誰都該明白，主席最看不慣這種見不得光的伎倆。」他迎上她的目光，平靜，甚至有些疲憊。「塔莎，你若打算指控我叛國，至少也走個正經程序。叫你的打手進來，拔出你的槍，也省得我們兩人再演這齣鬧劇。」\n\n庫利科娃在他面前停下腳步。「我可以這麼做，不過乾脆利落地宰了你，可就一點意思也沒有了。」她伸手撣了撣他翻領上並不存在的灰塵。「我想……眼下，看著你變得多疑，我大概能從中獲得極大的樂趣。你會時時回頭張望，確認我沒有在盯著你的一舉一動。」扎伊采夫微微傾身，壓低了嗓音。「你嚇不了我，安樂死女士。」她苦澀地一笑。「總有一天，列昂尼德，你會學會怕我；只需在主席面前說上一句話，你的人生就完了。」沉默在兩人之間延續。透過牆壁，隱約可聞管弦樂遙遠的嗡鳴。\n\n扎伊采夫整了整袖扣，轉身走向門口，輕聲說道：「我從沒把你看作是個賭徒，庫利科娃同志。但你若真以為主席會信你的話而不信我的，那你可就嚴重高估自己的分量了。」庫利科娃吐出一口煙，望著他離去；他背上彷彿被她那殺意騰騰的目光燒出一個洞。當扎伊采夫回到宴會廳時，樂曲已換成了較為緩慢的鼓點。他近乎恣意地暗自一笑，又取了一杯香檳，重新融入人群，彷彿什麼也未曾發生，彷彿他的死敵並未正積極謀劃著取他性命。"
 SRU_Luka_Phase_One.19.a:0 "她會為此後悔的。"
 SRU_Luka_Phase_One.20.t:0 "效率高於意識形態"
 SRU_Luka_Phase_One.20.d:0 "中央局一如既往地忙碌。在它那鋼筋混凝土的牆內，一場會議正在進行。頭頂的燈光昏暗地閃爍著。空氣中瀰漫著紙張與冷咖啡的氣味。室內新掛起一幅標語：「工作即勝利。勞動即忠誠。」圍坐桌旁的有經濟重建委員列昂尼德·扎伊采夫，以及契卡首腦塔莎·庫利科娃。在場的還有主管基礎建設與後勤的葉卡捷琳娜·沃爾科娃、工業經濟學家尤里·金斯堡博士，以及勞動動員局局長馬克西姆·魯丁。\n\n桌上雜亂地攤著標滿紅線與工廠位置的地圖、人口圖表以及補給路線圖。鉛筆刮擦紙面的聲響幾乎令人抓狂。扎伊采夫指著一幅地圖。「我們能在六個月內於新西伯利亞附近建成數座製造廠。倘若戰事持續順利，我們的經濟在未來兩年內有望顯著改善，並在經濟上開闢出數條擴張的路徑。」沃爾科娃點頭。「下勒拿河沿岸蘊藏著龐大的水力發電潛能。若能妥善開發，足以滿足我們未來數十年的能源需求。」魯丁接著發言，語氣緊繃。「我們還需要更多自願的勞動力。勞動人口有一半是罪犯，另一半則是依國家勞動計畫徵召而來的。」\n\n庫利科娃往椅背上一靠，大幅伸展雙臂，她的聲音尖銳而冷冽，宛如矛刃。「你說得好像戰爭已經結束了似的。你這份樂觀已近乎顛覆；有些人會說那是叛國。」扎伊采夫看都不看她。「庫利科娃同志，我開始覺得主席派你來，就是為了用你那些怪誕的高見來煩我。」庫利科娃冷笑。「開始『覺得』？扎伊采夫同志，你這麼做可是非常危險的。」扎伊采夫轉向她，語調短促。「你開始考驗我的耐性了。你之所以能在主席身邊佔據如此高位，唯一的原因就是他不知怎地覺得你那可悲的本事還有點用處。」室內霎時鴉雀無聲。\n\n扎伊采夫逼近一步。「單靠你那些毫無章法的手段，這場戰爭是打不贏的。槍會鏽蝕，人會死去。但我將建起的那些偉大工程，將比一切都更為長久。它們才是革命真正的脊梁。就連朱可夫主席也明白，我的造物將比人更長久。」庫利科娃瞇起眼睛，臉上此刻寫滿了慍怒。「主席對你和你的造物寄予了過多的信任；到頭來，唯有恐懼與恐怖才能讓這個國家運轉下去。」扎伊采夫猛地吐了口氣。「志向倒是遠大得很。不過就我讀過的你那份報告來看，你缺乏思考長遠的基本智識能力。」\n\n緊繃的氣氛驟然崩斷。庫利科娃拔出手槍，狠狠抵住扎伊采夫的額頭；其餘與會者都驚呆了。「你有什麼遺言嗎？因為我現在就準備好、也很樂意把這房裡的每一個人都處決掉。」扎伊采夫維持著鎮定的神色，但一道汗水順著他的太陽穴滑落。「來啊，動手；不同於你殺過的所有其他人，我的死將為你帶來極其嚴重的後果——」喀嚓，她扣下了扳機，扎伊采夫仰面倒在地上。槍膛是空的，而庫利科娃笑得彷彿剛聽見了世上最好笑的笑話。「若無聊算是叛國，我早就把你們統統處決了。」她終於平復下來，離開了會議室，留下扎伊采夫仍為她真的扣下扳機而驚魂未定。"
 SRU_Luka_Phase_One.20.a:0 "誰給了她一把槍？"
 SRU_Luka_Phase_One.21.t:0 "與天使的契約"
 SRU_Luka_Phase_One.21.d:0 "瑪麗安娜·索羅金娜站在一張長長的木桌邊緣，戴著手套的指尖輕輕搭在桌面上。她對面，野戰指揮官米哈伊爾·科瓦廖夫默默端詳著前線地圖，神情難以捉摸。他們彼此互不信任，這一點再清楚不過。「科瓦廖夫同志，」瑪麗安娜開了口，聲音在室內迴盪，「要見你一面可真不容易。」科瓦廖夫沒有抬頭。「我一直忙著贏下這場該死的戰爭。」一陣停頓。隨後他抬眼迎上她的目光。「而你則一直忙著在場外旁觀。」瑪麗安娜露出一絲極淡的笑意。「觀察嘛，也是我職責的一部分。」科瓦廖夫臉上浮現不以為然的神色。「監視也是。」他糾正道。「控制是庫利科娃的執念。那你的執念又是什麼？」瑪麗安娜微笑。「都不是，」她平靜地答道，「我來這裡，是因為這場戰爭正在變成一場毫無必要的血腥屠戮。」這話引起了他的注意。科瓦廖夫微微挺直了身子。「說下去。」\n\n瑪麗安娜走近幾步，此刻俯身撐在兩人之間的桌上。「現行的軍事體制支離破碎。契卡干涉指揮決策已經太久了。軍官們是因為害怕一旦踰矩、契卡會如何對付他們，才被迫留在原位。」她輕輕叩了叩桌面。「這你心知肚明。」科瓦廖夫的下顎繃緊了。「我埋葬過一些好同志，只因為上頭某個人認定他們『不可靠』。」科瓦廖夫神色轉為陰鬱。「一點沒錯，」瑪麗安娜說，「所有這些決定，都是為了延長戰爭，好讓庫利科娃和她的契卡從中得利。」沉默再度落在兩人之間。「那你有何提議？」他問。瑪麗安娜直視著他的雙眼。「劃分影響力。」科瓦廖夫神色一冷。「在我聽來像是搞政治。」瑪麗安娜微笑。「確實是，」她坦然道，「但這同樣關乎生存；你的前任被契卡認定為不合作。你若不接受我的幫助，多半也會落得同樣的下場。」她抽出一份卷宗，擱在科瓦廖夫面前的桌上。「這份卷宗裡是目前潛伏在格魯烏與軍中的契卡人員名單。我請求你幫我贏得這場戰爭——不只是為了權力，更是為了拯救無數的生命；倘若這場可怕的衝突被庫利科娃之流那放縱的野心所吞噬，這些人都將死去。」\n\n科瓦廖夫低頭看了看卷宗，又抬眼望向她。「你清楚我一旦翻開這份卷宗，就等於把自己判上了與你相同的下場？」瑪麗安娜語調轉冷。「我清楚；你若助我，我們聯手便能摧毀她，並在此過程中拯救數百萬人。」他發出一聲輕微的嗤笑。「你以為你能摧毀她？朱可夫總理是她的靠山；她實質上動不得。」瑪麗安娜語氣強硬起來。「單憑我一人，絕非她的對手，」她承認，「但有了你的支持，我們眼下便能限制她的觸角；終有一日，朱可夫主席將再無用她之處，屆時我們就能對她下手。」科瓦廖夫從桌邊退開，抱起雙臂。「你做這一切，究竟是為了什麼？」他問。瑪麗安娜嘆了口氣。「我這麼做，是為了讓戰爭結束時，至少還剩下些什麼可供治理，」她答道，「若這需要我為自己的理想豁出性命，那就這樣吧。」又是一陣停頓。科瓦廖夫緩緩吐了口氣。「那戰爭結束之後呢？」瑪麗安娜合上卷宗。「那時，就輪到我們來決定：從俄羅斯的灰燼中，將誕生一個什麼樣的國家。」他沉吟片刻，在必死的結局與絕對的信念之間權衡。最後，他伸出了手。「很好，」他說，「為了一個更好的未來。」瑪麗安娜微笑著毫不猶豫地握住。「為了未來。」他們的握手堅實有力。當瑪麗安娜轉身欲走時，科瓦廖夫又開口了。「倘若這又淪為另一場暗影中的博弈……」她在門口停下腳步，沒有回頭。「那我們兩個都會輸。」她輕聲說道。留下科瓦廖夫獨自思索著未來。"
 SRU_Luka_Phase_One.21.a:0 "'一項本質上最為正當的正義事業。'"
 SRU_Luka_Phase_One.22.t:0 "與魔鬼的交易"
 SRU_Luka_Phase_One.22.d:0 "營地蜷伏在西伯利亞荒原的邊緣。帆布帳篷綿延覆蓋著土工工事，裝甲車輛半陷在凍結的泥濘裡。指揮帳內，一張長木桌上堆滿了地圖、野戰電台，以及一群精疲力竭的軍官。中原翔平坐在首席。將軍們壓低嗓音、神情緊繃地爭論著，手指在各式地圖上敲點。武裝士兵沿著帳篷邊緣站立，步槍低垂，目光警覺。戰爭讓所有人都變得戒備。這時，帳門的簾子掀開了。塔莎·庫利科娃走了進來，在荒原上長途跋涉之後，塵土與寒霜還黏附在她的外套上。所有交談幾乎在瞬間止息。翔平站起身。「所有人出去。」將軍們遲疑著。「包括你們，」他說，語氣前所未有的尖銳，「還有衛兵。」帳內響起一陣低語，但軍階終究壓過了一切。椅子刮擦著地面。地圖被匆忙收攏。軍官與士兵一個接一個魚貫而出，直到帳內歸於沉寂，只剩下中原與庫利科娃。\n\n庫利科娃摘下手套，小心地放在桌上，彷彿此處是莫斯科的一間辦公室，而非戰場上的指揮所。「你把權力集中得相當快啊，」她說，「主席選對了人。」翔平依舊站著。「你若是來道賀的，那你這趟長途跋涉可白費了。」她唇邊掠過一絲淺笑。「我是來確保你的指揮權能夠存續的，最高統帥。」她把一份薄薄的卷宗推過桌面。「我明白你不是那種能靠威脅或暴力來控制的人，」她接著說，「所以我帶來一份禮物，以及契卡與軍方之間達成某種默契的可能。」翔平沒有去碰那份卷宗。「你要的是臣服。」庫利科娃咧嘴一笑。「我提供的是合作，」庫利科娃糾正他，「一種能讓你專心贏得戰爭、而後方無虞的合作。」翔平揚起眉毛。「代價呢？」她的目光不曾動搖。「當契卡採取行動時，軍隊不得干預。當某些人消失時，不得過問。」隨之而來的是漫長的沉默。\n\n翔平緩緩吐了口氣。「那不叫同盟。」庫利科娃輕輕嗤笑。「當然不是。同盟意味著我信任你。」她微微傾身向前。「就把它看作一種相互的默契。我們侍奉同一位主子。只要結果合乎他的意志，手段如何便與我們無關。」翔平終於低頭瞥了一眼那份卷宗。「若我拒絕呢？」庫利科娃站起身，從容地取回手套。「你的前任拒絕了。他的仕途與他的性命一同終結——在一條溝渠裡，與歷史上其餘的錯誤一同腐爛。」她轉身走向出口。「戰爭獎賞的是果決，最高統帥。無所作為往往比它看起來更為致命。」帳簾掀開，冷風灌了進來。翔平獨自站在原地，那份未曾開啟的卷宗擱在他面前的桌上。他的思緒並不在帳外的戰爭上，而在這一切結束之後將要誕生的那個國家上。"
 SRU_Luka_Phase_One.22.a:0 "'準備好承受不幸的後果。'"
 SRU_Luka_Phase_One_Politics.1.t:0 "一堂政治表演課"
 SRU_Luka_Phase_One_Politics.1.d:0 "這是代表大會議場中又一個躁動不安的日子。索尼婭已數月未曾露面，主要反對派的領導權落到了米哈伊爾·庫拉科夫手上，而雅各賓派的成員數卻持續激增。議會大廳內，緊張的氣氛清晰可觸，政客們沒完沒了的爭吵在議場的大理石牆面上迴盪。\n\n在他們高處，盧卡·朱可夫站在一座俯瞰整個議場的陽台上，默默注視著。片刻之後，扎伊采夫走上前來，理了理外套，說道：「原來你是溜到這兒來了。」盧卡目光未曾移開，答道：「內閣會議讓我厭煩。我需要時間思考。」扎伊采夫短促地笑了一聲。「真難相信我們走了這麼遠。我們不再是什麼邊緣運動了；我們如今就是政府。」\n\n盧卡淡淡一笑。「是啊。但要做的事還多著呢。」扎伊采夫的語氣沉了下來。「為了走到這一步，我們做過一些可怕的事。你真的認為這一切都值得嗎？」盧卡微微側身向他。「列昂尼德，我是不是察覺到一絲良心的動靜？你此刻應當十分清楚：我們都已選擇了雅各賓之路；對我們而言，再無回頭的餘地。」扎伊采夫聳了聳肩。「或許吧。不過我還是想親眼見到我們這項工程走到終點。」盧卡擠出一個虛假的笑容。\n\n下方傳來一記清脆的議事槌聲，劃破了喧囂。議場霎時肅靜。所有目光都轉向講台——米哈伊爾·庫拉科夫立於其上，氣勢逼人。「這下，」扎伊采夫低聲道，「該有意思了。」盧卡一語不發，目光死死鎖住那個膽敢如此公然挑戰他權威的男人。\n\n庫拉科夫的聲音充滿了整座大廳。「全聯盟共產黨與其他政黨的各位代表。我們的國家正為其靈魂而戰，然而我看見了什麼？無休無止的爭吵。癱瘓。政府的齒輪已經卡死，正朝著背離自由與進步的方向倒轉。」他頓了頓，任這番話懸在空中，然後繼續說道：「正因如此，我，全聯盟共產黨的米哈伊爾·庫拉科夫，將與人民民主聯盟的德米特里·雅科夫列夫共同組成聯盟，讓那些齒輪再度轉向一個無愧於俄羅斯的未來。」\n\n掌聲從反對派席位、甚至部分全聯盟共產黨成員間響起。庫拉科夫感受到盧卡那道致命的凝視，抬頭望向陽台。盧卡早已迎上他的目光，雙臂交抱，神情如戴著面具一般難以解讀，只是從那副精心雕琢的面具裂縫中，滲出一絲淡淡的殺機。從高處望去，他不像個人，倒更像一道籠罩議場的陰影，注視著下方一場對他權力的挑戰逐漸成形。"
 SRU_Luka_Phase_One_Politics.1.a:0 "這對你來說恐怕不會有好下場，庫拉科夫。（清洗）"
 SRU_Luka_Phase_One_Politics.1.b:0 "列昂尼德，我們必須不惜一切確保庫拉科夫無法得逞。（妥協）"
 SRU_Luka_Phase_One_Politics.2.t:0 "法國大革命的教訓"
 SRU_Luka_Phase_One_Politics.2.d:0 "扎伊采夫坐在盧卡辦公桌對面，壁爐微弱的火光在房內投下躁動的陰影。他翻著一本破舊的《法國大革命反思錄》，書頁邊緣因久經翻閱而泛黃磨損。他抬起頭，聲音平靜，卻帶著一絲反諷。\n\n「法國有丹敦。我們有庫拉科夫。他們流著不同的血，對我們而言卻代表著同一個問題。」扎伊采夫沉吟道。盧卡往椅背上一靠，指尖相抵，目光凝望著爐火。「而羅伯斯庇爾有美德，」他喃喃道，「至少在斷頭台把他的腦袋從肩上取下之前，他是這麼說的。」\n\n列昂尼德乾笑一聲。「美德治不好國。恐懼則不然——恐懼是可控的。帝國就是奠基於此。」盧卡的目光柔和了下來。「熱月政變也是。」他靜靜地答道，「單憑恐懼永遠不夠。它會腐蝕一切，連揮舞它的那隻手也不例外。」扎伊采夫揚起眉毛。「下令清洗的是你，盧卡。不是我。」盧卡轉向他，意志毫不動搖。「是我。因為我們承擔不起做吉倫特派的理想主義者——在敵人裝填子彈時，還被辯論拖得動彈不得。我們行動了，而國家如今得以喘息，正是因為如此。」他用手指叩了叩桌面。「但我們必須小心，別落得與那位『恐怖的大天使』相同的下場。不過我很好奇：他真的相信自己所宣講的一切嗎？還是他只是清楚何時該讓信念派上用場？」\n\n扎伊采夫向後靠去，端詳著盧卡。「你認為我們正逼近屬於自己的熱月？」盧卡露出一絲冷笑。「不。因為不同於他們，我知道它就要來了。而我打算熬過它，甚至戰勝它。」扎伊采夫合上書，把它擱在桌上。「歷史記得革命，」他說，「卻遺忘革命的領袖。這一點你心裡有數，不是嗎？」盧卡再度轉頭望向火焰。火光把他的臉染成一片熾烈的陰影。「是啊，」他說，「但一場革命能存續多久——甚至能否被記住——取決於領袖。」\n\n扎伊采夫神色一沉。「終有一天，人民會看清我們的真面目：革命的怪物。」盧卡下顎一緊。「隨他們去，」他不屑地說，「歷史不在乎怪物。它只記得勝利者。」他緩步走向窗邊，身影隱約映在牆上那一幅幅裱框肖像的玻璃上——那些都是早已被清洗的人，是無數犧牲的見證。「這場革命，」盧卡繼續說道，聲音輕柔卻堅定不移，「只要我還在，它就會延續下去。我終結之日，便是它終結之時。沒有我的領導，它會化為齏粉。」\n\n扎伊采夫的聲音柔和下來。「那革命何時才會安全？」盧卡微微側過頭，穿透窗戶的日光映亮了他的身形。漫長的靜默瀰漫在空氣中，而後他開口了。「當最後一個帝國傾覆之時。」時鐘滴答。爐火劈啪。而這兩個人——恐懼的建築師，命運的信徒——靜靜坐著，聆聽著他們所創之物那緩慢而不可阻擋的行進。"
 SRU_Luka_Phase_One_Politics.2.a:0 "教訓也可能誤導人。"
 SRU_Luka_Phase_One_Politics.3.t:0 "「夜色深沉」"
 SRU_Luka_Phase_One_Politics.3.d:0 "大雨鞭打著新西伯利亞寂靜的街道，這座城市在街燈偶爾的微光下明滅不定。在昏暗的辦公室裡，政府部長尼古拉·列別捷夫獨自坐著，菸霧在他的桌燈上方飄浮。他的目光在女兒安雅的照片上流連，這時電話響了。\n\n「尼古拉！」一個驚恐的聲音喊道，那是四樓的阿列克謝·波波夫。「阿列克謝，冷靜點，怎麼了？」尼古拉嘆了口氣。「契卡來了！他們正把人往外帶。你沒聽見槍聲嗎？」阿列克謝絕望地說道。「你又喝酒了吧，阿列克謝？」尼古拉緊張地笑了笑。「往你的窗外看啊！」阿列克謝吼道。\n\n透過雨幕，尼古拉看見了卡車、士兵，以及一道道閃光。槍聲在中庭裡炸響。當他再度拿起話筒時，阿列克謝正在哀求：「求求你們，我對國家是忠誠的——」隨後一聲槍響結束了這通電話。\n\n整整二十分鐘，這棟樓裡迴盪著尖叫與槍聲，隨後歸於死寂。尼古拉僵坐在原地，冷汗劃破了冰冷的空氣。走廊裡響起腳步聲，緩慢，從容，每一秒都在逼近。接著，門上傳來敲擊聲。\n\n門開了。一名契卡軍官步入昏暗的光線中，面容隱沒在陰影裡。他關掉了收音機，讓房間陷入令人窒息的寂靜。「你好。」軍官說。「你好。」尼古拉虛弱地應道。軍官伸手探進大衣內側。尼古拉閉上雙眼，等待死亡。\n\n「來根菸？」軍官問道，並為他點上。尼古拉接了過來。「你知道我為何而來嗎，列別捷夫同志？」「我不知道。」尼古拉答道。\n\n「依據第757號法令，貴部被控犯有叛國罪與反革命活動。全體成員應予處決。」軍官以毫無感情的語調陳述道。「並非所有人都有罪。」尼古拉的聲音顫抖著。「眾人之重擔，」軍官冷冷地答道，「由個人承擔。」這是主席本人的一句名言。\n\n當尼古拉再次望向安雅的照片時，視線變得模糊。他喘息著吐出「毒……」，隨即倒了下去。軍官面無表情地注視著，制服上濺滿了這場屠殺中其他受害者的鮮血。房間裡瀰漫起淡淡的汽油味，接著是一星火花。烈焰吞噬了辦公室，在第六政府區內熊熊咆哮，將尼古拉與他的同僚們在革命的火焰中滌淨。"
 SRU_Luka_Phase_One_Politics.3.a:0 "§t又一條生命被掐滅。§!"
 SRU_Luka_Phase_One_Politics.4.t:0 "一段久已遺忘的舊憶"
 SRU_Luka_Phase_One_Politics.4.d:0 "夜很靜，對新西伯利亞來說靜得過分。只有窗外的風打破這份寂靜，從窗縫間隱隱嗚咽而過。屋內，彼得·奧波金坐在椅子上，凝望著壁爐中低低燃著的小火。房間另一頭，時鐘穩定地滴答作響，耐心而無情。他已經等了一個多小時。然後，敲門聲來了。三下，緩慢而從容。\n\n彼得笑了。「他來了。」他喃喃道，整了整外套，然後開了門。盧卡·朱可夫站在那裡，身影嵌在昏暗的走廊燈光中。他的外套隱隱滴著雨水，眼神幽暗難測。「總理，」彼得說著，勉強擠出笑容，「我沒料到您今晚會來。」「我也沒料到自己會來。」盧卡淡淡答道。他的語調輕柔，輕柔得過了頭。「那是什麼讓您改變了主意？」彼得問。\n\n盧卡沒有回答，逕自走了進來。他的目光飄向壁爐邊的小桌：兩只酒杯、一瓶白蘭地，還有一把手槍，整整齊齊地擺在中間。「這是你為我準備的？」盧卡問。「當然，」彼得笑道，「您來訪時，我總會備上些東西。誰知道什麼時候公事就會變成樂事呢。」\n\n盧卡在他對面坐下。爐火靜靜地劈啪作響。有那麼一陣子，兩人都沒有開口。沉默沉重得近乎令人窒息。終於，彼得傾身向前，語氣隨意卻帶著好奇。\n\n「那麼，」他說，「這回是誰？」盧卡抬起頭。「什麼是誰？」「您知道我的意思。」彼得冷笑著，用手指叩了叩槍旁的桌面。「您接下來要我殺誰？」盧卡的目光柔和了下來。他抬起食指，點了點自己的額頭。彼得眨了眨眼。「什麼？」盧卡的手指仍抵在額頭上。「這裡。」彼得緊張地笑了。「呵……真會開玩笑。您差點就唬住我了，盧卡。」\n\n盧卡沒有笑。彼得臉上的笑容緩緩褪去。「您……您不是在開玩笑。」盧卡拿起了那把手槍。他在手中掂了掂它的重量，凝視著它，彷彿望著某種既遙遠又無比熟悉之物。然後他站起身，轉向爐火。「你知道嗎，」盧卡輕聲說道，「我死過一次。我在那短短幾個瞬間裡經歷了終結，可是身在其中時，我卻感到如此自由。」彼得皺起眉頭。「您在說什麼？」\n\n「那裡很安靜。很平和。我想……那才是我該去的地方。」有那麼一瞬，一絲哀傷侵入了盧卡的聲音。「盧卡，」彼得說，聲音裡的不安漸漸攀升，「您不必——」聲響來得極快：一記清脆的爆響在石牆間迴盪。彼得癱倒在椅背上，雙眼圓睜，嘴巴仍半張著，彷彿還想吐出一個永遠說不出口的字。一個彈孔端端正正地開在他的眉心。盧卡此刻正面對著彼得，手臂伸直，槍口仍在冒煙。爐中的火焰在他眼中閃爍，讓那雙眼睛看來近乎金色。「彼得，」他柔聲說道，「你已經無處可去了。」爐火繼續劈啪作響，對方才發生的一切漠不關心。\n\n盧卡在那裡站了片刻，看著硝煙升向天花板。然後他輕輕把槍放回桌上，對自己低語道：「這是只屬於我一人的記憶……那個地方，才是我必須抵達之處。」他扣上外套的鈕釦，轉身走出門去，把彼得留在身後——如今不過是一具等待腐爛的屍體。"
 SRU_Luka_Phase_One_Politics.4.a:0 "永別了，彼得。"
 SRU_Luka_Phase_One_Politics.5.t:0 "「大恐怖」"
 SRU_Luka_Phase_One_Politics.5.d:0 "克拉斯諾亞爾斯克籠罩在令人窒息的陰霾之下。戰爭抽乾了這座城市最優秀、最聰慧的一群人，一場暴風雨正鞭撻著這座城。警察局長西多羅夫被一通午夜來電驚醒——市長官邸出了緊急狀況。他匆忙穿好衣服，驅車駛過空蕩的街道，在官邸外只見到一輛孤零零的警車，警燈閃爍，卻不見半個警員。前門被強行撞開，碎裂的門板懸掛在鉸鏈上。屋內，一片死寂。\n\n「有人嗎！？」西多羅夫喊道。無人應答，只有地板上一具保鏢屍體的輪廓。西多羅夫拔出槍，登上樓梯，一把撞開市長辦公室的門。市長倒斃在一名倒下的警員身旁。「這他媽是怎麼——」他話說到一半，便感覺一截冰冷的金屬抵住了自己的後腦。\n\n「放下槍，西多羅夫。」一個聲音命令道。他照辦了。一名契卡軍官自陰影中步出，朝辦公桌一比。「坐。」西多羅夫依言在死去的市長對面坐下，汗水順著兩頰淌落。桌上的紅色電話鈴聲打破了沉寂。軍官接起電話，聽了片刻，隨後遞給西多羅夫。「找你的。」\n\n西多羅夫拿起話筒。「你好啊，西多羅夫同志，」傳來一個平靜的女聲，「塔季雅娜和小蓮娜還好嗎？」他的心臟停跳了一拍。「你怎麼會知道她們的名字！？」他吼道。「西多羅夫先生，我們什麼都知道。只要你合作，她們就會平安無事。」那女人繼續說道，語調輕快，近乎玩味。「市長的事真是可惜。叛國、貪腐……如今又添上謀殺。很可怕，不是嗎？」\n\n「人不是我殺的！」西多羅夫大喊。「當然不是，」她答道，「但除非你幫我們把事情收拾乾淨，否則調查結果會是另一回事。」電話那頭的她，顯然正掛著笑。「你是誰？」西多羅夫問。「我是契卡首腦塔莎·庫利科娃，」她說，「你在電視上見過我，不是嗎？」她解釋道：市長的利用價值已盡，總得有人來扛這個責任。一個被綁著、驚恐萬狀的年輕人被推進了辦公室。「這一位，」庫利科娃說，「是個掛了號的反革命分子。你會指認他是兇手。作為回報，你的家人將安然無恙。或許還能升個官——『西多羅夫委員』，聽起來挺順耳的，不是嗎？」\n\n西多羅夫遲疑了，腦中只想著妻子與女兒。「好吧，別把她們牽扯進來就是。」他挫敗地低語。「好極了，」庫利科娃說，「那我們就達成共識了。」軍官重撥了分局的電話，把話筒交給西多羅夫。「我是西多羅夫局長，」他空洞地說道，「市長死了。嫌犯已被我拘押。立即派遣支援。」\n\n電話掛斷後，契卡人員消失在夜色中。獨自面對著屍體與殘留的火藥味，西多羅夫點起一根菸。煙霧瀰漫，罪惡感隨之沉澱下來。他救了自己的家人。但他也把靈魂賣給了魔鬼。"
 SRU_Luka_Phase_One_Politics.5.a:0 "§t我究竟做了什麼？§!"
 SRU_Luka_Phase_One_Politics.6.t:0 "一場偉大的革命烈火"
 SRU_Luka_Phase_One_Politics.6.d:0 "夜幕將新西伯利亞裹進黑暗，唯一的光亮來自吞噬著這座城市第六政府區的熊熊烈焰。消防員與火海搏鬥，士兵們封鎖了街道。在這片混亂的中心，站著總理盧卡·朱可夫、塔莎·庫利科娃與列昂尼德·扎伊采夫。\n\n庫利科娃遞給盧卡一份卷宗。「總理，大火正如計畫所料地焚毀一切。行兇者馬克西姆·科涅夫已被拘押。」扎伊采夫聽了這話皺起眉頭。「一切都如計畫所料？你知道修復要花多少錢嗎？」庫利科娃冷冷地瞥了扎伊采夫一眼。盧卡從燃燒的建築前轉過身來，開口道：「列昂尼德，這是必要的犧牲。擁有一個共同的敵人，比任何法令都更能有效地團結人民。有了這場『襲擊』，革命——連帶我們雅各賓的事業——將獲得更大的權威。」\n\n「本來有更省事的辦法。」扎伊采夫喃喃道。庫利科娃冷笑一聲：「不打破幾顆蛋，可做不成蛋捲。」盧卡看了看手錶。「時候到了。我們把開了頭的事做完吧。」兩名契卡軍官把被綁著的科涅夫拖上一座臨時搭起的高台，攝影機與人群紛紛聚攏。盧卡走向講台，聲音沉穩而威嚴。\n\n「新西伯利亞的市民們，」他開口道，「今夜我們遭逢了一場慘重的悲劇。一名叛徒襲擊了我們政府的心臟。」他朝科涅夫一指。「此人，反革命分子與外國特務的一枚棋子，妄圖摧毀這座城市的革命精神。他的所作所為奪走了忠誠同志們的性命，其中包括技術部長尼古拉·列別捷夫。」盧卡的語調冷硬起來。「作為總理，作為革命的守護者，我承諾必將伸張正義。這名叛徒將被處決；而自今夜起，《革命規程法》將保護我們的國家免受內部敵人之害。」\n\n人群中泛起低語。但盧卡繼續說了下去。「公民自由將暫時中止。契卡將擁有全權剷除顛覆勢力。這些措施或許顯得嚴酷，但唯有紀律，才能讓我們熬過這場風暴，建設一個更光明的未來。」他頓了頓，眼中映著身後的火光。「這棟建築的廢墟終將再度崛起，更加堅固、更加純粹——成為人民革命的一座豐碑。」\n\n攝影機停止了拍攝。科涅夫被拖了下去。盧卡與庫利科娃回到扎伊采夫身邊，後者正陰鬱地默默注視著大火。盧卡的聲音堅定而決絕。「舊政權將於今夜焚毀，列昂尼德。而新世界，將自它的灰燼中開始。」"
 SRU_Luka_Phase_One_Politics.6.a:0 "淨化之焰永世不熄。"
 SRU_Luka_Phase_One_Politics.7.t:0 "「首都封鎖」"
 SRU_Luka_Phase_One_Politics.7.d:0 "人民代表大會的緊急會議在舊議會大廳召開，那是前共和國時代一處具有象徵意義的地方。議場中坐滿了反對派領袖、少數反對雅各賓理念的全聯盟共產黨代表，另有幾位議員始終未曾到場。米哈伊爾·庫拉科夫與德米特里·雅科夫列夫並肩而坐，一邊注視著森嚴的戒備，一邊低聲交換著各自的疑慮。\n\n「所以這場會是誰召集的？」雅科夫列夫低語。「我毫無頭緒，但我覺得不太對勁。」庫拉科夫答道。「全聯盟共產黨的人大多沒來。再看看那些武裝衛兵。他們在這裡，是為了把別人擋在外面，還是為了把我們困在裡面？」\n\n當盧卡·朱可夫與中原翔平將軍走進議場時，他們的低語戛然而止。盧卡登上講台，雙手撐在講台邊緣，帶著一抹緩慢的笑容環視全場。「同志們，」他語帶戲謔地說，「我很高興各位能出席這座尊貴議場的最後一次會議。」困惑的低語聲驟然高漲，而他開始以一種嘲弄的誠懇為他們鼓掌。「你們都盡職地扮演了我的棋子。」他笑了，隨即笑容消失。「但凡事總有終結之時。」\n\n恐慌如野火般席捲整個議場。就在士兵們戴上防毒面具時，盧卡壓低了嗓音。「新的俄羅斯不容許異己的思想，」他宣告道，「若要熬過未來數十年的戰爭，我們就必須清除反革命的意識形態，形成一種新的綜合。作為革命永恆的守護者，我將殲滅它的叛徒。」他伸手一指，逐一宣判每一位代表有罪。\n\n盧卡探手進外套口袋，取出一枚引爆器。「按下這個按鈕，一場新的創世便將開始。」他宣告道，隨後按了下去。從議場的各個角落，一股蒼白的氣體嘶嘶噴出。盧卡與翔平迅速戴上面具，看著各處出口被封死，士兵們把嗆咳的政客們驅趕回那片吞噬一切的煙霧之中。代表們踉蹌著、乾嘔著；混亂化為了瘋狂。\n\n盧卡穿行於這片混亂之中，宛如指揮家行走在自己的樂器之間，細細品味著他們崩潰的每一刻。當這座舊議會嗆咳著、最終歸於沉寂時，他佇立在這座毀滅的議場之上，感受著革命在其反對者的屍身上重獲新生。"
 SRU_Luka_Phase_One_Politics.7.a:0 "§t民主就此消亡。§!"
 SRU_Luka_Phase_One_Politics.8.t:0 "重新定義的民主"
 SRU_Luka_Phase_One_Politics.8.d:0 "新西伯利亞政府的中央大廳，如今已是自全聯盟共產黨灰燼中誕生的革命執政團的所在地。大廳裡懸掛著新黨的裝飾，一面巨大的紅色橫幅；雅各賓的徽記取代了舊日全聯盟共產黨的黨徽。議場只坐了半滿；其餘的舊日成員，或已被處決、被流放，或被「再教育」。攝影機亮起，轉播開始了。\n\n盧卡走上講台。「革命不容毒蛇。它不容寄生蟲。」他說，「今日，新的黎明降臨了。我們的事業已割除了累贅：那些把自身野心裹在我們旗幟之下的偽君子，那些在人民受苦時享盡安逸、口中卻低語著妥協的叛徒，以及那些愛惜自身安危更甚於自己同胞的懦夫——如今都已從我們的土地上被抹去。」\n\n「不必為他們哀悼，畢竟當我們的同志為保衛革命抵禦其敵人而犧牲時，他們也不曾哀悼。我並不想要這場大清洗，但為了拯救我們民族的靈魂、為了確保它的未來，這是必要的。革命之樹無法在被少數人的猶疑所毒害的土壤中生長。倒下的並非全聯盟共產黨，而是那用和平幻象將它掏空的病灶；我們所尋求的唯一和平，將是一種從今往後只對我們有利的和平。」\n\n「全聯盟共產黨重生了——剝除了怯懦，對陰謀充耳不聞，對背叛免疫。」他頓了頓；那份沉默壓迫得如同抵住動脈的刀鋒。「你們若非要說我殘忍，那便說吧；殘忍意味著從中取樂，而我毫無快意。你們若要稱我為暴君，那便稱吧；暴政為己而生，而我為未來效力。你們若要說這已不再是革命。我的回答是：革命，是不可能讓你保持雙手潔白的。這不是政治的終結；這是戲劇的終結。」\n\n「自今日起，不再有派系，不再有秘密會議，不再有陰謀算計——只有領導，以及一份為俄羅斯未來擘劃的藍圖。當我就任革命執政團主席之職時，你們都把信任交託給了我；我將守護革命的穩定。今後只有一條雅各賓之路：統一的，不容妥協的，絕對的。」\n\n「我們已跨過了門檻。再無回頭之路。勝利在望；我們的烏托邦將會實現。倘若人民畏懼我，那就讓他們畏懼吧。我寧可因終結叛國而被畏懼，也不願因姑息叛國而被愛戴。我們進軍的方向不是安逸，而是未來。為了雅各賓主義的全面勝利，休教任何人擋在我們的路上。」攝影機停止了拍攝。掌聲響起，其中有些是真心的，更多的則出於恐懼。\n\n人群中，扎伊采夫舉起酒杯，朝盧卡陰鬱地點了點頭。庫利科娃並未到場，她正在別處以更放開的手腳執行清洗。索羅金娜坐在一條走廊上，思索著自己的道路。翔平正在前線操演，為國家的士兵們準備好迎接他們的犧牲。盧卡暗自微笑，沉浸在自己意志的凱旋之中，隨後在慶典開始、新秩序那響亮而不可避免的鼓聲響起時，走向了扎伊采夫。"
 SRU_Luka_Phase_One_Politics.8.a:0 "雅各賓主義再度凱旋。"
 SRU_Luka_Phase_One_Politics.9.t:0 "朱可夫會見反對派"
 SRU_Luka_Phase_One_Politics.9.d:0 "「馬特維，奧克薩娜，歡迎。請坐。我們得快點談完。我近來時間非常有限。我給你們五分鐘。說吧，你們為什麼想要這場會面？」盧卡的話語彷彿能攫住他們周遭的整個空間，馬特維·瓦西里耶夫與奧克薩娜·沃爾科娜霎時感到耳邊響起了時鐘飛快的滴答聲。與此同時，盧卡緊盯著他們，觀察著他們每一處特徵與神情，彷彿正將其永久地存入自己的腦中。「我們不想佔用您——」奧克薩娜試圖先開口，一上來便和顏悅色、語帶歉意，希望事情別鬧得不可收拾。\n\n然而，她輕柔的嗓音突然被淹沒了，她的黑髮險些從頭上跳將起來。「夠了！他說了要快，那我們就快點。」馬特維十分莽撞，一下便打斷了奧克薩娜的客套。他雙手握成拳頭——不是要打架，純粹是出於反射；隨後他朝奧克薩娜揮了揮，像是催她說重點。「好吧！我們兩黨都希望政府能作出一系列讓步。」奧克薩娜從手中一疊文件裡抽出一份挺括的白紙文件。她甚至沒能親手遞給盧卡，只是上前一步，把它放在他面前。文件就在他的視線範圍內，他卻連看都沒看一眼。他的注意力只在他們身上。\n\n「簡而言之：對選舉制度作出更多民主化的改革，並在當前的戰爭時期維持選舉的延續。政府不該在危機時期——尤其是這種規模的危機——就被允許為所欲為。這份文件涵蓋了大部分內容。長話短說：讓人民選出自己的法官，以及監督政府的官員。」顯然，馬特維是出自真心的信念在說話，試圖代表人民發聲。難怪他能坐上如今的位置——他似乎全憑一股幹勁掙來了它。\n\n此刻他的拳頭已收在身側，努力克制著不朝盧卡的方向揮動，唯恐引得對方心生懼意。馬特維渾然不知，當盧卡在他說話時直勾勾地盯著他——這個男人身上沒有什麼可怕的東西，即便有一把上了膛的槍抵著他的腦袋也一樣。盧卡的回答迅捷而尖銳。他甚至還沒開始看那份文件，便說出了最後那句話……"
 SRU_Luka_Phase_One_Politics.9.a:0 "\"我想五分鐘已經到了……現在，請離開。\""
 SRU_Luka_Phase_One_Politics.10.t:0 "來自友人的一些忠告"
 SRU_Luka_Phase_One_Politics.10.d:0 "盧卡辦公室裡的空氣冷冽，而通往那片冰封的新西伯利亞的窗戶則緊緊閉著。刺骨的寒意依舊滲了進來，以至於當盧卡舉起他那杯塔什干紅茶時，蒸汽如煙囪般翻騰而上——但他仍舊將它送到唇邊。暖意流遍全身，與此同時，他的耳中滿是扎伊采夫的聲音。「我要說的是，盧卡，對付那些反對黨有一個簡單的辦法。」盧卡靜靜坐著思忖這個話題，才把茶杯放回手中的托碟上，抬眼望向扎伊采夫。\n\n扎伊采夫自己也端著一杯茶正喝著，他從上方握著杯子，雙手張開搭在杯沿上，像一隻蜘蛛。「說下去，扎伊采夫。」盧卡簡短地回應，饒有興致地想聽聽這位朋友的高見。「那些政黨意志薄弱。只要有人對他們那套平庸的價值觀表現出一丁點興趣，他們就會來者不拒。這正是他們的弱點。簡單說，只要我們滲透進他們的黨領導層，就能從暗處操控他們。」扎伊采夫的頭腦總是充滿分析性。盧卡猜想，他大概把一切都看作圖表，並能推導出解決問題的最佳方案。於是他思索了片刻。\n\n他又啜了幾口茶。這茶安撫不了本就毫無波瀾的盧卡，卻為他的身體帶來了暖意，比他那身西裝管用得多。「比起別的，人們遠更願意聽從一個對他們的價值觀表現出興趣的人——無論那份興趣有多虛假。」盧卡的話聽來頗有意思——嗯，至少對扎伊采夫以外的人是如此。他對這番話隱隱有種感覺，彷彿它們曾被演練過，或是源自某種切身的經歷。扎伊采夫長長地啜了一口紅茶，才把他所主張的——那個解決國家難題的辦法——說完。「這正是我的意思：要終結政治動盪，就利用反對黨為你所用，去取得你想要的東西。不必動一根手指，就能讓我們的國家重回正軌。」扎伊采夫幾乎是把茶一飲而盡；當他輕輕把杯子擱在盧卡的辦公桌上時——這是除了扎伊采夫之外，再無旁人膽敢做的舉動——盧卡朝他笑了。"
 SRU_Luka_Phase_One_Politics.10.a:0 "\"我們去找些感興趣的人吧。\""
 SRU_Luka_Phase_One_Politics.11.t:0 "朱可夫的思緒"
 SRU_Luka_Phase_One_Politics.11.d:0 "這年冬天對新西伯利亞的侵襲，比以往任何時候都更為酷烈。盧卡記不起自己這輩子有過比這更嚴酷的日子。要麼是真的如此，要麼便是從高出數層樓的辦公室窗口俯瞰這一切，讓他忘卻了那些被寒冬擊打的歲月——忘了自己也曾是那個必須在冰雪的呼吸中匍匐前行才能回到家的人。「新西伯利亞……社會主義的樂園。」盧卡在清冷的呼吸間低喃出的話語，似乎在窗上凝起了霧氣，不過他並不介意。他雙手交疊在背後，輕輕叩著自己的手腕，端詳著映在窗上的自己，把它當作一面鏡子。\n\n「還不完全是，還沒到那一步。要做的事仍然太多。」盧卡沒有低下頭，沒有俯下身，只是任目光飄移——飄向一個正頂著寒冬的呼嘯、費力地在主街上挪動的人；他從一棟樓走向另一棟樓，向認出他的人揮手致意。盧卡並未意識到，但他想必早已忘卻了那個男人所經歷的掙扎是什麼滋味。「我該走哪條路？兩邊都有其道理，扎伊采夫總有辦法對我提出令人信服的論證。」抑或，他是刻意忽視了那份掙扎。他自己的話語此刻彷彿迷失了，纏繞在他自己的心緒之中，舌頭也打了結——直到他終於以幾個尖銳的字眼將其徹底拔除、廓清。「我恨它。」\n\n那話語聽來並非厭惡或惱怒，甚至不是純粹的憎恨，而是某種更為錯綜交織的東西。盧卡重新把目光聚焦在窗上。他再也看不見那個穿行於城中的男人了。取而代之的是，他在自己右肩之上、自己的辦公室裡，捕捉到了另一個人的目光。他一秒也沒有遲疑，轉身去逮那名闖入者——那是一個他既覺得面孔完全眼熟、卻又想不起是誰的人。「我不記得我允許你進——」空氣沉寂，辦公室裡一片死寂。窗戶緊緊閉著，因此沒有半絲風能夠打擾他的辦公室。他挺直了身子，望向自己的辦公桌，掃過那些整齊平鋪、絲毫未經翻動的文件；但更重要的是，他的目光落在了左手角落那具桌上電話。"
 SRU_Luka_Phase_One_Politics.11.a:0 "\"無論如何，這通電話該由我來打。\""
 SRU_Luka_Phase_One_Politics.12.t:0 "混亂的代表大會會議"
 SRU_Luka_Phase_One_Politics.12.d:0 "那份法案在新西伯利亞的議事廳裡傳來傳去，彷彿是一張著了火的紙。每當一頁法案被遞到某位圍坐在深色橡木桌環中的議員手上，那人幾乎立刻便陷入恐慌——而盧卡·朱可夫所做的，只是看著。他坐在議事廳最首要、最前端的位置。廳內所有的注意力、所有的焦點，永遠都朝向他。這一次也不例外。\n\n「這是一份無法無天的法案！」一位議員的聲音炸了開來。盧卡連看都懶得看那個從座位上騰地站起、把紙攥在右拳中揮舞的男人一眼。那人的怒吼尚未結束，其他人便陸續從身旁的助理與雜役手中接過了自己那幾頁紙。「你們要我們乖乖躺下，把整個國家的控制權雙手奉上！！」那人怒火中燒。顯然，他隸屬於盧卡的某個主要反對黨。但他究竟屬於哪一個，並不重要。\n\n所有反對黨成員的反應都大同小異，甚至更為激烈。議事廳幾乎徹底陷入混亂：議員們站起身來，嘶吼著，簡直是在廳內橫衝直撞。盧卡甚至注意到，他自己黨內——全聯盟共產黨——的一些成員在看見法案時，臉色也不甚好看。躲在庫拉科夫身旁的改革派們，怒意則克制得多。庫拉科夫看上去彷彿隨時會有一根血管爆裂，但他控制住了自己，仍舊坐著，厭惡地低頭看著那張紙。盧卡帶著淡淡的興味繼續觀看這一切上演，臉上沒有笑容。他面無表情，只是靜靜地看著。\n\n即便契卡人員從所有出入口走進廳內，無聲地四處移動，緩緩地在議會的頸項上纏起一道鎖鏈，他也依舊如此。單是他們的存在，就讓那些方才對法案公然流露憤怒、惱火與怒意的人，重新安靜地坐回座位，並且不再起身。盧卡甚至不必抬一根手指、動一塊肌肉。他自始至終安坐在自己的椅子上。那椅子看起來對盧卡而言甚至算不上舒適——它老舊，近乎破損，木頭已經開裂。盧卡微微低下頭，環視全場，終於開口了。他是帶著微笑說的。"
 SRU_Luka_Phase_One_Politics.12.a:0 "\"再說一遍你們的不滿。如果你們願意的話。\""
 SRU_Luka_Phase_One_Politics.13.t:0 "代表大會在朱可夫的領導下團結一致"
 SRU_Luka_Phase_One_Politics.13.d:0 "「看看他們……」盧卡的目光越過他所立身的陽台欄杆向下凝視。他能望的方向只有兩個：一是向前望向遠處的地平線，那裡零星散布著積雪覆蓋的磚砌樓房；二是向上望向那無盡高遠的天空，而視線終將被雲層阻擋。「俄羅斯的人民啊……」盧卡開始對自己低喃，俯視著街道上聚集在他腳下的人群。他能看見自己的雙腳穩穩地踩在陽台那道纖細的欄杆頂端，寒風抽打著他，而底下的人們似乎正憂心忡忡地仰望著他。「新西伯利亞的人民啊……不，」他繼續說道。他毫不費力便能找到措辭、記住它們，一點也不費力。他只是在欣賞腳下那些如螞蟻般渺小的人們。革命的人民，他的革命的人民，全都憂懼地注視著——他們相信，只要一陣風推來，他便會翻落身亡。\n\n「環顧你們的四周，看看你們彼此。」他說話的音量剛好能蓋過風聲與底下的人聲。「看看你們的朋友，你們的家人，你們的同志。現在告訴我，你們可曾想像過，那個被你視作朋友的人，很可能不僅是你的敵人，更是你所居住的家園的敵人？是你家人的敵人？」他的話語繼續流淌，似乎在底下的人群中起了作用；他們開始在彼此之間挪動、側身相望，或許正納悶這番話從何而來，但同樣專注於他所說的一切。盧卡臉上開始浮起一抹冷笑。他把原本安放在身側的雙臂遠遠地朝兩側甩開，彷彿要張臂擁抱。「我們的革命已掙扎得太久。我們不僅在東方有敵人，我們的敵人就在我們之中。看看你的左邊，看看你的右邊。他們任何一個，都可能是我們革命最大的宿敵。」\n\n此時，底下聚集的人群中低語漸起，而盧卡似乎瞥見一部攝影機正朝他拉近。他的冷笑更深了，他抬眼向上，閉上雙目，隨後才重新低下頭來。「這些敵人把我們的命運囚禁在他們的獠牙之間，阻擋著我們代表大會中的一切進展。」人群中泛起些許不滿；那片不斷擴大的人潮中，寥寥幾人舉起拳頭朝盧卡揮舞，試圖以自己的聲音蓋過他的話語，而他們周圍的人則開始退避。無妨，盧卡心想，一邊望著他們一邊繼續說道：「他們再也不會為禍我們，我們再也不必在絞索纏上脖頸之時，親手扼住自己的咽喉。」那幾名日益激動的異議者之一——顯然是其他黨派的成員——迅速被幾個身穿制服的身影團團圍住；即便隔著這樣的距離，盧卡也認得出，那是契卡。\n\n「因為我，唯獨我，已握起刀刃斬斷了那條繩索。如今，我不僅要將我們的利刃指向東方的敵人。我還要將它指向革命的一切敵人。」盧卡把右手向前甩出，手腕前伸、手指直指，彷彿握著一把匕首指向地平線；同時他將另一隻手握成拳頭，重重捶在自己心口。就在那一刻，圍住那名男子的契卡人員紛紛轉身背對他、面向盧卡，齊刷刷地將拳頭捶上自己的心口。這在人群中——除了那寥寥幾名異議者——引發了連鎖反應。片刻之後從人群中響起、並在隔日登上報紙頭條的那句話是……"
 SRU_Luka_Phase_One_Politics.13.a:0 "\"盧卡萬歲！\""
