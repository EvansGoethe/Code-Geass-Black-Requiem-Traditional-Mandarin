 SRU_Luka_Socialist_Flavour.1.t:0 "自新西伯利亞撤退"
 SRU_Luka_Socialist_Flavour.1.d:0 "隨著戰火在祖國各地綿延，歐洲不列顛尼亞的軍隊離勝利愈來愈近，而革命就在盧卡眼前分崩離析。首都陷入一片混亂，人民民兵倉皇奔赴，保衛祖國，但這一切都是徒勞——最終的勝利正一步步飄向敵人的掌心。當國家瀕臨全面崩潰之際，安東·馬卡羅夫元帥組織新西伯利亞的殘餘居民——這裡曾是革命事業最忠誠的同志們的家園——撤往哈薩克。盧卡·朱可夫下令，讓所剩無幾的革命衛隊在新西伯利亞四處埋設炸藥，以確保這座城市的基礎設施不落入敵手。命令一下達，他便與最親近的顧問們前往那列開往哈薩克的末班列車。在新西伯利亞撤離的同時，軍隊奉命留守，不惜一切代價抵抗敵軍；隨後紅軍與契卡之間驟然爆發內鬥，其後殘餘的契卡部隊動用了第一次俄國革命期間社會主義游擊隊所使用的地下隧道網絡。據報，盧卡·朱可夫在新西伯利亞火車站登上末班列車之前，被一名槍手擊傷；該槍手經指認為當地工人鮑里斯·米哈伊洛夫，他高喊著§t俄羅斯母親的叛徒§!，向盧卡·朱可夫連開三槍。盧卡·朱可夫被緊急抬上列車，列車隨即出發。目前尚不清楚盧卡·朱可夫是否已挺過傷勢，而該名槍手仍然在逃。"
 SRU_Luka_Socialist_Flavour.1.a:0 "總有一天我們會回來"
