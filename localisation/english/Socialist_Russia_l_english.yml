 POLITICS_LUKA_ZHUKOV_DESC:0 "盧卡·朱可夫，俄羅斯雅各賓委員會主席，生於【已刪除】，是雅各賓革命的最高領袖。在他於全聯盟共產黨內崛起掌權之前，人們對朱可夫先生所知甚少。但認識他的人形容他理性、務實，是唯一有能力復興這個早已被世界遺忘的意識形態之人。然而，他對俄羅斯——遑論對整個世界——懷抱著何等野心，就連他最親近的心腹與盟友也全然不知。不過有一件事是確定的：他決心將俄羅斯從毀滅的前夕拯救出來。他的統治是否會如羅伯斯庇爾那般血腥，仍有待觀察；但一個幽靈已被釋放到這個世界上，而只要無人與之抗衡，它的掌控便日益收緊。"
 SRU_sonya_bunina_desc:0 "索尼婭·布寧娜，全聯盟共產黨主席，生於1986年11月7日，是俄羅斯共產主義運動的實質領袖。索尼婭激進而理想主義，繼承了其父——同時也是黨的創建者——伊萬·卡圖寧的烏托邦理念。然而，她同樣清楚，正是缺乏妥協與種種失誤，導致了第一次革命的失敗。無論必須走上哪一條路，索尼婭都決意領導這場革命，或迎向赤色的黎明，或走向它最後的日落，好帶來父親自幼向她描述的那個共產主義未來。"
