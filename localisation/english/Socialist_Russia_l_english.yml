 SRU_socialism_achieved_desc:0 ""
 SRU_chekhovs_gun:0 "契訶夫之槍"
 SRU_chekhovs_gun_desc:0 "我們已成功說服政治局的同志們認同：我們的領袖盧卡·朱可夫，正是我們實現革命理想所需的凝聚力量。有朱可夫同志在幕後主持大局，我們必將戰勝那些企圖摧毀我們的反革命勢力。"
 SRU_coerce_the_generals:0 "脅迫將軍們"
 SRU_coerce_the_generals_desc:0 "軍隊日益集中於黨內保守派系的掌控之中。我們得「說服」幾位將軍，讓他們向我們及我們的理想靠攏，以確保革命成功——與我們合作，自然也符合他們自身的最大利益。"
 SRU_national_collectivist_society:0 "民族集體主義社會"
 SRU_national_collectivist_society_desc:0 "我們的社會如今與俄羅斯其他地區相互隔絕。若想有機會以革命之名奪回俄羅斯，就必須將各人口中心連結起來。應當給予他們一切機會，去培育一種舉國一體的手足情誼，好讓他們團結起來對抗資產階級。"
 SRU_form_the_russian_jacobin_council:0 "組建俄羅斯雅各賓委員會"
 SRU_form_the_russian_jacobin_council_desc:0 "圍繞著誰來掌控執政當局，我們持續的政治鬥爭無異於一場消耗戰。俄羅斯雅各賓委員會將使我們得以在政治上鞏固權力，同時不觸怒任何更高層的勢力。我們將能更好地協調行動，設下圈套困住索尼婭的權力集團，並將她從整個體系中連根拔除。"
 SRU_siberian_industrial_revolution:0 "西伯利亞工業革命"
 SRU_siberian_industrial_revolution_desc:0 "若我們要在革命的烈火中鍛造出一個嶄新的俄羅斯，就必須為革命提供戰勝其敵人所需的資源。唯有如此，當新時代的黎明降臨之時，我們才能享受隨之而來的繁榮。"
 SRU_the_eternal_revolution:0 "§R永恆的革命§!"
 SRU_the_eternal_revolution_desc:0 "自羅伯斯庇爾與伊萬·布寧的年代以來，我們已走過漫長的路；但他們終究只是一個被遺忘時代的人物。如今輪到我們來建立一套新的革命秩序——它將自俄羅斯發端，且絕不停歇，直到整個世界都被革命的熱忱所吞沒。"
 SRU_deal_with_mundane_politics:0 "應付瑣碎的政務"
 SRU_deal_with_mundane_politics_desc:0 "人民代表大會原本應是我們國家駛過歷史長河的權威民意所在，如今卻淪為一個毒蛇窩，一心要拖著我們一同覆滅。問題依舊擺在眼前：我們是要摧毀它，還是要利用它？"
 SRU_jacobin_all_the_way:0 "雅各賓主義貫徹到底"
 SRU_jacobin_all_the_way_desc:0 "顯然，在這個由暴君與菁英支配的時代，我們能繼續存活下去的唯一途徑，就是剷除我們政治文化中的那些寄生蟲。革命的未來只能託付給我們自己；唯有我們的意志才能引領它走向圓滿，而我們將創造一個讓人民得以昌盛的樂園。"
 SRU_purge_the_democrats:0 "清洗民主派"
 SRU_purge_the_democrats_desc:0 "是時候清除黨內較為腐敗的成分了。作為政治上的中間項，民主派的利用價值已經耗盡。剩下的便是將他們徹底逐出黨外——因為他們毫無疑問會試圖阻止我們拯救革命。"
 SRU_control_the_trade_unions:0 "約束工會"
 SRU_control_the_trade_unions_desc:0 "依照黨最初的綱領，工會被賦予了相對的自主權；它們對我們經濟與勞動力的若干面向握有可觀的權力。是時候確保工會服從革命的意志了。"
 SRU_isolate_the_liberals:0 "孤立自由派"
 SRU_isolate_the_liberals_desc:0 "黨內較為自由派的成分導致了第一次俄國革命的覆滅，並讓俄羅斯精神消沉了數十年之久。他們在那場大戰中把我們出賣給了歐洲人。我們絕不會再上他們的當——這一次，權力握在我們手中。"
 SRU_age_of_terror:0 "恐怖時代"
 SRU_age_of_terror_desc:0 "隨著對黨內較軟弱成分的清洗完成，我們得以進一步著手根除政府內外任何形式的反革命活動。如此一來，革命將獲得一些喘息的空間去成長，並培育出新一代的公職人員。"
 SRU_fear_and_propaganda:0 "恐懼與宣傳"
 SRU_fear_and_propaganda_desc:0 "在這個關鍵時刻，人民似乎樂天而無知，渾然不覺革命——以及他們自身——所面臨的迫近威脅。我們應當在民眾之間煽起一種恐懼的情緒，以確保我們獲得人民全力的支持。"
 SRU_terrify_the_people:0 "以恐懼震懾人民"
 SRU_terrify_the_people_desc:0 "反革命分子無處不在。我們應當號召同志們舉報任何可疑的反革命分子，好在事態失控之前，以適當的方式加以處置。"
 SRU_prepare_the_lists:0 "擬定名單"
 SRU_prepare_the_lists_desc:0 "反革命分子的威脅與日俱增，我們必須讓契卡參與保衛革命、對抗那些企圖摧毀它的人。因此，契卡已受命辨識並清除國家的敵人。"
 SRU_cult_of_supreme_socialism:0 "至高社會主義崇拜"
 SRU_cult_of_supreme_socialism_desc:0 "儘管黨在敵人與人民面前展現出一副社會主義統一戰線的模樣，實情卻是我們四分五裂。黨內盤踞著許多派系，都想掌控它的未來；但他們的邏輯是誤入歧途的——唯一的出路在我們這裡。我們將以雅各賓模式引領革命走向成功。"
 SRU_insanity_in_congress:0 "代表大會中的瘋狂"
 SRU_insanity_in_congress_desc:0 "在與政府合作一事上，代表大會日益陷入僵局，這絕不能容忍。或許他們需要人往正確的方向推一把。一場偽旗攻擊，將能奇蹟般地提振我們在代表大會中的支持度，也必定會使民眾對戰事的支持水漲船高。"
 SRU_no_need_for_politicians:0 "不再需要政客"
 SRU_no_need_for_politicians_desc:0 "是時候在代表大會中確立一套新的政治秩序了。準備工作既已就緒，我們如今便能全面掌控代表大會，並以革命叛徒之名將反對派驅逐——畢竟他們自革命奠基之日起，就一直在出賣革命。"
 SRU_luka_new_order:0 "盧卡的新秩序"
 SRU_luka_new_order_desc:0 "隨著內部的敵人被徹底殲滅，我們一直等待的時刻終於到來：我們得以確立領袖盧卡·朱可夫為革命事業唯一的、獨一無二的面孔。革命必將勝利，盧卡同志萬歲！"
 SRU_luka_position_secured:0 "§G盧卡的地位已然穩固§!"
 SRU_luka_position_secured_desc:0 "革命如今已牢牢掌握在我們手中，遠離了改革派或舊勢力那些被玷污的雙手。現在，我們可以將這個國家的根本肌理改造成更偉大的東西——一種千年之後仍能讓我們所有人引以為傲的東西。"
 SRU_mend_internal_divisions:0 "彌合內部分歧"
 SRU_mend_internal_divisions_desc:0 "為了國家的穩定，我們需要與反對派合作，逐步把他們納入我們的政治影響範圍。不過作為交換，我們也得犧牲些什麼來換取他們的支持。"
 SRU_concessions_to_the_peoples_congress:0 "對人民代表大會的讓步"
 SRU_concessions_to_the_peoples_congress_desc:0 "一如我們所料，代表大會要求我們作出讓步，以換取他們在政治上的支持。為了革命與人民，我們必須這麼做——反對派的支持將大大有助於我們對抗敵人。"
 SRU_the_crossroads_of_reform:0 "改革的十字路口"
 SRU_the_crossroads_of_reform_desc:0 "我們的國家正站在改革的邊緣，即將擺脫那套曾強加於我們的保守生活方式。在這個充斥著獨裁者與暴君的世界裡，人民將擁有他們可以享有的權利與自由。"
 SRU_post_war_promises:0 "對手的悲劇"
 SRU_post_war_promises_desc:0 "反對派明白，戰時我們無法兌現對他們的承諾，因此我們與他們達成了一項協議：條件是內戰結束之後，我們將推行那些改革。"
 SRU_back_out_of_democratic_reforms:0 "提拔我們的代理人"
 SRU_back_out_of_democratic_reforms_desc:0 "這些改革對我們國家的社會與經濟結構而言太過危險，不能任其實現。實質上，我們唯一的選項就是讓改革懸而不決，並寄望反對派不會察覺我們拖延的意圖。"
 SRU_the_great_russian_lie:0 "操控反對派"
 SRU_the_great_russian_lie_desc:0 "俄羅斯人民曾經偉大而強盛，但由於歐洲人扶植的政府之腐敗本質，那樣的日子早已遠去。面對現實吧——我們很弱小。不過，倘若我們贏得這場戰爭，向世界證明我們絕不會再度分裂，或許就能改變這一切。"
 SRU_the_foreign_delegation:0 "外國代表團"
 SRU_the_foreign_delegation_desc:0 "若要贏得這場戰爭，我們就需要最親近的友邦給予政治支持。中國與中東必定會設立常設大使館以確立外交關係來支持我們；而他們的承認，將大大有助於確立我們才是真正且唯一的俄羅斯。"
 SRU_reinstate_regional_elections:0 "恢復地方選舉"
 SRU_reinstate_regional_elections_desc:0 "要兌現我們的改革承諾，第一步便是恢復地方選舉。每一個蘇維埃州都必須由一個社區代表委員會來代表。縱使我們身處戰時，也必須在這個恐怖的世界中成為民主的燈塔。"
 SRU_go_beyond_their_expectations:0 "超乎他們的預期"
 SRU_go_beyond_their_expectations_desc:0 "改革的第一步既已落實，我們就該進一步推動我們自己的改革，讓我們的國家成為照亮俄羅斯的燈塔——或許這還能爭取到淪陷區人民的擁戴。"
 SRU_open_doors_policy:0 "門戶開放政策"
 SRU_open_doors_policy_desc:0 "若我們終將成為超級強權，就必須團結俄羅斯與東方的所有民族，以確保我們擁有足夠的人力與勞動力，來改善我們的國家並抵禦來犯之敵。"
 SRU_pass_the_war_measures_act:0 "通過戰時措施法"
 SRU_pass_the_war_measures_act_desc:0 "此法案將賦予政府更大的權力來處理內部問題，其設立宗旨是確保我們國家的整體穩定。務必盡快通過，以發揮其最大效力。"
 SRU_united_we_stand:0 "團結則立"
 SRU_united_we_stand_desc:0 "我們已在黨內達成了理想的團結程度。如今我們得以舉國向前，全力終結這場內戰，一勞永逸。我們必將凱旋！"
 SRU_luka_position_secured_compromise:0 "§G盧卡的地位已然穩固§!"
 SRU_luka_position_secured_compromise_desc:0 "動盪的政局既已擺平，我們如今得以全面掌控黨。有了反對派的支持，我們終於能將俄羅斯帶入一個新的時代，讓它成就自己的天命。"
 SRU_the_jacobin_revolutionary_army:0 "雅各賓革命軍"
 SRU_the_jacobin_revolutionary_army_desc:0 "革命需要一位守護者，來保護它不受那些企圖摧毀它的勢力所害。雅各賓革命軍將接替紅軍的位置，讓革命開花結果；人民將受到革命先鋒隊的保護。"
 SRU_kovalevs_plan:0 "科瓦廖夫的計畫"
 SRU_kovalevs_plan_desc:0 "科瓦廖夫的方案主張將現行的紅軍學說現代化，著重於現代化的裝備與戰術。紅軍將轉型為一支全面機械化的部隊，強大到足以把那些冒牌的俄羅斯打倒在我們腳下。"
 SRU_an_independent_military:0 "獨立自主的軍隊"
 SRU_an_independent_military_desc:0 "依照科瓦廖夫的方案，我們已承諾讓軍隊獨立於政府的干預之外。但願這能為我們贏得戰爭；不過若不加以安撫，他們也可能會反過來插手政府事務。"
 SRU_mechanise_the_army:0 "軍隊機械化"
 SRU_mechanise_the_army_desc:0 "總參謀部堅持要政府支持他們的機械化方案，好讓軍隊更充分地準備好在戰場上迎擊敵人。或許他們並未意識到，自己對政府政策握有多大的權力。"
 SRU_punch_harder:0 "拳頭更重些"
 SRU_punch_harder_desc:0 "若要在戰場上取勝，我們就必須擁有徹底粉碎敵人的力量——無論他們投入多少兵員。我們必將取勝。"
 SRU_red_blitz:0 "赤色閃擊"
 SRU_red_blitz_desc:0 "既然我們的軍隊已徹底採納機械化的作戰方式，就必須運用相應的戰術與裝備，去利用敵軍協同不力、指揮失控的弱點。"
 SRU_an_invincible_army:0 "一支無敵之師"
 SRU_an_invincible_army_desc:0 "我們的革命軍隊在敵人的武備面前所向無敵。革命必將戰勝那些資產階級的工具——那些人捨生忘死，只為讓他們的主子逃脫早該降臨在其頭上的裁決。"
 SRU_nakaharas_plan:0 "中原的計畫"
 SRU_nakaharas_plan_desc:0 "中原的方案實質上背離了我們紅軍的傳統學說。在他的領導下，陸軍與空軍將深度協同作戰，以在這個嶄新的戰爭時代中贏得勝利。"
 SRU_absolute_loyalty_to_zhukov:0 "絕對效忠朱可夫"
 SRU_absolute_loyalty_to_zhukov_desc:0 "依照中原的軍事學說，總參謀部與所有軍種都必須向朱可夫總理宣誓效忠。多數將領對總理如此赤裸裸的權力集中恐怕不會樂見，但為了國家的穩定與成功，這是必要之舉。"
 SRU_rapid_modernisation_of_the_airforce:0 "空軍的快速現代化"
 SRU_rapid_modernisation_of_the_airforce_desc:0 "馬卡羅夫已擬定空軍現代化的方案。他預測，只要計畫貫徹執行，軍隊要戰勝革命的敵人便不成問題。"
 SRU_bombs_away:0 "投彈"
 SRU_bombs_away_desc:0 "空軍已下令建造能將戰局扭轉至對我方有利的飛機。只要鞏固了制空權，敵軍在我們飛行員眼中將形同待宰羔羊。"
 SRU_red_thunder:0 "赤色雷霆"
 SRU_red_thunder_desc:0 "馬卡羅夫建議在空軍中組建一支菁英部隊，專職傘兵作戰，好在革命的敵人之中大肆製造混亂。我們要讓他們明白：無論逃得多遠，我們都有的是辦法找上門去。"
 SRU_crimson_skies:0 "緋紅蒼穹"
 SRU_crimson_skies_desc:0 "我們的飛行員主宰著俄羅斯的天空。眼下我們或許佔了上風，但若要宣告革命的勝利，就必須乘勝追擊，力求徹底殲滅敵軍。"
 SRU_anti_knightmare_tanks:0 "反Knightmare坦克"
 SRU_anti_knightmare_tanks_desc:0 "我們的士兵決心將革命的鬥爭進行到底。他們甘冒性命之險，只為讓革命能凌駕於資產階級之上、傲然屹立。"
 SRU_notify_the_gru:0 "通知格魯烏"
 SRU_notify_the_gru_desc:0 "我們的敵人正在其部隊中運用Knightmare技術。政府已委託研發一種新武器，應能在戰場上遏制Knightmare部隊。"
 SRU_permanent_martial_law:0 "永久戒嚴"
 SRU_permanent_martial_law_desc:0 "我們已獲得情報，敵人正在干預我們的內政。必須將此事通報格魯烏，讓他們嚴防敵方間諜——那些人毫無疑問會設法傷害革命、削弱我們的國力。"
 SRU_purge_resistance_fighters:0 "清洗抵抗戰士"
 SRU_purge_resistance_fighters_desc:0 "隨著搜捕敵方間諜的行動在祖國各地持續進行，政府已決定永久實施戒嚴，以逮捕這些欺瞞革命的人。"
 SRU_web_of_shadows:0 "暗影之網"
 SRU_web_of_shadows_desc:0 "隨著我們佔領的領土日益擴大，抵抗戰士也開始為我軍製造麻煩，影響到通往前線的補給線。這絕不能容忍——契卡對付這些人可有得忙了。"
 SRU_rely_on_cheka:0 "倚重契卡"
 SRU_rely_on_cheka_desc:0 "國家的敵人似乎無處不在，唯有大規模的清洗方能滌淨我國境內的這些叛徒。契卡必定能以審慎的方式，把該辦的事辦妥。"
 SRU_planned_disappearances:0 "有計畫的失蹤"
 SRU_planned_disappearances_desc:0 "我們政府中的某些成員已開始萌生反革命的念頭。必須剷除舊勢力，好為我們將在俄羅斯建立的新秩序讓路。"
 SRU_the_antonov_plot:0 "安東諾夫陰謀"
 SRU_the_antonov_plot_desc:0 "是時候向那些來自遠東的侵略者出手了。我們的間諜與刺客將同時對該國的關鍵人物與要害地點發動襲擊，播下不滿的種子，削弱該國的穩定，好為我們即將到來的終戰鋪路。"
 SRU_operation_red_awakening:0 "赤色覺醒行動"
 SRU_operation_red_awakening_desc:0 "既然準備已然就緒，我們便可發動「赤色覺醒行動」，一舉將侵略者逐出我們的土地。任何通敵者一經發現即應就地槍決，無須審判——畢竟在革命眼中，人人平等。"
 SRU_zaytsevs_vision:0 "扎伊采夫的願景"
 SRU_zaytsevs_vision_desc:0 "扎伊采夫同志是我們最頂尖的經濟專家。在可預見的未來，他將主導我們的經濟政策與走向。由他來量身打造符合我們需求的經濟體制，再合適不過，這也將讓我們在對抗敵人時佔得上風。"
 SRU_central_planning:0 "集中計劃"
 SRU_central_planning_desc:0 "若要贏得這場戰爭，我們就必須生產出比敵人更精良的武器。軍方的研發部門將獲得額外撥款，以研製更多可在未來數年間用以對抗敵人的武器。"
 SRU_the_war_machine:0 "戰爭機器"
 SRU_the_war_machine_desc:0 "若我們真要把革命帶回俄羅斯，就必須準備好為我們作為一種意識形態、一個民族的存續而發動一場總體戰。動員國家與人民，是我們戰勝敵人的必要之舉。"
 SRU_aerial_assembly_lines:0 "航空裝配線"
 SRU_aerial_assembly_lines_desc:0 "我們的戰事極度仰賴取得制空優勢。我們必須提高戰機產量，一勞永逸地鞏固對俄羅斯天空的掌控。唯有如此，我們才能著手實行我們的宏偉計畫。"
 SRU_state_factories:0 "國營工廠"
 SRU_state_factories_desc:0 "為達到支撐戰爭所需的預期產量，我們必須將數家製造商收歸政府管轄，並令其專注於軍工生產。"
 SRU_military_firepower:0 "軍事火力"
 SRU_military_firepower_desc:0 "我們的軍隊需要武器來擊退俄羅斯的侵略者。我們將制定每週軍備生產配額，並逐步達到最佳產出水準，以維繫我們的軍事能力。"
 SRU_cut_corners:0 "削減成本"
 SRU_cut_corners_desc:0 "政府層層下達的軍工生產配額，已超出我們工業的負荷。為達成配額，我們或許得走些捷徑、偷工減料。"
 SRU_war_machine_in_overdrive:0 "全速運轉的戰爭機器"
 SRU_war_machine_in_overdrive_desc:0 "如今，我們的國家已徹底且全然地投入於剷除國內外的國家之敵。經濟自此將被動員至總體戰的態勢，因為我們國家的存亡，繫於能否戰勝帝國主義者。"
 SRU_implement_a_forced_labour_programme:0 "推行強制勞動計畫"
 SRU_implement_a_forced_labour_programme_desc:0 "隨著戰事拖延，其對經濟的影響已開始顯現。為穩定局勢，政府決定啟動一項強制勞動計畫，以紓解工業部門的壓力，並緩解所需勞動力的緊繃，使之與徵兵取得平衡。"
 SRU_penal_battalions_in_the_army:0 "軍中的懲戒營"
 SRU_penal_battalions_in_the_army_desc:0 "一位政府部長提議，在契卡的指導下將囚犯改造計畫擴及軍隊。軍方對此提案表示反對，因為這將使契卡在軍事事務上握有更大的話語權。"
 SRU_establish_the_gulags:0 "建立古拉格"
 SRU_establish_the_gulags_desc:0 "過去數月間，已知與潛在的國家之敵人數急遽攀升，已超出我們監獄所能負荷。契卡首腦庫利科娃提議設立一座專門關押政治犯的新監獄，以紓解司法體系的壓力。"
 SRU_the_economic_heart:0 "經濟的心臟"
 SRU_the_economic_heart_desc:0 "若我們真要作為一個國家成長茁壯，就必須擴充民生經濟，以支撐我們日益增長的工業擴張需求。這無疑會讓我們的土地對那些渴望逃離戰亂與貧困的俄羅斯人民極具吸引力。"
 SRU_state_production_companies:0 "國營生產公司"
 SRU_state_production_companies_desc:0 "我們的工業管理亟需領導。政府應下令設立若干國營公司，以承擔我們日益壯大的工業所帶來的行政重負。"
 SRU_international_brigades:0 "哈薩克旅"
 SRU_international_brigades_desc:0 "我們正打著一場攸關社會主義命運的殊死之戰，勝負全繫於此。我們應當向哈薩克的一些盜匪發出招募，並「說服」他們：為我們而戰，總好過在自己的家鄉為禍鄉里。"
 SRU_zaytsevist_architecture:0 "扎伊采夫式建築"
 SRU_zaytsevist_architecture_desc:0 "扎伊采夫同志已被任命為經濟的最高主管。他對俄羅斯懷有一套獨到的願景，並希望在全國範圍內推行第一輪工業計畫。"
 SRU_state_owned_unions:0 "國有工會"
 SRU_state_owned_unions_desc:0 "掌控資產階級所擁有的工廠，是我們工業革命計畫中的關鍵一步。在我們為延續俄羅斯工業革命而建立的國家管控體制之下，人民終將走向繁榮。"
 SRU_government_slaves:0 "政府的奴隸"
 SRU_government_slaves_desc:0 "如今工廠已牢牢掌握在我們手中。基於契卡首腦庫利科娃提供的令人憂心的情報，政府希望能震懾文官體系與其他政府機構。我們必須以忠於國家新革命理想的人，來取代那些叛徒。"
 SRU_zaytsev_economic_miracle:0 "扎伊采夫的經濟奇蹟"
 SRU_zaytsev_economic_miracle_desc:0 "儘管我們此刻仍深陷戰火之中，我們的經濟卻已臨近繁榮的門檻。無論如何，在扎伊采夫同志的領導下，我們絕不能讓戰爭拖慢經濟發展的腳步。"
 SRU_luka_east_secured:0 "太平洋的黎明"
 SRU_luka_east_secured_desc:0 "經過漫長的戰役，我們終於戰勝了遠東。如今我們必須將目光投向西方，迎接那場將決定祖國命運的衝突。"
