 SRU_Intro.1.t:0 "人民已作出抉擇"
 SRU_Intro.1.d:0 "在遠離俄羅斯心臟地帶、哈薩克那片荒莽未馴的草原上，一股早被認定已然死去的歷史力量再度進軍。它自灰燼中重生，革命又一次降臨俄羅斯。\n\n當年公社社員未能奪取全世界，俄國蘇維埃政權遭歐洲的反動勢力碾碎，許多人便認定革命的窗口已然關閉，物質條件已然改變，馬克思主義已然過時。但那些逃過歐洲槍口清算的革命先鋒，遁入亞洲的荒野，蟄伏待機，一邊積蓄力量，一邊等候屬於他們的時機。如今，在那場偉大革命的半個世紀之後，俄羅斯的工人與人民正對這個崩壞的國家發出怒吼；而當年讓革命傷痕累累、支離破碎的那些人的後裔，如今帶著革命的紅旗歸來。\n\n此刻他們席捲西伯利亞，人民高舉紅旗、歡聲雷動地迎接他們的到來，挺身而出為一個更美好的世界而戰。在希望之中，也有著對局勢危殆的清醒認識。憑藉運氣與智謀，革命在初次失敗中倖存下來；但蘇維埃的繼承者們明白，這一次它再無處可逃。所有人心中都懷著同一個決心：半個世紀之後，人類終將獲得解放，否則革命的火種將永遠熄滅……"
 SRU_Intro.1.a:0 "'我們失去的只是鎖鏈。'"
 SRU_Intro.2.t:0 "步向瘋狂的深淵"
 SRU_Intro.2.d:0 "\"我的同志們。自我們的理想誕生以來，我們這些全心全意、忠貞不渝地信奉它的人，便一直被那些企圖摧毀我們的勢力追殺至瀕臨滅絕——無論是來自外部的威脅，還是來自我們自己陣營內部的威脅。在這個由暴君與貪官污吏的意志所支配的世界裡，我們為正義與平等而發動的聖戰，在過去五十年間歷經起伏；然而無論如何，我們當前所走的這條路，只會為我們的人民帶來毀滅與悲痛。索尼婭與她的同類正領著我們走向自己的墳墓。若我們要生存下去、要奪回革命的誕生地，就必須改變自己，才能在這個如此屈從於那些早該壽終正寢的古老帝國意志的世界中活下來。正如你們許多人所知，戰爭的陰影正籠罩俄羅斯，風暴幾已臨頭，而我們對其後果毫無準備。但不必恐懼，因為我已前來，要把你們從那些聚集在門前、一心要洗劫並摧毀你們的家園、屠戮你們家人的蒙昧異教徒手中拯救出來。我與全聯盟共產黨就是你們的未來，我們是你們的救主，我……是你們在這個受詛咒的世界中唯一的生機。\"\n\n\"如今，我的俄羅斯同胞們，抉擇在你們手中：我們是要在索尼婭的旗幟下繼續走向毀滅，還是願意加入我，共同開創一個為我們摯愛的俄羅斯帶來自由、正義與安全的新時代？對於那些勇於為雅各賓事業拿起武器的人，你們的名字將被後世世代銘記。\""
 SRU_Intro.2.a:0 "\"我的意志即是革命的意志。\""
 SRU_Intro.3.t:0 "敢於夢想"
 SRU_Intro.3.d:0 "\"俄羅斯的人民啊！五十年來，為了躲避資本與帝國主義的血腥報復，我們的黨重返其地下的根源。在那五十年裡，我的父親與他的同志們夢想著高舉革命的火炬歸來。我多希望他們此刻仍在，能親眼見證這一刻……我也曾希望，我們能像騎在馬背上的赤色騎士那般，擎著共產主義與變革的火焰。可是……這份功勞屬於你們，屬於西伯利亞與俄羅斯的人民。在那五十年裡，你們在資本與歐洲帝國主義的暴政下忍辱負重，你們的未來被寡頭政治與盜賊統治的機器碾成齏粉。在這數十年間，你們不僅活了下來，更保存了最重要的東西……希望。對更美好世界的希望，我們對一個無階級社會的夢想——在那裡，我們不再為自己的暴政而勞作，而是為人類的集體事業而奮鬥。我不否認時局令人恐懼，也不否認我們或許都被某種程度的恐懼所吞噬；但請鼓起勇氣，因為人類搏動的心臟就在你們身後。你們已經走到了這一步，再最後一搏，我們的夢想就將成為現實——全都因為你們堅持到了今天。正因如此，我來到這裡，不是作為一位領袖，而是作為革命的僕人……\"\n\n\"在那所有的黑暗歲月裡，你們從未讓星光熄滅……為了全人類，我感謝你們。\""
 SRU_Intro.3.a:0 "'革命屬於人民。'"
 SRU_Intro.4.t:0 "蘇維埃的正義"
 SRU_Intro.4.d:0 "在新西伯利亞的郊外，兩名契卡人員站在他們最近一次突襲行動的殘局之上。瓦列里·科斯科夫——ROSMIRES西伯利亞區總監——那棟裝潢俗艷的別墅，如今已是一片狼藉，碎玻璃四散，塵土與火藥味嗆滿了這處血腥的現場——總監的保鏢們就是在這裡作了最後的頑抗。而這位東方赫赫有名的人物本人，則近乎失神地癱在地上，喃喃自語，一名契卡士兵正在為他腿上的彈片傷口做處理。\n\n第一位契卡軍官羅曼環視現場，轉向他的同僚：「十二名傭兵陣亡，四人受傷，五人被捕，目標已控制。幹得不賴，是吧，根納季？」\n\n然而根納季並不在他身旁，而是憂心忡忡地望向窗外。羅曼一頭霧水，直到他走過去，才看見是什麼讓同僚如此不安。在別墅的大門外，勉強被契卡的安全部隊擋住的，是一群不斷壯大、正在吶喊嘶吼的暴民，足有數百人之眾。抗議聲含混不清，但兩人都能讀懂這群人的心思——在這片喧囂之下，是一句無聲的口號：「殺了科斯科夫！」「我們人手不夠攔住他們。如果他們要他的腦袋，我們也許只能給他們。」根納季神情認命地望著人群說道。「什麼！」羅曼喊道，「庫利科娃主席下令要我們把他帶回去，她會——」「多半不會在意，」根納季打斷他，「這說不定就是她安排的。這一切都有雅各賓派那套血腥仇恨狂歡的典型印記——她大概是把行動的消息洩露了出去，好讓他們一齊出現在這裡。」羅曼正要回話，一名士官便把一支電話塞進他手裡——是契卡對外情報處打來的加密通話。\n\n耳邊傳來一個冷靜沉著的男聲：「你們的處境很棘手，所以我就不繞彎子了。我已派了一架直升機過去，將科斯科夫撤離。我們組織內部有不少人對暴民統治有著切身的利害關係；但我，絕不容忍我們的權威遭到侵蝕。我給你們一條退路，要不要走，由你們決定。只要記住——一旦人民嚐到了把自己憎恨的人吊在路燈上的滋味，總有一天，在風中晃盪的可能就是你自己……」兩人其實都不介意看那寡頭被人民吊死，但來電者最後那番話卻讓他們心生猶疑。最終，根納季轉向羅曼，問道：「那麼，上尉，您的決定是？」"
 SRU_Intro.4.a:0 "'讓對外情報部門帶走他，一個字也別讓主席聽見……'"
 SRU_Intro.4.b:0 "'讓人民得到他們所需的復仇，把他丟在正門口……'"
 SRU_Intro.5.t:0 "說服頑固派"
 SRU_Intro.5.d:0 "黨代表大會遷往新西伯利亞是件突如其來的事，把全聯盟共產黨的整套行政架構攪得天翻地覆。儘管身處戰時、遷徙倉促，五名黨代表卻圍坐在一間酒吧煙霧繚繞的後屋桌旁，彷彿他們已在此當了多年的常客。「我跟你說，葉夫根尼！庫拉科夫不過是個辦事員；他對共產主義的精神一無所知！」一名多喝了幾杯的大鬍子官員朝同僚打著嗝說道。「費奧多爾，你這頭蠢驢，」戴眼鏡的男人回敬道，「我們正需要這樣一個理性的人物來制衡索尼婭的理想主義。庫拉科夫完美地承續了雅科夫同志的路線。」\n\n桌邊一名形容枯槁的男人放下酒杯，插話道：「我們不能讓索尼婭帶著她那幫盟友肆無忌憚地橫行。我們不是那些血腥的沙皇——權力來自才能，而非恩庇或出身，而盧卡·朱可夫無疑是有才能的。」正當另外兩人圍攻他時，第四個男人癱在桌上，兀自呻吟著：「反正都沒用。這兩個人選，出於意識形態的緣故，誰都跟索尼婭處不來。盧卡只會設法篡她的位，而庫拉科夫的觀點終將無法調和。橫豎我們都完蛋了。」\n\n四名黨代表你來我往地爭辯了數小時，仍未得出什麼像樣的結論。儘管吵得不可開交，他們卻同甘共苦、始終不離不棄——多年來一致投票、共進退，如今也無意改變。僵局看似無解，直到桌旁的第五個人——他們之中年紀最長、至今仍記得馬克西姆·布寧的那位——咳嗽了一聲。眾人從醉意中驚醒，側耳聆聽他的話語。這位老人最受敬重，他的一句話便能定奪此事。"
 SRU_Intro.5.a:0 "'索尼婭與庫拉科夫或許能在理想與務實之間，取得我們所需的平衡……'"
 SRU_Intro.5.b:0 "'給盧卡一個機會吧，沒有人能用乾淨的雙手發動革命……'"
 SRU_Intro.6.t:0 "選票全數計畢"
 SRU_Intro.6.d:0 "身為現任主席，索尼婭·布寧娜名義上是共產黨內最有權勢的人物。但當民主集中制的議事程序淪為雅各賓派與其反對者之間的一場叫罵、甚至有幾名成員不得不被架出會場時，在這個將決定黨之未來的終極時刻，她卻感到無能為力。\n\n她已竭盡所能：她遊說、奔走、使盡渾身解數，只為確保庫拉科夫登上總理之位。可是這樣就夠了嗎？在會場的一側，她看見了他——盧卡·朱可夫，草原上的惡魔……若說她曾希望父親有哪件事做得不一樣，那便是絕不該讓那個令人毛骨悚然的傢伙靠近這個黨。\n\n此刻，這個縈繞在中亞無數人噩夢中的怪物，卻顯得頗為無聊，他坐在會場一角，不耐煩地盯著時鐘，而他的黨羽們則卑躬屈膝地四處奔走，執行他的意志。\n\n索尼婭不願再多想他，便將視線轉向庫拉科夫。他一向是沉著冷靜的化身，是他所倡導的那種平衡、平淡而技術官僚式共產主義的人格具現——事態的嚴峻絲毫未曾改變他。\n\n黨的書記重重敲下議事槌，宣布了黨的裁決，索尼婭這才從思緒中被猛然拉回。\n\n「依據民主集中制的原則，『全聯盟共產黨』選舉盧卡·朱可夫出任新的西伯利亞社會主義共和國總理……」\n\n當「盧卡·朱可夫」與「總理」這幾個字在她腦中迴盪時，索尼婭的心沉了下去。她幾乎沒有察覺盧卡在如雷的贊同聲與仇恨的叫喊聲中走上講台，開始了他的就職演說……"
 SRU_Intro.6.a:0 "'謝謝你們，同志們。今日的決定意義非凡，隨著它帶來的改變，你們將感受到它的分量……'"
 SRU_Intro.7.t:0 "選票全數計畢"
 SRU_Intro.7.d:0 "身為現任主席，索尼婭·布寧娜名義上是共產黨內最有權勢的人物。但當民主集中制的議事程序淪為雅各賓派與其反對者之間的一場叫罵、甚至有幾名成員不得不被架出會場時，在這個將決定黨之未來的終極時刻，她卻感到無能為力。\n\n她已竭盡所能：她遊說、奔走、使盡渾身解數，只為確保庫拉科夫登上總理之位。可是這樣就夠了嗎？在會場的一側，她看見了他——盧卡·朱可夫，草原上的惡魔……若說她曾希望父親有哪件事做得不一樣，那便是絕不該讓那個令人毛骨悚然的傢伙靠近這個黨。\n\n此刻，這個縈繞在中亞無數人噩夢中的怪物，卻顯得頗為無聊，他坐在會場一角，不耐煩地盯著時鐘，而他的黨羽們則卑躬屈膝地四處奔走，執行他的意志。\n\n索尼婭不願再多想他，便將視線轉向庫拉科夫。他一向是沉著冷靜的化身，是他所倡導的那種平衡、內斂而技術官僚式共產主義的人格具現——事態的嚴峻絲毫未曾改變他。\n\n黨的書記重重敲下議事槌，宣布了黨的裁決，索尼婭這才從思緒中被猛然拉回。\n\n「依據民主集中制的原則，『全聯盟共產黨』選舉米哈伊爾·庫拉科夫出任新的西伯利亞社會主義共和國總理……」\n\n索尼婭心頭一振，她的思緒被理想主義者與修正派的掌聲所淹沒。庫拉科夫走向講台，在開口演說之際，向索尼婭微微頷首以示謝意。"
 SRU_Intro.7.a:0 "'謝謝你們，同志們。能為我們的革命擘劃航向，是我的榮幸。'"
 SRU_revolution_once_more:0 "再一次革命"
 SRU_revolution_once_more_desc:0 "將近半個世紀之後，共產主義重返俄羅斯。聯邦那腐朽的軀殼已然坍塌，而在它垂死的喘息聲中，要求變革的呼聲愈發響亮。黨已自哈薩克歸來，向世界擲下革命的戰帖。"
 SRU_rallying_the_workers_protests:0 "號召工人"
 SRU_rallying_the_workers_protests_desc:0 "西伯利亞的無產階級長期受寡頭資本的枷鎖所苦。當聯邦開始步向死亡，他們便著手奪取生產資料。這些團體雖未公開標榜共產主義，但鑑於我們的理想何其相近，動員他們應當不難。"
 SRU_let_luke_fuel_their_hate:0 "讓盧卡煽動他們的仇恨"
 SRU_let_luke_fuel_their_hate_desc:0 "人民淪為資本的奴隸已有多久了？多少人眼睜睜看著自己的家人被世界資本那墮落的霸權打倒、嚼碎、吐出。希望在絕望的群眾中早已死去，但仇恨——那深沉的仇恨——依然存在。朱可夫同志知道該如何讓這些人向這個世界索討他們所渴望的復仇。"
 SRU_have_sonya_promise_the_future:0 "讓索尼婭許諾未來"
 SRU_have_sonya_promise_the_future_desc:0 "數百年來，我們在資本與帝國主義之下勞苦。人類曾墜入絕望與無助最黑暗的深淵，但我們依然前行。無論多少勇敢的革命者被斬殺，為更美好世界而戰的鬥爭都不會終結。一個沒有壓迫的世界，一個沒有階級的世界，一個沒有帝國的世界——那正是索尼婭所許諾的世界。或許，是時候懷抱一點希望了……"
 SRU_dealing_with_the_oligarchs:0 "處置寡頭"
 SRU_dealing_with_the_oligarchs_desc:0 "寡頭與他們的爪牙在全俄羅斯遭人唾棄。這群卑劣的富豪政客，在俄羅斯遭受經濟劫掠時歡欣鼓舞地牟利，當所有人都在受苦時，他們卻沉溺於自己的贓物之中。對這些殘餘的人渣清算，早該來了。"
 SRU_convincing_party_holdouts:0 "說服黨內頑固派"
 SRU_convincing_party_holdouts_desc:0 "國家總理一職的競爭已開始白熱化。多數黨員不是支持代表青年蘇維埃—修正派同盟的米哈伊爾·庫拉科夫，就是支持雅各賓派的盧卡·朱可夫。然而，仍有少數頑固派尚未選邊站。他們的決定可能左右投票結果。"
 SRU_returning_session_of_the_politburo:0 "政治局復會"
 SRU_returning_session_of_the_politburo_desc:0 "黨將召開自1964年以來首次於俄羅斯本土舉行的會議。在這場共產主義的偉大歸鄉之中，一項重要的決定將被作出：誰將被選為實質上的政府首腦？索尼婭支持的人選庫拉科夫，將與朱可夫爭奪此位。青年蘇維埃—修正派同盟與雅各賓派之間的政治鬥爭已延燒多年，如今，這場衝突終將迎來攤牌。"
 SRU_to_grasp_the_future:0 "掌握未來"
 SRU_to_grasp_the_future_desc:0 "雅各賓派的投機分子暫時被擊退了，共產黨真正的繼承者贏得了勝利。索尼婭·布寧娜主席與新當選的總理米哈伊爾·庫拉科夫，將領導這個由理想主義者與務實主義者組成的統一戰線，為俄羅斯與全人類建設一個嶄新的未來。"
 SRU_the_peoples_hearts:0 "人民之心"
 SRU_the_peoples_hearts_desc:0 "為了我們的家園與家人，以自由人而非奴隸的身分，為了我們的存續……"
 SRU_the_soldiers_blood:0 "士兵之血"
 SRU_the_soldiers_blood_desc:0 "獻給那些與人類公敵作戰、為一個更美好的世界獻出生命的人們……"
 SRU_the_workers_toil:0 "工人之勞"
 SRU_the_workers_toil_desc:0 "為了人類的勞動獲得自由，不再被個人的貪婪所束縛……"
 SRU_march_of_the_revolution:0 "革命的進軍"
 SRU_march_of_the_revolution_desc:0 "為了世界革命與全人類……\n\n革命必將繼續前進，直至凱旋，或長眠於烈士之墓。"
 SRU_Politburo_War_Powers:0 "政治局戰時權力"
 SRU_Politburo_War_Powers_desc:0 "俄羅斯局勢動盪不安，稍有不慎便可能撲滅革命的火焰。基於這些理由，我們將把政府的緊急權力交予政治局。儘管許多人指責此舉逾越了界線、淪為波拿巴主義，或是向黨國體制邁進，但要引領革命完好無損地駛過內戰的險灘，這是必要之舉。"
 SRU_Establishing_The_Peoples_Congress:0 "建立人民代表大會"
 SRU_Establishing_The_Peoples_Congress_desc:0 "革命尚且年輕，我們正處於邁向社會主義與共產主義的過渡階段，因此必須作出妥協。人民代表大會便是這樣一種妥協——一個由民選產生、就立法動議進行表決的議院。正如雅科夫·布寧所闡述的，這是「人民共和國」概念的支柱，在通往共產主義的道路上，作為邁向無階級、無國家社會的過渡階段。"
 SRU_Minority_Seat_Elections:0 "少數席位選舉"
 SRU_Minority_Seat_Elections_desc:0 "我們不能冒險讓立法機構被資產階級的政黨政治所癱瘓。我們固然會給予反對派代表權，但必須按比例加以限制。只有三分之一的席位開放給非全聯盟共產黨的候選人競選。這意味著無論結果如何，我們都將在人民代表大會中掌握多數。這或許不夠民主，但如今是戰時，我們不能被那些鑽營者與投機分子所把持。"
 SRU_Full_Congress_Elections:0 "全體代表大會選舉"
 SRU_Full_Congress_Elections_desc:0 "扼殺代表大會，就是扼殺人民。這儘管是一項讓步措施，我們仍須將它當作推進本黨工作的跳板。若我們不憑真本事堂堂正正地擊敗對手，反倒去斷其手腳，這絕非向人民傳達正面訊息之道。何況反對派幾無組織可言，我們不可能拿不到多數。"
 SRU_Mobilize_The_State:0 "動員國家"
 SRU_Mobilize_The_State_desc:0 "我們沒有在和平時期從容建國的餘裕。在建設社會主義祖國的同時，我們也正與帝國主義反動勢力進行一場攸關存亡的生死搏鬥。為此，我們必須為這場關乎生存的偉大戰役，統一全民族與全體人民的意志。"
 SRU_The_Party_Or_The_State:0 "黨，還是國家？"
 SRU_The_Party_Or_The_State_desc:0 "新人民共和國的憲政架構已然確立。然而黨與國家之間的界線卻極為模糊。國家與黨的官僚體系之間日益頻繁的衝突已成問題。我們必須明確界定，究竟哪一個權力分支擁有行政上的至高地位。"
 SRU_Educational_Doctrine:0 "教育方針"
 SRU_Educational_Doctrine_desc:0 "將西伯利亞眾多分散的私立與地方辦學校統一為單一而完整的國家教育體系，這讓我們面臨一個重大抉擇：我們究竟要教什麼？意識形態理論家、宣傳工作者、教育專業人士與教師們，圍繞課綱的爭執已日趨惡劣。若我們想要一套統一的教育體系，就必須作出選擇。"
 SRU_Opening_The_Ministry_Of_Welfare:0 "設立福利部"
 SRU_Opening_The_Ministry_Of_Welfare_desc:0 "有許多疲憊而絕望的人需要一張安全網，戰時尤其如此。老人、孤兒、身障者、無家可歸者以及其他弱勢群體，往往最先淪為紛爭與衝突的犧牲品。我們絕不重蹈覆轍，讓那些最需要我們幫助的人在我們專注於戰爭時死去。我們將設立福利部，確保無人挨餓、無人病無所醫、無人露宿街頭。"
 SRU_The_Power_Of_The_Media:0 "媒體的力量"
 SRU_The_Power_Of_The_Media_desc:0 "自我們掌控西伯利亞以來，新聞界一直在灰色地帶運作。我們以《真理報》為核心、接收查抄的寡頭媒體資產，建立起一套強大的國家新聞網絡；但仍有不少獨立媒體（無論支持或批評我們的）繼續運作。黨內意見分歧：究竟該任由批評自由流通，還是該管控新聞界，以防反革命的聲音佔上風。"
 SRU_The_Foreigners_Loyalties:0 "外國人的忠誠"
 SRU_The_Foreigners_Loyalties_desc:0 "大量歐盟僑民與公民仍居住在西伯利亞。他們多半是受俄羅斯企業聘僱的技術專業人員，從事採礦、製造與設計技術等高技術門檻的工作。許多人在此成家，實質上已是永久居民。黨內有人提出了合理的疑慮：其中某些人可能是為歐盟潛伏的間諜，對革命毫無忠誠可言。另一些人則主張，他們是有用的專業人才。無論如何，我們都必須把這個問題解決。"
 SRU_Opening_The_Ministry_Of_Information:0 "設立情報部"
 SRU_Opening_The_Ministry_Of_Information_desc:0 "在現代，新聞、媒體與資訊本身已成為一片戰場。無論新聞界是該被管控還是該受保護，我們都需要一個機構來應對資訊時代。新設立的情報部將負責監管：通訊基礎設施、網際網路規範、新聞業標準、社群媒體規範，並統管國有媒體資產。"
 SRU_Removing_The_Jacobin_Chekists:0 "清除雅各賓派契卡人員"
 SRU_Removing_The_Jacobin_Chekists_desc:0 "契卡在俄羅斯留下了惡名昭彰的遺產。它成立於1961年革命之後，以殘酷的執著與高效追捕革命的敵人。流亡期間，這個秘密警察組織逐漸轉型為一個更為全面的黨內情報機構，在中亞的工作中學到了許多。然而近年來，該組織日益被雅各賓派所把持——比起他們，六〇年代的老契卡人簡直溫和得像綿羊。為了我們的穩定，這些暴徒必須被清除，如此先鋒隊才不會反過來試圖推翻我們……"
 SRU_Chairwoman_Leonova:0 "列昂諾娃主席"
 SRU_Chairwoman_Leonova_desc:0 "塔季雅娜·列昂諾娃是索尼婭·布寧娜的老友，兩人在同一個僑民圈子裡長大。她目前也是契卡要人保護處的負責人，職責是保護黨內高層官員。她做事勤勉、手段強硬，在雅各賓派把持的契卡內部，維繫住了一個青年蘇維埃派的派系。在所有人當中，她是我們最能託付以組建一支忠誠先鋒隊的人選——由她接替庫利科娃出任我們秘密警察的首腦，再合適不過。"
 SRU_Chairman_Ivanov:0 "伊萬諾夫主席"
 SRU_Chairman_Ivanov_desc:0 "伊萬諾夫先生在我們的隊伍中頗為神秘。就算我們曾經知道伊萬諾夫先生是何許人也，如今也肯定不知道了——因為在他出任契卡對外情報處處長時，便實質上抹去了自己的一切檔案。他的成績有目共睹：民主社會聯盟危機之後，我們在俄羅斯的情報網基本上是由他重建的；他或許是該組織史上最能幹的間諜首腦。我們不知道他效忠於誰，但看雅各賓派試圖除掉他的次數，那肯定不會是雅各賓派。有了這位深藏不露的奇才，契卡必定會落在可靠的人手中。"
 SRU_Founding_The_MGB:0 "成立國家安全部"
 SRU_Founding_The_MGB_desc:0 "契卡向來是我們引以為傲的先鋒，卻也因「紅色恐怖」而留下了相當惡劣的名聲。而且它在結構上仍偏重於秘密警察組織的職能。在當今的局勢下，我們需要一個統一的機構，能夠同時處理對外與對內情報以及安全事務。國家安全部（MGB）將成為契卡原有職責的新統轄機構，並承擔邊境安全、內衛部隊、資訊戰與網路安全等新任務。"
 SRU_Groundwork_Of_The_Revolution:0 "革命的奠基"
 SRU_Groundwork_Of_The_Revolution_desc:0 "我們已為革命的前行奠定了穩固的基礎。我們避開了馬克西姆·卡圖寧的錯誤，沒有在一場貨真價實的戰爭之中，讓自己被一場倉促發動的階級鬥爭所吞噬。索尼婭同志與黨結合了馬克西姆與雅科夫·布寧的歷史教訓，建立起一個既能捍衛革命、又不失其熱忱的國家。就在這塊磐石之上，讓我們牢牢升起紅旗，讓它永世飄揚！"
 Siberian_Economic_Matters:0 "西伯利亞經濟事務"
 Siberian_Economic_Matters_desc:0 "對我方領土內寡頭資產的懲罰性沒收，讓我們直接掌控了大量資本、工業與資源。新成立的各經濟部門一直在辯論，究竟該如何將這些資產配置到我們的工業戰略中。我們最迫切的關切，是將經濟轉入戰時體制，把反動的侵略者逐出我們革命的家園。除此之外，我們的長期工業戰略也出現了分歧……"
 SRU_Expand_The_Tomsk_University:0 "擴建托木斯克大學"
 SRU_Expand_The_Tomsk_University_desc:0 "托木斯克大學從來不是規模最大或最負盛名的學府，但數十年來，它一直是備受敬重的黑馬。莫斯科與聖彼得堡的大學主要向那個財閥統治的KDPR輸送傲慢的政治學學生，托木斯克則不然。這所大學還藏著一個秘密：它的校長一直在向我們輸送大批共產主義的畢業生。這意味著我們得以獲得一批受過高等教育、意志堅定的新黨員，來接替逐漸凋零的老一輩。為表彰它忠誠的貢獻，我們將擴建托木斯克大學，使其成為社會主義教育的中心，以及照亮未來共產主義者的燈塔。"
 SRU_Opening_Public_Hospitals:0 "開設公立醫院"
 SRU_Opening_Public_Hospitals_desc:0 "西伯利亞的醫療多年來一直處於一團糟的狀態。國家的醫療撥款僅能勉強維持少數幾家破敗不堪、人滿為患的醫院，而富人則飛往西方就醫。成千上萬身受重傷或罹患慢性病的礦工，更使情況雪上加霜。無論從道德還是實務的角度出發，我們都必須優先開設國營醫院與診所，來整治這個地區的醫療。"
 SRU_Develop_Siberian_Roads:0 "發展西伯利亞公路"
 SRU_Develop_Siberian_Roads_desc:0 "西伯利亞擁有一套完善的鐵路與公路網，但它們只為該地區的採礦業服務，把礦產一路輸往西邊烏拉爾的工廠。這意味著公共基礎設施長期遭到忽視，日益破敗。為了人民、也為了我們自身的後勤，我們將著手翻修地區與鄉村道路，讓橫貫西伯利亞的運輸更有效率、更加便捷。"
 Two_Year_Industrialization_Plan:0 "兩年工業化計畫"
 Two_Year_Industrialization_Plan_desc:0 "重工業部與建設部提出了一項快速工業化方案。這項計畫（受到青年蘇維埃派的熱烈支持）將促成西伯利亞重工業與軍事工業的迅速發展。該方案的反對者抱怨，它會導致服務業與輕工業遭到忽視，長遠而言可能有害。然而，快速生產軍備與工業品所帶來的效益及其必要性，遠遠壓過了這些顧慮。"
 SRU_Buy_Kazakh_Construction_Vehicles:0 "採購哈薩克工程車輛"
 SRU_Buy_Kazakh_Construction_Vehicles_desc:0 "為達成工業化目標，我們需要更多工程機械來興建基礎設施與工廠。所幸我們在哈薩克的朋友願意向我們出售二手的中國工程機械，以供大規模建設工程之用。"
 SRU_Re_Purpose_Extraction_Machinery:0 "改造採掘機械用途"
 SRU_Re_Purpose_Extraction_Machinery_desc:0 "西伯利亞的多數工業機械都是逃亡的寡頭們留下的。這些挖掘機與鑽探機用來鑿穿岩石固然十分好用，但拿來實際興建工廠或鐵路就遜色多了。為了平衡我們的設備存量，我們將把多餘的採礦車輛改造成適用於建設工業與基礎設施的機械。"
 SRU_Rapid_Industrialization:0 "快速工業化"
 SRU_Rapid_Industrialization_desc:0 "如今我們已具備建設與擴張的能力，正朝著既定目標穩步邁進。無須顧慮資本、股東或盈虧，我們得以全力將西伯利亞的經濟推向它所能企及的繁榮邊界。兩年之內，我們將實現那些因帝制封建主義與強盜資本家而失去的一百年發展。"
 SRU_Omsk_Arms_Complex:0 "鄂木斯克兵工聯合體"
 SRU_Omsk_Arms_Complex_desc:0 "我們的輕武器生產極為散亂且分散，眾多個別作坊生產的槍械品質參差不齊。為解決此問題，我們將設立鄂木斯克兵工聯合體，以滿足輕武器的生產需求。該廠將僱用數千人，具備為我軍大量生產輕武器與裝備的產能，並設有一個自主的設計局來研發新式軍備。"
 SRU_Kemerovo_Tank_Factory:0 "克麥羅沃坦克工廠"
 SRU_Kemerovo_Tank_Factory_desc:0 "克麥羅沃的一座曳引機工廠已被選定，將改建為裝甲車輛的關鍵工業基地。該廠將使從裝甲車到主力戰車的各類產品都能以流水線、標準化的方式生產，並將容納研究與設計團隊，著手研製我們自己的國產裝甲車輛，或改良外國型號。"
 SRU_Krasnoyarsk_Machinery_Plant:0 "克拉斯諾亞爾斯克機械廠"
 SRU_Krasnoyarsk_Machinery_Plant_desc:0 "克拉斯諾亞爾斯克位於我方領土上的一處關鍵鐵路樞紐，是集中生產工業機械的絕佳地點。這座新工廠將大幅提升我們製造工程設備與工業車輛的能力，同時為數千名工人與工程師提供就業機會，讓整個地區重獲生機。"
 SRU_Tomsk_Electronics_Bureau:0 "托木斯克電子設計局"
 SRU_Tomsk_Electronics_Bureau_desc:0 "任何現代經濟體在二十一世紀運作，都少不了電腦與電子產品。為跟上技術的進步，我們必須培育本國的電腦產業，以供應工業、科學、軍事與民生所需。托木斯克電子設計局將點燃俄羅斯技術黃金時代的火光。該局將僱用數百位我們最傑出的頭腦，去拓展電腦時代的邊界。"
 SRU_Growing_Manufacturing_Economy:0 "壯大製造業經濟"
 SRU_Growing_Manufacturing_Economy_desc:0 "我們正全速衝向工業化。我們城市的天際線被工業之光點亮，其規模已超越烏拉爾。若能保持這樣的增長步伐，我們有望彌補一百年的經濟停滯——從那之後，前景更是無可限量！照這個速度，我們的工業中心將足以與魯爾區、五大湖區乃至珠江三角洲的工業腹地並駕齊驅。貿易部與財政部或許會抱怨說，這種增長多半只是把尚未開發的潛力兌現出來，長期而言難以為繼；但他們不過是因為我們沒採納他們的方案而心懷不滿罷了。"
 SRU_National_Trade_Plan:0 "國家貿易計畫"
 SRU_National_Trade_Plan_desc:0 "貿易部與財政部提出了一項有別於單純工業化的替代方案。他們主張運用我們在哈薩克的人脈，出口我們過剩的礦產與能源，以換取商品與資本。這將帶來可觀的收入，可投資於發展本國工業，同時在短期內進口武器來裝備我們的軍隊。重工業部與建設部則反駁說，這套計畫過於緩慢，且會導致對外國的依賴；但歸根結柢，我們必須著眼長遠。"
 SRU_Securing_A_Khazak_Route:0 "確保哈薩克通道"
 SRU_Securing_A_Khazak_Route_desc:0 "與亞洲的貿易有賴一條穿越哈薩克的安全通道。可惜哈薩克邊境盜匪與軍閥橫行，讓商貿全然無法進行。所幸我們的士兵對付草原盜匪經驗豐富，過去已多次將其擊潰。為了博取阿拉木圖的好感並確保通道暢通，我們將派出一支遠征軍，去保障哈薩克境內的關鍵貿易動脈。"
 SRU_State_Funded_Prospecting:0 "國家出資勘探"
 SRU_State_Funded_Prospecting_desc:0 "在北西伯利亞探勘與測繪礦藏是一份危險的工作，通常由企業外包給承包商。這是一門要命的行當，沒有哪個神智清醒的人肯無償去做。若我們想重啟勘探，就得再次資助這些開路先鋒，並為他們的重要工作給予公允的報酬。有了他們的合作，我們可望很快開始擴大開採作業。"
 SRU_Silk_Road_To_Asia:0 "通往亞洲的絲綢之路"
 SRU_Silk_Road_To_Asia_desc:0 "穿越哈薩克的路線趨於穩定，為橫貫歐亞的商貿開闢了一條全新而令人振奮的道路。中國勢力圈內的許多企業與政府，都以貿易之名將意識形態的顧慮拋在一旁，開始更公開地與我們往來。我們在中亞締造了一條新的絲綢之路，而我們正是它的守護者與恩主。"
 SRU_Export_Surplus_Oil_And_Gas:0 "出口剩餘油氣"
 SRU_Export_Surplus_Oil_And_Gas_desc:0 "與中國貿易部的秘密談判已圓滿結束，該國政府表示願意購買我們出口的石油與天然氣。我們同意了極為優惠的價格，以換取中國對我們與中國財團之間的交易——尤其是軍火交易——睜一隻眼閉一隻眼。"
 SRU_Contracts_With_Chinese_Factories:0 "與中國工廠簽約"
 SRU_Contracts_With_Chinese_Factories_desc:0 "許多中國財團已表示願意將某些製造環節分包給我們，以規避他們那套繁瑣複雜的稅制。這些企業若想把訂單外包給一場與其核心價值背道而馳的革命，那就悉聽尊便——他們得利，我們也多得資源。"
 SRU_Rare_Earth_Resource_Exports:0 "稀土資源出口"
 SRU_Rare_Earth_Resource_Exports_desc:0 "西伯利亞蘊藏著大量「稀土資源」，在科技業與軍火業中需求殷切。這些礦物雖不如櫻石那般搶手，卻依然極具價值，而亞洲的許多財團都難以取得。向中國勢力圈供應這些至關重要的戰略資源，必定能讓他們更加欠我們人情。"
 SRU_Import_Advanced_Industrial_Tools:0 "進口先進工業工具機"
 SRU_Import_Advanced_Industrial_Tools_desc:0 "西伯利亞蘊藏著大量「稀土資源」，在科技業與軍火業中需求殷切。這些礦物雖不如櫻石那般搶手，卻依然極具價值，而亞洲的許多財團都難以取得。向中國勢力圈供應這些至關重要的戰略資源，必定能讓他們更加欠我們人情。"
 SRU_Growing_Trade_Economy:0 "資源出口型經濟"
 SRU_Growing_Trade_Economy_desc:0 "我們與亞洲的貿易，不僅在短期內為我們換來了武器與資本，更為一套建立在出口與對亞友好關係之上的長期經濟戰略奠定了基礎。這讓我們得以取用中國勢力圈的資源與技術，使我們能比閉關自守更有效率地發展經濟。重工業部與建設部或許會譴責我們背叛了工業自力更生的原則，但歸根結柢，革命若要存續，就必須有所妥協。"
 SRU_the_long_road_to_communism:0 "通往共產主義的漫漫長路"
 SRU_the_long_road_to_communism_desc:0 "許多人或許會說，我們背叛了馬克思主義的根本原則；說我們犧牲了工人主導的生產，向戰時的燃眉之急俯首稱臣。但共產主義既是一個目的地，也是一條道路。它是一項宏大的歷史工程，我們為之奮鬥多年，一路上迂迴曲折。距離我們的烏托邦仍有漫漫長路，但這是我們頭一次看見它開始成形。"
 SRU_Failures_Of_The_Great_Peoples_War:0 "偉大人民戰爭的失敗"
 SRU_Failures_Of_The_Great_Peoples_War_desc:0 "六〇年代蘇維埃政權與歐洲之間那場戰爭的失敗，被歸咎於諸多因素。將它全然歸咎於資本以壓倒性的力量碾壓我們稚嫩的革命固然輕鬆，但我們必須自我批判，然後繼續前行。我們將帶著從過往錯誤中汲取的教訓投入這場內戰，不被擊垮，也不重蹈那注定失敗的循環。"
 SRU_were_not_in_kazhakstan_anymore:0 "我們已不在哈薩克了"
 SRU_were_not_in_kazhakstan_anymore_desc:0 "這話雖是老生常談，但西伯利亞很冷——是真的非常冷。哈薩克固然也有寒冷的時節，卻遠遠比不上這裡。在雪地作戰中，我們的老兵與軍官正被遠東的民兵甩在身後。要扭轉這個局面，我們就必須迅速適應戰場的地形。"
 SRU_attach_native_guide_units:0 "配屬本地嚮導部隊"
 SRU_attach_native_guide_units_desc:0 "雅庫特人、布里亞特人與圖瓦人熟悉當地地形，過去常受僱於礦業公司擔任嚮導。只要給予自治權與代表席次（這本就在我們的待辦清單上），他們便願意協助我們的軍隊適應西伯利亞嚴酷的氣候。我們將立即組建整編的嚮導部隊。"
 SRU_masters_of_all_terrain:0 "全地形之主"
 SRU_masters_of_all_terrain_desc:0 "我們的士兵與軍官如今已能在近乎極地的環境中從容作戰。結合過往的經驗，我們如今已是一支能適應幾乎任何地形的靈活勁旅。從草原到冰雪，紅軍舉世無雙！"
 SRU_The_Partisans_Ideas:0 "游擊隊員的構想"
 SRU_The_Partisans_Ideas_desc:0 "瓦西里·杜羅夫與軍事委員會中的游擊隊派系主張，應將我方部隊的分散化明文制度化，以進行不對稱作戰。他的方案著重於單位的自主性，以及能支撐輕型機動部隊的彈性補給線——讓部隊得以按己方條件與敵接戰，並在敵方大股部隊反擊之前脫離。"
 SRU_Rocket_Propelled_Grenades:0 "火箭推進榴彈"
 SRU_Rocket_Propelled_Grenades_desc:0 "遠東的後盾勢力投入的裝甲力量與日俱增，我方步兵單位已難以招架。我們將著手生產並改良聯邦設計的單兵手持反坦克火箭，使小股步兵單位也擁有足以對抗裝甲部隊的火力。"
 SRU_Ambush_Strategies:0 "伏擊策略"
 SRU_Ambush_Strategies_desc:0 "與強敵正面對決是愚蠢之舉，因此明智的軍官根本不會這麼做。若要贏得這場內戰，每一次交戰都必須由我們選定，並且勝券在握。所幸，這正是游擊隊軍官最擅長的作戰領域。"
 SRU_Fast_Armoured_Cars:0 "高速裝甲車"
 SRU_Fast_Armoured_Cars_desc:0 "現代化已讓「革命步兵發動游擊突襲」這種浪漫的想像顯得相當過時。騎在馬背上是很難甩掉一架武裝直升機的——縱使是最勇猛的草原騎士也不行。我們將研發快速輕型裝甲車，用以在越野與道路上執行襲擾攻擊；它們既有足以造成殺傷的武裝，也有足以擺脫敵方增援的速度。"
 SRU_Strike_And_Disperse_Doctrine:0 "迅擊即散方針"
 SRU_Strike_And_Disperse_Doctrine_desc:0 "有了新的工具，我們將把不對稱作戰的做法精煉為我們的核心戰略。「迅擊即散」便是我們克敵制勝的方略。若我們無法在正面戰場擊敗敵人，那就一邊爭取時間，一邊重創他們薄弱卻至關重要的連結單位。就我們的處境而言，正面交戰在所難免；但至少，我們能在全面接戰之前，以精準的襲擾癱瘓敵人。"
 SRU_special_purpose_units:0 "特種用途部隊"
 SRU_special_purpose_units_desc:0 "杜羅夫已擬定計畫，準備組建數個特種用途部隊團（Spetsnaz），從我們在哈薩克戰役中最身經百戰的老兵中遴選菁英步兵。他們將接受複雜地形與城鎮聚落的作戰訓練，並著重於心理戰、破壞行動與暗殺。這支部隊將是我們與敵交鋒時刀鋒最銳利的那一點。"
 SRU_A_New_Type_Of_Warfare:0 "一種新型態的戰爭"
 SRU_A_New_Type_Of_Warfare_desc:0 "我們正引領一種現代化的不對稱作戰新形態，這對一支革命軍隊而言再合適不過。我們被那些企圖碾碎我們這場歷史性運動的帝國主義超級強權所包圍。倘若我們按照他們的規則、與他們在對等的條件下作戰，就只會被掃進歷史的垃圾堆。"
 SRU_The_Military_Councils_Plan:0 "軍事委員會的計畫"
 SRU_The_Military_Councils_Plan_desc:0 "德米特里·羅斯托維耶夫是那場大戰的老兵，也是唯一獲頒元帥榮銜的軍官。他在六〇年代還是一名年輕的坦克指揮官，其軍事學說建立在對早期縱深作戰與裝甲戰理論的精煉之上。羅斯托維耶夫反對游擊隊派系的分散化主張，希望將我方兵力集中並整編為一支統一的紅軍。"
 SRU_Emergency_Truck_Procurment:0 "緊急採購卡車"
 SRU_Emergency_Truck_Procurment_desc:0 "要打造一支現代化的軍隊，我們必須邁向全面的摩托化與機械化。可惜我們處境艱難，而西伯利亞的基本後勤同樣需要卡車。為解此困，我們將徵用民間卡車以充作軍事後勤之用。"
 SRU_The_Power_of_Rocket_Artillery:0 "火箭砲的威力"
 SRU_The_Power_of_Rocket_Artillery_desc:0 "我們喀秋莎火箭的呼嘯聲，至今仍在歐洲少數倖存的大戰老兵夢魘中迴響。火箭砲已被證明有著駭人的效力，而經過五十年火箭與彈藥技術的進步，它只會變得更加致命。將火箭發射器架上軍用卡車，是重建我們那支毀滅交響樂團的第一步。"
 SRU_Mass_Produce_Tanks:0 "大量生產坦克"
 SRU_Mass_Produce_Tanks_desc:0 "我們有一批從哈薩克帶來的舊型坦克儲備，但要擴充裝甲部隊，就必須有本國的生產能力。所幸我們能在現有工廠中高效地大量生產舊一代的T-70坦克，以迅速滿足需求。"
 SRU_Modernize_The_T70:0 "現代化改造T-70"
 SRU_Modernize_The_T70_desc:0 "T-70是一款可靠而扎實的主力戰車，只是已經落後時代二十年。所幸只需幾項簡單的升級，便能讓它達到當代水準：更換引擎、通訊系統現代化、加裝反坦克導引飛彈，並大量敷設爆炸反應裝甲。"
 SRU_guards_tank_divisons:0 "近衛坦克師"
 SRU_guards_tank_divisons_desc:0 "我們有限的工業能力，使裝甲部隊無法全面大規模部署。因此，我們將把裝甲儲備集中編成「近衛師」——由我們最優秀的坦克兵組成的菁英獨立裝甲單位。這些師團將是我方攻勢的先鋒。"
 SRU_Groundwork_Of_A_Red_Army:0 "紅軍的奠基"
 SRU_Groundwork_Of_A_Red_Army_desc:0 "羅斯托維耶夫元帥已將我們支離破碎的部隊改組為一支統一而專業的戰鬥力量。有了他勤勉的付出，我們將見證紅軍走出敗北的陰影，一路向莫斯科、向勝利進發！"
 SRU_Push_Out_The_Invaders:0 "驅逐侵略者"
 SRU_Push_Out_The_Invaders_desc:0 "我們的部隊已完成改組，終於能全面轉入攻勢。我們將集中一切資源，發動一場協同的攻勢，把侵略者逐出我們的家園。這些帝國主義者將被趕回海裡去。"
 SRU_sonya_east_secured:0 "東方一片紅"
 SRU_sonya_east_secured_desc:0 "侵略者已被擊潰。革命抵達了太平洋，帝國主義者被趕回了大洋彼岸。在俄羅斯境內鞏固革命的第一道關卡已然跨越，但我們的考驗才剛剛開始。此刻我們或許能喘一口氣，但敵人終將東進；當我們與之對決時，必將把他們一路擊退，並在莫斯科的上空升起紅旗！"
