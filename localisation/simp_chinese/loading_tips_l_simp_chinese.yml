﻿l_simp_chinese:
 LOADING_TIP_0:0 "A victory won through dishonest means is no victory at all.\n- Suzaku Kururugi"
 LOADING_TIP_1:0 "To defeat evil, I shall become an even GREATER evil.\n- Lelouch vi Britannia"
 LOADING_TIP_2:0 "“Truth” is something that is covered up most of the time.\n- Lloyd Asplund"
 LOADING_TIP_3:0 "The best way to remove your lies is to make them come true.\n- Suzaku Kururugi"
 LOADING_TIP_4:0 "Time flows constantly, it doesn’t care about the people who are struggling.\n- Lelouch vi Britannia"
 LOADING_TIP_5:0 "Strength that knows no boundaries is merely violence.\n- Bismarck Waldstein"
 LOADING_TIP_6:0 "All men are NOT created equal! That’s why there is war, violence, and unrest.\n- Charles zi Britannia"
 LOADING_TIP_7:0 "Do you know why snow is white? Because it forgot what color it was.\n- C.C."
 LOADING_TIP_8:0 "I'll now proceed to pleasure myself with this fish.\n- Suzaku Kururugi (Worthy Meme)"
 LOADING_TIP_9:0 "If the king doesn’t move, then his subjects won’t follow.\n- Lelouch vi Britannia"
 LOADING_TIP_10:0 "You can't change the world without getting your hands dirty.\n- Lelouch vi Britannia"
 LOADING_TIP_11:0 "False tears bring pain to those around you. A false smile brings pain to oneself.\n- C.C."
 LOADING_TIP_12:0 "You must think you're pretty cool huh, just playing the critic and judging the world from the sidelines.\n- Kallen Kozuki"
 LOADING_TIP_13:0 "Emperor Charles sought the past, you seek the present, but I seek the future!\n- Lelouch vi Britannia"
 LOADING_TIP_14:0 "Things that don’t change go extinct.\n- Milly Ashford"
 LOADING_TIP_15:0 "To desire some results, one must take actions.\n- Suzaku Kururugi"
 LOADING_TIP_16:0 "War is merely one method of diplomacy. However, it is the least efficient one.\n- Bismarck Waldstein"
 LOADING_TIP_17:0 "There are times in life when you have to distance yourself from those you love, because you love them.\n- C.C."
 LOADING_TIP_18:0 "In this world, evil can arise from the best of intentions. And there is good which can come from evil intentions.\n- C.C."
 LOADING_TIP_19:0 "A life that lives without doing anything is the same as a slow death.\n- Lelouch vi Britannia"
 LOADING_TIP_20:0 "I must spill yet more blood, so the blood already spilt will not be in vain.\n- Lelouch vi Britannia"
 LOADING_TIP_21:0 "You see, the world will not change through naive talks.\n- Lelouch vi Britannia"
 LOADING_TIP_22:0 "Nothing is unforgivable. So if you cannot forgive him, it means you do not want to.\n- Shirley Fenette"
 LOADING_TIP_23:0 "At times, the life of a single man is worth more than that of a million...\n- Diethard Ried"
 LOADING_TIP_24:0 "Only fools wage war.\n- Charles zi Britannia"
 LOADING_TIP_25:0 "If strength is justice, then is powerlessness a crime?\n- Lelouch vi Britannia"
 LOADING_TIP_26:0 "I am sorry, but I cannot be friends with a goddess, because I have signed a contract with a devil.\n- Lelouch vi Britannia"
 LOADING_TIP_27:0 "The only person I let order me around is Zero!\n- Kallen Kozuki"
 LOADING_TIP_28:0 "All MEANS are justified to an end.\n- Suzaku Kururugi (After the destruction of Tokyo's Colony)"
 LOADING_TIP_29:0 "Your very existence in this world is an ERROR!\n- Suzaku Kururugi (to Lelouch)"
 LOADING_TIP_30:0 "Orange, you say? That's the name of my loyalty!\n- §OJeremiah Gottwald§!"
 LOADING_TIP_31:0 "A skilled dictator is much more beneficial to humanity than a democracy of ignorant people.\n- Gene Smilas"
 LOADING_TIP_32:0 "I have served my country as anyone would. While some may question my methods, all I will say is this if I must choose between a Frenchman or ten Russians, I will choose my countrymen every time. \n- Alexander Lyon"
 LOADING_TIP_33:0 "Just want you to ask yourself when you gain results the wrong way, what are you left with in the end? Only dark regret and a deep emptiness that have nowhere to go.\n- Suzaku Kururugi"
 LOADING_TIP_34:0 "I am his sword. I will slash away his enemies and his weaknesses. So, C.C., you become his shield. Protect him.\n- Suzaku Kururugi"
 LOADING_TIP_35:0 "This Geass I do solemnly accept.\n- Zero"
 LOADING_TIP_36:0 "If my reputation goes down for doing what's right, I don't need it.\n- Suzaku Kururugi"
 LOADING_TIP_37:0 "The world and the people in it - they will never be what we want them to be.\n- Suzaku Kururugi"
 LOADING_TIP_38:0 "After everything you've done, you really think this is sufficient? You believe some bowing and begging is enough for me to forgive you?!\n- Suzaku Kururugi"
 LOADING_TIP_39:0 "I called because there's something I want you to tell everyone for me... The sky; make sure no-one looks up at the sky.\n- Suzaku Kururugi"
 LOADING_TIP_40:0 "I, Lelouch vi Britannia, command you! Now, all of you... Die!\n- Lelouch Vi Britannia"
 LOADING_TIP_41:0 "Time flows constantly, it doesn't care about the people who are struggling.\n- Lelouch Vi Britannia"
 LOADING_TIP_42:0 "The trick of real combat is that everyone is human.\n- Lelouch Vi Britannia"
 LOADING_TIP_43:0 "You will never be able to love anybody else until you love yourself.\n- Lelouch Vi Britannia"
 LOADING_TIP_44:0 "C.C., I do not know why snow is white, but I do find such white snow beautiful. I don't dislike it.\n- Lelouch Vi Britannia"
 LOADING_TIP_45:0 "Yes, I am Zero, the man who leads the Black Knights, who challenges the Holy Britannian Empire, the one who holds the entire world in his hand.\n- Zero"
 LOADING_TIP_46:0 "The human heart has always been the source of all our power. That is why the people rose up against the High Eunuchs, and the Black Knights fight like titans. We fight with the power of our hearts!\n- Zero"
 LOADING_TIP_47:0 "My name is Lelouch vi Britannia, I am the eldest son of Empress Marianne, the prince who was abandoned by his empire. If anyone wishes to stop me, let them try! If there is anyone who can go beyond my despair!\n- Lelouch Vi Britannia"
 LOADING_TIP_48:0 "Kallen, you have to §Rlive§!.\n- Lelouch Vi Britannia"
 LOADING_TIP_49:0 "I don't intend to defeat God. This is a request. Yes, now I know who I really am. God, Collective Unconscious! Please, don't stop the march of time!\n- Lelouch Vi Britannia"
 LOADING_TIP_50:0 "Yes, from this day, from this moment on, the world belongs to me! Lelouch vi Britannia commands you! Obey me, subjects! Obey me, world!\n- 99th Emperor of Britannia"
 LOADING_TIP_51:0 "Yes, I... destroy the world... and create it... anew.\n- Lelouch Vi Britannia"
 LOADING_TIP_52:0 "Once I have brought the revolution to the entire world, I can finally say I have earned my place among the great men of history and the people shall chant my name to the high heavens for ten thousand years!\n- Luka Zhukov"