﻿l_simp_chinese:
 city_fall_news.1.t:0 "Fall of Neryungri"
 city_fall_news.1.d:0 "Today, the war has reached the Far East, as the city of Neryungri fell to [new_controller.GetAdjective] troops. The city faced a bombing raid before the [new_controller.GetAdjective] army stormed the city, many buildings were destroyed in order to weaken the city's garrison.\n\nThe [new_controller.GetAdjective] army secured Neryungri's surroundings and gained a chokehold on the city preventing [old_controller.GetAdjective] reinforcements. The [new_controller.GetAdjective] army paraded through the city centre near the damaged Neryungri government building, confirming the [new_controller.GetNameDEF]'s dejure control over the local region. Reports of local underground resistance groups have emerged and they have already started organising resistance efforts which might prove the occupation of [old_controller.GetNameDEF] to be rather costly in the future."
 city_fall_news.1.a:0 "This is not the end!"
 city_fall_news.1.b:0 "The Pacific trade routes are now ours!"
 city_fall_news.1.c:0 "Curious."
 city_fall_news.2.t:0 "Fall of Okhotsk"
 city_fall_news.2.d:0 "Today, the [new_controller.GetNameDEF] has proclaimed victory over [old_controller.GetNameDEF], as the megacity of Okhotsk fell to [new_controller.GetAdjective] troops. The city faced a relentless siege before the [new_controller.GetAdjective] army entered the Okhotsk government district, many critical targets within the city were destroyed in order to weaken the city's defenses.\n\nAfter the [new_controller.GetAdjective] army secured the Okhotsk megaport capturing thousands of political prisoners, the prisoners were paraded through the city centre as the flag of [old_controller.GetNameDEF] could be seen being burnt to ashes in full view of the conquered populace, some rejoicing at the liberation while others fear what their new overlords have in store for them. With [new_controller.GetNameDEF]'s dominion over Far Eastern Siberia now fully realised, the remanents of the [old_controller.GetAdjective] government fled to The Holy Britannian Empire for refuge against their enemies."
 city_fall_news.2.a:0 "We have failed!"
 city_fall_news.2.b:0 "Long live [new_controller.GetNameDEF]!"
 city_fall_news.2.c:0 "Curious."
 city_fall_news.3.t:0 "Fall of Krasnoyarsk"
 city_fall_news.3.d:0 "Today, the [new_controller.GetNameDEF] has proclaimed victory over [old_controller.GetNameDEF], as the city of Krasnoyarsk fell to advancing [new_controller.GetAdjective] troops. The city faced an onslaught from the [new_controller.GetAdjective] air force before the [new_controller.GetAdjective] army entered the central sector of Krasnoyarsk, many critical targets within the city centre were destroyed in the aerial bombardment.\n\nAfter the [new_controller.GetAdjective] army secured the surrounding rural areas, the agricultural plantations were burned by the retreating [old_controller.GetAdjective] forces. As the armies of [new_controller.GetNameDEF] march toward their inevitable victory, morale among [old_controller.GetAdjective] troops could not plummet lower. Reports are coming in that the surrounding countries of Kazakhstan and China are taking in refugees who seek a peaceful way out of the warzone of Siberia."
 city_fall_news.3.a:0 "This is not the end!"
 city_fall_news.3.b:0 "Long live [new_controller.GetNameDEF]!"
 city_fall_news.3.c:0 "Curious."
 city_fall_news.4.t:0 "Fall of Novosibirsk"
 city_fall_news.4.d:0 "Today, the war has finally reached the heartlands of the revolution Novosibirsk. [new_controller.GetAdjective] forces have breached the city defences, as [new_controller.GetAdjective] troops swarm through the streets and push the enemy garrison towards the central government building within the inner city limits. Airstrikes carried out by [new_controller.GetAdjective] jet aircraft have left any routes of retreat for [old_controller.GetAdjective] forces impassable. Now trapped in between a wall of hellfire and an advancing army of would be savages, the situation for the brave heroes of the  [old_controller.GetNameDEF] is becoming more intangible by the hour. Their defeat seems imminent."
 city_fall_news.4.b:0 "Siberia's heart is ours to command!"
 city_fall_news.4.c:0 "Curious."
 city_fall_news.5.t:0 "Fall of Ekaterinburg"
 city_fall_news.5.d:0 "Today, the last bastion of Russia’s past is under siege as [new_controller.GetAdjective] forces breach the defensive perimeter which quickly prompts the [old_controller.GetAdjective] garrison to collapse in on itself as the remaining units of the city’s garrison are ordered to surrender to the larger [new_controller.GetAdjective] force. [new_controller.GetAdjective] troops were seen marching towards the imperial palace and the neighbouring government sector to secure full control over the city and its population. Civilians were seen opposing [new_controller.GetAdjective] forces as they occupied the city although the dissent was short-lived due to the overwhelming might of the [new_controller.GetAdjective] armed forces."
 city_fall_news.5.b:0 "Siberia's heart is ours to command!"
 city_fall_news.5.c:0 "Curious."
