﻿l_simp_chinese:
 BM_HISTORY_TITLE:0 "Black Requiem History"
 UNEQUAL_WORLD_DESC:0 "During the last century three superpowers have arisen, to hold the majority of the balance of power across the world. The Britannian Empire, the Chinese Federation and Europia United. All nations distinct, varying political and social systems. Yet their goal remains the same, total domination. The remaining few independent nations have been fighting a war for survival, against these superpowers. A fragile peace has remained, stagnant across the world. But an unequal world like this... is not one to smile for."
 UNEQUAL_WORLD_OTHER_COUNTRIES_DESC:0 "Almost all nations in Earth are under the banner of one of the three superpowers, namely China, Britannia or Europia United. There are two exceptions in this order Japan and the Middle Eastern Federation.\n\nThe first nation, also called the \"Jewel of the Pacific\" is the only democracy in the Pacific, and it's only alive thanks to its Sakuradite deposits; a similar logic can be applied to the Middle East. Will these territories be subjugated or their independence ethos will survive? With the world changing."
 BRT_UNEQUAL_WORLD_DESC:0 "The origins of Britannia can be traced back to the Napoleonic Wars, which resulted in a stunning victory for Napoleon. During the Napoleonic invasion of mainland Britain, many aristocrats and nobles escaped alongside the royal family to their dominions in North America.\nAfter the first few hard years, the new nation, inspired by the principles of Social Darwinism, consolidated into an absolute monarchy and gradually extended its rule across both continents. Eventually, the Britannian Empire became a global superpower after it made significant advancements in science and military technologies."
 JAP_UNEQUAL_WORLD_DESC:0 "Time has not been kind to the once prestige's nation of Japan. The Treaty of Okhotsk severely crippled their military as whole and only leaving a token force to barely just defend themselves from any sort of harm. After many decades, the great powers look upon Japan for new conquest, from the ever-expanding and devouring Britannia to the conniving foxes that are the Chinese Federation.\n\nWill Japan be able to handle the crushing tides of History and Ride out the Storm or will they just become an footnote in History for the future to come?"
 FRA_UNEQUAL_WORLD_DESC:0 "Europia United is a project that has been in the making since the start of the revolution, France under the leadership of Napoleon Bonaparte was able to turn the tide against Great Britain in Coalition wars and conquer the British Isles and with that most of Europe. Although the British led coalition dealt Napoleon and his armies a disastrous defeat at the battle of Waterloo in 1815 which prevented Napoleon from conquering Russia, soon after the revolutionaries executed Napoleon. The republic stabilized after seeking peace with both the Britannians and the Russians. With France at the helm of Europia United, the EU is considered one of three global powers."
 RUS_UNEQUAL_WORLD_DESC:0 "Mother Russia has been suffering from turmoil since the French invasion and the subjugation of the Tsardom during the Great War. The instability that still shadows the Pro-European government looms over the vast expansive plains of Russia; extremist ideologies have rooted themselves in the Urals and Siberia. Russia and its people exist in a tumultuous time and there is a deep-rooted uncertainty among the populace on what the future of the nation will ultimately pan out to be, whether the Russian government manages to withstand the trials ahead or collapse into anarchy is unknown - as the threat of civil war has never been more prevalent."
 RUSSIA_IN_CHAOS_DESC:0 "The Republic of Russia is a nation in rapid decline. Ever since being brought into the Europian fold. The political pressures that Europia United have enforced upon Russia have had a tremendous effect on the Russian state. With international tension and conflict at an all time high all around the globe. It has all seemed to have hastened the inevitable, the final domino has fallen. Russia has been divided by varying factions vying for the control of it's future. One thing is for certain in this new time period of war and strife, Russia is in Chaos..."
 RUSSIA_IN_CHAOS_OTHER_NATIONS:0 "Select a nation in the world of Code Geass or simply look at the map! While most nations do not have unique content there is a custom generic tree for minors with Britannian Areas getting a little extra. Will you help the Superpowers achieve their goals or do you have other plans in mind?"
 BRT_RUSSIA_IN_CHAOS_DESC:0 "The Holy Britannian Empire after the invasion of Japan, has landed itself in a position of power due to the world's largest deposits of Sakuradite which brought Europe and China to the negotiating table.\n\nBritannia now finds itself at the centre of the world but not without cost, the entire world's eire is now upon them, a storm is brewing on the horizon one that will plunge the world into chaos of biblical proporortions but will Britannia triumph over the status quo?"
 A11_RUSSIA_IN_CHAOS_DESC:0 "Area 11 formerly known as Japan is an artificial creation of the HBE, now under the leadership of Knight of One Bismarck who intends to stabilise the area in the name of the empire will stop at nothing to ensure the population and resources of Japan are at the disposal of the empire in preperation for the coming storm that is brewing on the world stage. With the collapse of the government of Japan several resistance groups have cropped up in an effort to fight the Britannian conquest of their homeland. Will the Britannian government prevail in its pacification of Japan or will this corner of the empire collapse to a sea of never ending rebellion?"
 RUS_RUSSIA_IN_CHAOS_DESC:0 "Once a formidable force on the world stage, the Republic of Russia now finds itself teetering on the edge of ruin. Decades of uneven progress brought both prosperity for those deemed important and hardship for all others. With Moscow’s control slipping and trust in its leadership shattered, the government scrambles to maintain order in a nation fracturing beneath its feet.Though as the world watches, whispers of discontent grow louder among Russia's once-loyal European allies. Will the Republic endure and reunite its people, or will foreign powers seize the moment to decide Russia’s fate?"
 MRU_RUSSIA_IN_CHAOS_DESC:0 "In the cold Urals of Russia, dreams of a new Russian nation begin to be realized with Mikhail Astakov at the helm of this new breakaway state. Having already seized power in Ekaterinburg with his populist movement backing him, the Russian people may once more see a strong man leading their country.\nHowever, whether or not that strong leader is Astakov is remain to be seen, with the young exiled Tsar, Vsevolod Romanov making plans of his own to take the reins of his collapsing homeland. Astakov may seek to use the Tsar as a figurehead, but how much control does he really have over the young man?"
 SRU_RUSSIA_IN_CHAOS_DESC:0 "The VKP has long awaited its chance to revive the spirit of revolution in Russia. With the turmoil layed down all across the nation their chance has finally come, but tensions have been rising among the party's leadership and they are on a collision course that may very well fracture the nation.\nWhich will leave them no chance at victory at all, there are still some who in distant memory recall the horrors of the Russian revolution and are still scarred by the era of bloodshed, but of course history does have a habit of repeating itself. §RPerhaps a change in leadership is in order?§R"
 EUR_RUSSIA_IN_CHAOS_DESC:0 "Born from decades of neglect and corruption in Moscow, the Far East Provisional Government embodies the resilience of a people abandoned by their own nation. Pushed to the brink by years of isolation and culminating in a devastating bombing, they now rise to reclaim the Russia that once was.\n\nUnder President Sergei Sorokin, this fractured territory dares to challenge the old world that forsook them. Will they redeem Mother Russia and carve a path for all, or will their Republic crumble under the weight of its impossible dream?"